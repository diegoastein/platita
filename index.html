<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platita - Mi Control de Finanzas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            color: #1e293b;
            overflow-x: hidden;
            width: 100%;
        }
        svg { width: 1.5rem; height: 1.5rem; display: inline-block; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input:focus { outline: none; border-color: #0f172a; }
        
        .main-container {
            width: 100%;
            max-width: 100%;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        @media (min-width: 768px) {
            .main-container { max-width: 1024px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem; }
            .desktop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        }

        .item-card {
            max-width: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        const DEFAULT_CATEGORIES = ["Hogar", "Servicios", "Impuestos", "Salud", "Educación", "Tarjetas", "Ocio", "Comida", "General"];
        
        const CHART_COLORS = [
            '#10b981', '#f43f5e', '#f59e0b', '#6366f1', '#8b5cf6', '#06b6d4', 
            '#f97316', '#ec4899', '#14b8a6', '#3b82f6', '#a855f7', '#84cc16'
        ];

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Analysis: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2v2m3 10v-3a2 2 0 012-2h2a2 2 0 012 2v3m2 0h-5m-9 0H3m9 0a9 9 0 0118 0v1H3v-1z" /></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val || 0);
        
        const parseLocaleNumber = (str) => {
            if (typeof str === 'number') return str;
            if (!str) return 0;
            const clean = str.toString().replace(/\./g, '').replace(',', '.');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [navDate, setNavDate] = useState(new Date());
            const [hideBalance, setHideBalance] = useState(true); 
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [authError, setAuthError] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const colRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
                const unsubscribe = colRef.onSnapshot(snap => {
                    setItems(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, err => console.error("Error Firestore:", err));
                
                db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categories').get().then(doc => {
                    if (doc.exists) setCategories([...DEFAULT_CATEGORIES, ...doc.data().custom]);
                });
                
                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const month = navDate.getUTCMonth();
                const year = navDate.getUTCFullYear();
                
                const currentMonthItems = items.filter(item => {
                    if (!item.date) return false;
                    const d = new Date(item.date);
                    return d.getUTCMonth() === month && d.getUTCFullYear() === year;
                });

                const today = new Date();
                const currentDay = today.getDate();
                const isCurrentMonth = month === today.getUTCMonth() && year === today.getUTCFullYear();
                const isPastMonth = navDate < new Date(today.getUTCFullYear(), today.getUTCMonth(), 1);

                // --- NUEVA LÓGICA DE INGRESOS ---
                const incomeCobrado = currentMonthItems.filter(i => i.type === 'income' && i.paid).reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                const incomePendiente = currentMonthItems.filter(i => i.type === 'income' && !i.paid).reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                
                const recPaid = currentMonthItems.filter(i => i.type === 'recurring' && i.paid).reduce((a, c) => a + (c.paymentType === 'partial' ? (parseFloat(c.paidAmount) || 0) : (parseFloat(c.amount) || 0)), 0);
                const recPending = currentMonthItems.filter(i => i.type === 'recurring' && !i.paid).reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                const daily = currentMonthItems.filter(i => i.type === 'daily').reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                
                const upcoming = currentMonthItems
                    .filter(i => i.type === 'recurring' && !i.paid && (parseFloat(i.amount) > 0))
                    .map(i => ({
                        ...i,
                        isOverdue: (isCurrentMonth && currentDay > i.dueDay) || isPastMonth
                    }))
                    .sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99))
                    .slice(0, 5);

                return { 
                    income: incomeCobrado, 
                    incomePendiente,
                    recPaid, 
                    recPending, 
                    daily, 
                    balance: incomeCobrado - recPaid - daily, 
                    totalSpent: recPaid + daily, 
                    currentMonthItems, 
                    upcoming 
                };
            }, [items, navDate]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(loginData.email, loginData.password);
                } catch (e) {
                    setAuthError("Email o contraseña incorrectos");
                    setLoading(false);
                }
            };

            const addItem = async (data) => {
                if (!user) return;
                const colRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
                const finalDate = data.date ? data.date.split('T')[0] + 'T12:00:00Z' : new Date().toISOString();
                await colRef.add({
                    ...data,
                    date: finalDate,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const updateItem = async (id, data) => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions').doc(id);
                const updates = { ...data };
                if (data.date && typeof data.date === 'string') updates.date = data.date.split('T')[0] + 'T12:00:00Z';
                await docRef.update(updates);
            };

            const toggleItem = async (item, pType = 'total', pAmount = 0) => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions').doc(item.id);
                if (item.paid) {
                    await docRef.update({ paid: false, paymentType: null, paidAmount: 0 });
                } else {
                    const isPartial = pType === 'partial';
                    await docRef.update({ paid: true, paymentType: pType, paidAmount: isPartial ? pAmount : item.amount });
                    
                    if (isPartial && (item.name.toLowerCase().includes('visa') || item.name.toLowerCase().includes('master'))) {
                        const remainder = item.amount - pAmount;
                        if (remainder > 0) {
                            const nextMonth = new Date(navDate);
                            nextMonth.setUTCMonth(nextMonth.getUTCMonth() + 1);
                            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions').add({
                                name: `Saldo Pendiente ${item.name}`,
                                amount: remainder,
                                type: 'recurring',
                                category: 'Tarjetas',
                                paid: false,
                                dueDay: item.dueDay || 1,
                                date: nextMonth.toISOString().split('T')[0] + 'T12:00:00Z'
                            });
                        }
                    }
                }
            };

            const handleNavMonth = (dir) => {
                setNavDate(prev => {
                    const d = new Date(prev);
                    d.setUTCMonth(d.getUTCMonth() + dir);
                    return d;
                });
            };

            const copyPreviousMonth = async () => {
                if (!user) return;
                const targetMonth = navDate.getUTCMonth();
                const targetYear = navDate.getUTCFullYear();
                const prevDate = new Date(Date.UTC(targetYear, targetMonth - 1, 1));
                const prevMonth = prevDate.getUTCMonth();
                const prevYear = prevDate.getUTCFullYear();

                const prevItems = items.filter(item => {
                    if (!item.date) return false;
                    const d = new Date(item.date);
                    return d.getUTCMonth() === prevMonth && d.getUTCFullYear() === prevYear && (item.type === 'income' || item.type === 'recurring');
                });

                if (prevItems.length === 0) return;
                const colRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
                const batch = db.batch();
                const targetDateStr = new Date(Date.UTC(targetYear, targetMonth, 1)).toISOString().split('T')[0] + 'T12:00:00Z';

                prevItems.forEach(item => {
                    const newDoc = colRef.doc();
                    const { id, createdAt, ...dataToCopy } = item;
                    batch.set(newDoc, {
                        ...dataToCopy,
                        amount: 0,
                        paid: item.type === 'income' ? false : false, // Los copiamos todos como pendientes
                        paymentType: null,
                        paidAmount: 0,
                        date: targetDateStr,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                await batch.commit();
            };

            const addCategory = async (cat) => {
                if (!cat || !user || categories.includes(cat)) return;
                const newCats = [...categories, cat];
                setCategories(newCats);
                const custom = newCats.filter(c => !DEFAULT_CATEGORIES.includes(c));
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categories').set({ custom });
            };

            const removeCategory = async (cat) => {
                if (!user || DEFAULT_CATEGORIES.includes(cat)) return;
                const newCats = categories.filter(c => c !== cat);
                setCategories(newCats);
                const custom = newCats.filter(c => !DEFAULT_CATEGORIES.includes(c));
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categories').set({ custom });
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-white"><div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 animate-fade-in text-center">
                    <div className="bg-slate-900 text-white p-5 rounded-[2.5rem] mb-6 shadow-2xl inline-block mx-auto"><Icons.Wallet /></div>
                    <h1 className="text-4xl font-black text-slate-900 mb-2 tracking-tighter leading-none">Platita</h1>
                    <p className="text-slate-500 mb-10 text-sm font-medium">Gestión inteligente de tus gastos.</p>
                    <form onSubmit={handleLogin} className="w-full max-w-xs space-y-4 mx-auto">
                        <input type="email" required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-slate-800" placeholder="Email" value={loginData.email} onChange={e=>setLoginData({...loginData, email: e.target.value})} />
                        <input type="password" required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-slate-800" placeholder="Contraseña" value={loginData.password} onChange={e=>setLoginData({...loginData, password: e.target.value})} />
                        {authError && <p className="text-rose-500 text-xs font-bold text-center">{authError}</p>}
                        <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-xl active:scale-95 transition-transform">Ingresar</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 bg-slate-50 animate-fade-in relative w-full overflow-x-hidden">
                    <header className="bg-white border-b border-slate-100 md:rounded-b-[3rem] shadow-sm mb-6">
                        <div className="main-container py-5">
                            <div className="flex items-center justify-between mb-6">
                                <h1 className="text-2xl md:text-3xl font-black text-slate-900 flex items-center gap-2"><span className="bg-slate-900 text-white px-2 py-1 rounded-xl">P</span> Platita</h1>
                                <button onClick={() => auth.signOut()} className="text-slate-300 hover:text-rose-500 transition-colors flex items-center gap-2 text-sm font-bold">
                                    <span className="hidden md:inline">Cerrar Sesión</span> <Icons.Logout />
                                </button>
                            </div>
                            
                            <div className="md:grid md:grid-cols-2 md:gap-8 items-center">
                                <div className="mb-6 md:mb-0">
                                    <div className="flex items-center justify-between bg-slate-100 p-1 rounded-full mb-5">
                                        <button onClick={() => handleNavMonth(-1)} className="p-2 hover:bg-white rounded-full transition-all"><Icons.ChevronLeft /></button>
                                        <span className="text-[12px] md:text-sm font-black text-slate-700 uppercase tracking-widest">{navDate.toLocaleString('es-ES', { month: 'long', year: 'numeric', timeZone: 'UTC' })}</span>
                                        <button onClick={() => handleNavMonth(1)} className="p-2 hover:bg-white rounded-full transition-all"><Icons.ChevronRight /></button>
                                    </div>

                                    <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden flex flex-col items-center">
                                        <button onClick={() => setHideBalance(!hideBalance)} className="absolute top-4 right-6 text-slate-500 hover:text-white p-2 transition-all">
                                            {hideBalance ? <Icons.Eye /> : <Icons.EyeOff />}
                                        </button>
                                        <p className="text-slate-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-1">Saldo Cobrado Disponible</p>
                                        <h2 className="text-4xl md:text-5xl font-black mb-6 tracking-tight leading-none">{hideBalance ? "$ ••••••" : formatCurrency(stats.balance)}</h2>
                                        <div className="grid grid-cols-2 gap-8 border-t border-white/10 pt-6 w-full text-center">
                                            <div><p className="text-slate-500 text-[10px] uppercase font-black mb-1">Ingresos</p><p className="text-emerald-400 font-black text-lg">{hideBalance ? "---" : formatCurrency(stats.income)}</p></div>
                                            <div><p className="text-slate-500 text-[10px] uppercase font-black mb-1">Gastos</p><p className="text-rose-400 font-black text-lg">{hideBalance ? "---" : formatCurrency(stats.totalSpent)}</p></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="hidden md:block">
                                    <AnalysisView currentMonthItems={stats.currentMonthItems} stats={stats} items={items} navDate={navDate} isSmall />
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="main-container space-y-8">
                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-center">
                                    <button onClick={copyPreviousMonth} className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                                        <Icons.Copy /> Conceptos anteriores
                                    </button>
                                </div>

                                <div className="bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center shrink-0 shadow-sm"><Icons.Calendar /></div>
                                        <div className="flex-1">
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Pendientes Próximos</p>
                                            <p className="text-3xl font-black text-slate-900 tracking-tight leading-none">{formatCurrency(stats.recPending)}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {stats.upcoming?.length > 0 ? stats.upcoming.map(item => (
                                            <div key={item.id} className={`flex justify-between items-center p-4 rounded-2xl border ${item.isOverdue ? 'bg-rose-50 border-rose-200' : 'bg-slate-50 border-slate-100'}`}>
                                                <div className="min-w-0">
                                                    <span className="text-xs font-black text-slate-600 uppercase truncate block mr-2">{item.name}</span>
                                                    {item.isOverdue && <span className="text-[8px] font-black text-rose-500 uppercase tracking-tighter">Vencido</span>}
                                                </div>
                                                <span className={`${item.isOverdue ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700'} px-3 py-1 rounded-lg text-[10px] font-black whitespace-nowrap ml-2`}>Día {item.dueDay}</span>
                                            </div>
                                        )) : <p className="text-slate-400 text-xs font-medium italic text-center w-full">Sin pagos pendientes.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'analysis' && <AnalysisView currentMonthItems={stats.currentMonthItems} stats={stats} items={items} navDate={navDate} />}
                        
                        {(view === 'income' || view === 'recurring' || view === 'daily') && (
                            <ListView 
                                title={view === 'income' ? 'Ingresos' : view === 'recurring' ? 'Gastos Fijos' : 'Gastos Diarios'}
                                type={view}
                                items={stats.currentMonthItems.filter(i => i.type === view)}
                                categories={categories}
                                onAdd={addItem}
                                onUpdate={updateItem}
                                onToggle={toggleItem}
                                onDelete={id => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions').doc(id).delete()}
                                accent={view === 'income' ? 'emerald' : view === 'recurring' ? 'amber' : 'rose'}
                                stats={stats}
                                navDate={navDate}
                            />
                        )}

                        {view === 'settings' && (
                            <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-slate-100 space-y-8 animate-fade-in">
                                <h2 className="text-2xl font-black text-slate-900 tracking-tight">Configuración</h2>
                                <div className="space-y-4">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tus Etiquetas</p>
                                    <div className="flex flex-wrap gap-2">
                                        {categories.map(c => (
                                            <span key={c} className="group relative bg-slate-50 border border-slate-100 px-4 py-2 rounded-full text-xs font-bold text-slate-600 shadow-sm flex items-center gap-2 transition-all">
                                                {c}
                                                {!DEFAULT_CATEGORIES.includes(c) && (
                                                    <button onClick={() => removeCategory(c)} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                        <Icons.Close />
                                                    </button>
                                                )}
                                            </span>
                                        ))}
                                    </div>
                                    <form onSubmit={e => { e.preventDefault(); addCategory(e.target.cat.value); e.target.reset(); }} className="flex gap-2 max-w-sm pt-2">
                                        <input name="cat" className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none text-slate-800" placeholder="Nueva etiqueta..." />
                                        <button className="bg-slate-900 text-white px-6 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all">+</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-50">
                        <div className="main-container flex justify-around p-4 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Inicio" />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Ingresos" />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="Gastos Fijos" />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="Gastos Diarios" />
                            <NavTab active={view === 'analysis'} onClick={() => setView('analysis')} icon={<Icons.Analysis />} label="Análisis" />
                            <NavTab active={view === 'settings'} onClick={() => setView('settings')} icon={<Icons.Settings />} label="Config" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl flex flex-col items-center gap-1 transition-all md:px-6 md:hover:bg-slate-50 ${active ? 'bg-slate-900 text-white shadow-lg scale-105 font-bold' : 'text-slate-400'}`}>
                {icon} <span className="text-[8px] md:text-[10px] font-black uppercase tracking-widest">{label}</span>
            </button>
        );

        const ListView = ({ title, type, items, categories, onAdd, onUpdate, onToggle, onDelete, accent, stats, navDate }) => {
            const [newName, setNewName] = useState('');
            const [newAmount, setNewAmount] = useState('');
            const [newCat, setNewCat] = useState('General');
            const [newDueDay, setNewDueDay] = useState('1');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName) return;
                
                const data = { 
                    name: newName, 
                    amount: parseLocaleNumber(newAmount), 
                    type, 
                    paid: type === 'income' ? false : false // Por defecto todo entra como pendiente
                };

                if (type !== 'income') {
                    data.category = newCat;
                } else {
                    data.category = "Ingreso";
                }

                if (type === 'recurring') {
                    data.dueDay = parseInt(newDueDay) || 1;
                    const d = new Date(navDate);
                    d.setUTCDate(data.dueDay);
                    data.date = d.toISOString();
                } else if (type === 'daily') {
                    data.date = new Date(newDate).toISOString();
                } else {
                    // Ingresos van a la fecha de navegacion por defecto si no tienen
                    data.date = navDate.toISOString();
                }

                onAdd(data);
                setNewName(''); setNewAmount('');
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    {type === 'daily' && (
                        <div className="bg-rose-50 border border-rose-100 p-6 md:p-8 rounded-[2.5rem] flex items-center gap-6 shadow-sm mb-2 text-center md:text-left">
                            <div className="w-14 h-14 bg-rose-500 text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg mx-auto md:mx-0"><Icons.Shopping /></div>
                            <div>
                                <p className="text-rose-400 text-[10px] font-black uppercase tracking-widest mb-1">Total Gastos Diarios</p>
                                <p className="text-3xl md:text-4xl font-black text-rose-700 tracking-tight leading-none">{formatCurrency(stats.daily)}</p>
                            </div>
                        </div>
                    )}
                    
                    {type === 'income' && (
                        <div className="bg-emerald-50 border border-emerald-100 p-6 md:p-8 rounded-[2.5rem] flex items-center gap-6 shadow-sm mb-2 text-center md:text-left">
                            <div className="w-14 h-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg mx-auto md:mx-0"><Icons.Plus /></div>
                            <div>
                                <p className="text-emerald-400 text-[10px] font-black uppercase tracking-widest mb-1">Ingresos Cobrados / Pendientes</p>
                                <div className="flex items-baseline gap-2">
                                    <p className="text-3xl font-black text-emerald-700 tracking-tight leading-none">{formatCurrency(stats.income)}</p>
                                    <p className="text-sm font-bold text-slate-400">/ {formatCurrency(stats.incomePendiente)}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">{title}</h2>
                    <form onSubmit={handleAdd} className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                        <div className="flex flex-col md:flex-row gap-4">
                            <input className="flex-[2] p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-medium outline-none text-slate-800" placeholder="Descripción" value={newName} onChange={e=>setNewName(e.target.value)} />
                            <div className="flex-1 flex gap-2">
                                <input className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black outline-none text-slate-800" placeholder="$ 0,00" value={newAmount} onChange={e=>setNewAmount(e.target.value)} />
                                {type === 'recurring' && (
                                    <input type="number" min="1" max="31" className="w-20 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black text-center outline-none text-slate-800" placeholder="Día" value={newDueDay} onChange={e=>setNewDueDay(e.target.value)} title="Día de vencimiento" />
                                )}
                                <button className="bg-slate-900 text-white px-8 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all active:scale-95"><Icons.Plus /></button>
                            </div>
                        </div>
                        {type === 'daily' && (
                            <div className="flex flex-col gap-2">
                                <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Fecha del Gasto</label>
                                <input type="date" className="w-full md:w-auto p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-medium outline-none text-slate-800" value={newDate} onChange={e=>setNewDate(e.target.value)} />
                            </div>
                        )}
                        {type !== 'income' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar py-2">
                                {categories.map(cat => (
                                    <button key={cat} type="button" onClick={() => setNewCat(cat)} className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest border transition-all ${newCat === cat ? 'bg-slate-900 text-white border-slate-900 shadow-md scale-105' : 'bg-slate-50 text-slate-500 border-slate-100 hover:border-slate-300'}`}>{cat}</button>
                                ))}
                            </div>
                        )}
                    </form>
                    <div className="desktop-grid">
                        {items.sort((a,b) => {
                            if (type === 'recurring') return (a.dueDay || 0) - (b.dueDay || 0);
                            return new Date(b.date) - new Date(a.date);
                        }).map(item => <ItemCard key={item.id} item={item} onUpdate={onUpdate} onToggle={onToggle} onDelete={onDelete} accent={accent} navDate={navDate} />)}
                    </div>
                </div>
            );
        };

        const ItemCard = ({ item, onUpdate, onToggle, onDelete, accent, navDate }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editName, setEditName] = useState(item.name);
            const [editAmount, setEditAmount] = useState(item.amount);
            const [editDate, setEditDate] = useState(item.date ? item.date.split('T')[0] : '');
            const [editDueDay, setEditDueDay] = useState(item.dueDay || '');
            const [showPartial, setShowPartial] = useState(false);
            const [partialVal, setPartialVal] = useState('');
            
            const isCC = item.name.toLowerCase().includes('visa') || item.name.toLowerCase().includes('master');
            const colorClass = { emerald: 'border-emerald-500', amber: 'border-amber-500', rose: 'border-rose-500' }[accent];

            const today = new Date();
            const currentDay = today.getDate();
            const amountValue = parseFloat(item.amount) || 0;
            const itemDateObj = item.date ? new Date(item.date) : new Date();
            
            const isCurrentMonth = navDate && navDate.getUTCMonth() === today.getUTCMonth() && navDate.getUTCFullYear() === today.getUTCFullYear();
            const isPastMonth = navDate < new Date(today.getUTCFullYear(), today.getUTCMonth(), 1);
            const isOverdue = item.type === 'recurring' && !item.paid && amountValue > 0 && ((isCurrentMonth && currentDay > item.dueDay) || isPastMonth);

            const saveEdit = () => {
                const updates = { name: editName, amount: parseLocaleNumber(editAmount) };
                if (item.type === 'daily') updates.date = editDate + 'T12:00:00Z';
                if (item.type === 'recurring') updates.dueDay = parseInt(editDueDay) || 1;
                onUpdate(item.id, updates);
                setIsEditing(false);
            };

            return (
                <div className={`item-card bg-white p-5 md:p-6 rounded-[2.2rem] border-l-[10px] transition-all animate-fade-in hover:shadow-md ${item.paid && item.type !== 'income' ? 'border-emerald-500 opacity-60' : isOverdue ? 'border-rose-500 ring-2 ring-rose-100 shadow-rose-100' : colorClass} shadow-sm space-y-4`}>
                    <div className="flex justify-between items-start gap-3">
                        <div className="flex-1 min-w-0">
                            {isEditing ? (
                                <div className="space-y-3">
                                    <input className="w-full text-[11px] font-black uppercase p-2 border-b border-slate-200 outline-none focus:border-slate-900" value={editName} onChange={e=>setEditName(e.target.value)} autoFocus />
                                    <div className="flex gap-2">
                                        <input className="flex-1 text-xl font-black p-2 border-b border-slate-200 outline-none focus:border-slate-900" value={editAmount} onChange={e=>setEditAmount(e.target.value)} />
                                        {item.type === 'recurring' && <input type="number" className="w-14 text-lg font-black p-2 border-b border-slate-200 outline-none focus:border-slate-900 text-center" value={editDueDay} onChange={e=>setEditDueDay(e.target.value)} />}
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={saveEdit} className="bg-slate-900 text-white px-3 py-1.5 rounded-xl text-[9px] font-black uppercase">Ok</button>
                                        <button onClick={()=>setIsEditing(false)} className="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase">X</button>
                                    </div>
                                </div>
                            ) : (
                                <div onClick={() => setIsEditing(true)} className="cursor-text">
                                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                                        <span className="text-[10px] font-black text-slate-500 uppercase truncate max-w-[120px]">{item.name}</span>
                                        {item.type !== 'income' && (
                                            <span className={`text-[8px] font-black px-2 py-0.5 rounded-full border uppercase ${isOverdue ? 'bg-rose-500 text-white border-rose-500 animate-pulse' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{item.category}</span>
                                        )}
                                        {item.type === 'income' && !item.paid && (
                                            <span className="text-[8px] font-black px-2 py-0.5 rounded-full bg-amber-50 text-amber-500 border border-amber-100 uppercase">Pendiente</span>
                                        )}
                                    </div>
                                    <p className="text-xl md:text-2xl font-black text-slate-900 tracking-tighter leading-tight">{formatCurrency(item.amount)}</p>
                                    <div className="flex gap-2 mt-2 flex-wrap">
                                        {item.type === 'recurring' && (
                                            <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded border ${isOverdue ? 'bg-rose-50 text-rose-600 border-rose-200' : 'bg-amber-50 text-amber-500 border-amber-100'}`}>
                                                {isOverdue ? "VENCIDO" : `Vence Día ${item.dueDay || '---'}`}
                                            </span>
                                        )}
                                        {item.type === 'daily' && <span className="text-[9px] font-black text-slate-400 uppercase bg-slate-50 px-2 py-0.5 rounded border border-slate-100">{itemDateObj.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', timeZone: 'UTC' })}</span>}
                                        {item.type === 'income' && item.paid && <span className="text-[9px] font-black text-emerald-500 uppercase bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100">Cobrado</span>}
                                    </div>
                                </div>
                            )}
                            {item.paid && item.paymentType === 'partial' && <p className="text-[9px] font-black text-amber-500 uppercase mt-2 italic flex items-center gap-1 leading-none"><span className="w-1 h-1 bg-amber-500 rounded-full animate-pulse"></span> P. Parcial: {formatCurrency(item.paidAmount)}</p>}
                        </div>
                        <div className="flex gap-1.5 shrink-0">
                            {/* Checkbox para cobrar ingresos o pagar gastos */}
                            <div className="flex gap-1">
                                {!item.paid ? (
                                    <>
                                        <button onClick={(e) => { e.stopPropagation(); onToggle(item); }} className={`p-3 rounded-2xl border transition-all shadow-sm ${isOverdue ? 'bg-rose-50 text-rose-500 border-rose-200 hover:bg-rose-500 hover:text-white' : 'border-slate-100 text-slate-400 hover:text-emerald-500'}`}>
                                            {item.type === 'income' ? <Icons.Check /> : <Icons.Check />}
                                        </button>
                                        {isCC && item.type === 'recurring' && <button onClick={(e) => { e.stopPropagation(); setShowPartial(!showPartial); }} className="p-3 rounded-2xl border border-slate-100 text-slate-400 font-black text-xs hover:bg-amber-50 shadow-sm">P</button>}
                                    </>
                                ) : <button onClick={(e) => { e.stopPropagation(); onToggle(item); }} className="p-3 rounded-2xl bg-emerald-500 text-white shadow-lg scale-105 transition-all"><Icons.Check /></button>}
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} className="p-3 rounded-2xl border border-slate-100 text-slate-300 hover:text-rose-500 transition-all shadow-sm"><Icons.Trash /></button>
                        </div>
                    </div>
                    {showPartial && !item.paid && (
                        <div className="flex gap-2 items-end p-4 bg-amber-50/50 rounded-3xl border border-amber-100/50 animate-fade-in" onClick={(e) => e.stopPropagation()}>
                            <input type="text" className="flex-1 p-3 bg-white border border-amber-200 rounded-xl text-xs font-black outline-none shadow-sm text-slate-800" placeholder="Abonado..." value={partialVal} onChange={e => setPartialVal(e.target.value)} />
                            <button onClick={() => {onToggle(item, 'partial', parseLocaleNumber(partialVal)); setShowPartial(false);}} className="bg-amber-500 text-white px-4 py-2.5 rounded-xl text-[9px] font-black uppercase shadow-lg active:scale-90">Ok</button>
                        </div>
                    )}
                </div>
            );
        };

        const AnalysisView = ({ currentMonthItems, stats, items, navDate, isSmall }) => {
            const chartRef = useRef(null);
            const trendRef = useRef(null);
            const chartInstance = useRef(null);
            const trendInstance = useRef(null);
            const [selectedRecurringName, setSelectedRecurringName] = useState("");

            const recurringNames = useMemo(() => {
                const names = [...new Set(items.filter(i => i.type === 'recurring').map(i => i.name))];
                return names.sort();
            }, [items]);

            useEffect(() => {
                if (recurringNames.length > 0 && !selectedRecurringName) setSelectedRecurringName(recurringNames[0]);
            }, [recurringNames]);

            const byCategory = useMemo(() => {
                const cats = {};
                currentMonthItems.forEach(i => {
                    if (i.type === 'income') return;
                    const val = i.paymentType === 'partial' ? (parseFloat(i.paidAmount) || 0) : (parseFloat(i.amount) || 0);
                    cats[i.category || 'General'] = (cats[i.category || 'General'] || 0) + val;
                });
                return Object.entries(cats).sort((a,b) => b[1] - a[1]);
            }, [currentMonthItems]);

            const fullYearData = useMemo(() => {
                const year = navDate.getUTCFullYear();
                const result = Array.from({length: 12}, (_, i) => ({ label: ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"][i], amount: 0 }));
                if (!selectedRecurringName) return result;
                items.forEach(item => {
                    if (item.type === 'recurring' && item.name === selectedRecurringName && item.date) {
                        const d = new Date(item.date);
                        if (d.getUTCFullYear() === year) {
                            const val = item.paymentType === 'partial' ? (parseFloat(item.paidAmount) || 0) : (parseFloat(item.amount) || 0);
                            result[d.getUTCMonth()].amount += val;
                        }
                    }
                });
                return result;
            }, [items, selectedRecurringName, navDate]);

            useEffect(() => {
                if (typeof Chart === 'undefined') return;
                if (chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    chartInstance.current = new Chart(chartRef.current.getContext('2d'), {
                        type: 'doughnut',
                        data: { labels: byCategory.map(c => c[0]), datasets: [{ data: byCategory.map(c => c[1]), backgroundColor: CHART_COLORS, borderWidth: 0 }] },
                        options: { cutout: isSmall ? '85%' : '75%', plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
                    });
                }
                if (trendRef.current && !isSmall) {
                    if (trendInstance.current) trendInstance.current.destroy();
                    trendInstance.current = new Chart(trendRef.current.getContext('2d'), {
                        type: 'bar',
                        data: { labels: fullYearData.map(d => d.label), datasets: [{ label: 'Monto', data: fullYearData.map(d => d.amount), backgroundColor: '#6366f1', borderRadius: 8 }] },
                        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }, responsive: true, maintainAspectRatio: false }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); if (trendInstance.current) trendInstance.current.destroy(); };
            }, [byCategory, fullYearData, isSmall]);

            if (isSmall) {
                return (
                    <div className="flex items-center gap-8 bg-slate-900/5 p-6 rounded-[2.5rem] border border-slate-100">
                        <div className="relative w-32 h-32 shrink-0"><canvas ref={chartRef}></canvas></div>
                        <div className="flex-1 space-y-2 max-h-32 overflow-y-auto no-scrollbar">
                            {byCategory.slice(0, 4).map(([cat, amount], idx) => (
                                <div key={cat} className="flex justify-between items-center text-[10px] font-black uppercase">
                                    <span style={{ color: CHART_COLORS[idx % CHART_COLORS.length] }} className="truncate mr-2">{cat}</span>
                                    <span className="text-slate-900 whitespace-nowrap">{formatCurrency(amount)}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-8 animate-fade-in pb-10">
                    <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-slate-100 md:grid md:grid-cols-2 md:gap-12 items-center">
                        <div className="flex flex-col items-center mb-8 md:mb-0">
                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-8 text-center">Gastos por Categoría</h3>
                            <div className="relative w-64 h-64 md:w-80 md:h-80 mx-auto">
                                <canvas ref={chartRef}></canvas>
                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase">Mes Actual</p>
                                    <p className="text-2xl font-black text-slate-900 tracking-tight leading-none">{formatCurrency(stats.totalSpent)}</p>
                                </div>
                            </div>
                        </div>
                        <div className="w-full space-y-4">
                            {byCategory.length === 0 ? <p className="text-sm text-slate-400 italic text-center italic">Sin gastos registrados.</p> : byCategory.map(([cat, amount], idx) => (
                                <div key={cat} className="space-y-2">
                                    <div className="flex justify-between items-center text-[11px] font-black uppercase">
                                        <span style={{ color: CHART_COLORS[idx % CHART_COLORS.length] }}>{cat}</span>
                                        <span className="text-slate-900 font-bold">{formatCurrency(amount)}</span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div className="h-full transition-all duration-1000" style={{ width: `${(amount / (stats.totalSpent || 1)) * 100}%`, backgroundColor: CHART_COLORS[idx % CHART_COLORS.length] }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div><h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center md:text-left">Evolución Anual</h3><h4 className="text-xl font-black text-slate-900 tracking-tight text-center md:text-left">Historial Gastos Fijos</h4></div>
                            <select value={selectedRecurringName} onChange={e => setSelectedRecurringName(e.target.value)} className="w-full md:w-auto p-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black text-slate-800 outline-none focus:ring-2 focus:ring-indigo-200 transition-all cursor-pointer">
                                {recurringNames.length === 0 ? <option>Sin gastos fijos</option> : recurringNames.map(name => <option key={name} value={name}>{name}</option>)}
                            </select>
                        </div>
                        <div className="relative h-72 w-full"><canvas ref={trendRef}></canvas></div>
                        <div className="mt-6 flex justify-center"><p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Año: {navDate.getUTCFullYear()}</p></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
