<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platita - Mi Control de Finanzas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        svg { width: 1.5rem; height: 1.5rem; display: inline-block; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input:focus { outline: none; border-color: #0f172a; }
        
        @media (min-width: 768px) {
            .main-container { max-width: 1024px; margin: 0 auto; }
            .desktop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        const DEFAULT_CATEGORIES = ["Hogar", "Servicios", "Impuestos", "Salud", "Educación", "Tarjetas", "Ocio", "Comida", "General"];

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Analysis: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2v2m3 10v-3a2 2 0 012-2h2a2 2 0 012 2v3m2 0h-5m-9 0H3m9 0a9 9 0 0118 0v1H3v-1z" /></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val || 0);
        const parseLocaleNumber = (str) => {
            if (!str) return 0;
            const clean = str.toString().replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [navDate, setNavDate] = useState(new Date());
            const [hideBalance, setHideBalance] = useState(false);
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [authError, setAuthError] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const unsubscribe = db.collection(path).onSnapshot(snap => {
                    setItems(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                
                db.collection(`artifacts/${appId}/users/${user.uid}/settings`).doc('categories').get().then(doc => {
                    if (doc.exists) setCategories([...DEFAULT_CATEGORIES, ...doc.data().custom]);
                });
                
                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const month = navDate.getMonth();
                const year = navDate.getFullYear();
                const currentMonthItems = items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === month && d.getFullYear() === year;
                });

                const today = new Date();
                const currentDay = today.getDate();
                const isCurrentMonth = month === today.getMonth() && year === today.getFullYear();
                const isPastMonth = navDate < new Date(today.getFullYear(), today.getMonth(), 1);

                const income = currentMonthItems.filter(i => i.type === 'income').reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                const recPaid = currentMonthItems.filter(i => i.type === 'recurring' && i.paid).reduce((a, c) => a + (c.paymentType === 'partial' ? (parseFloat(c.paidAmount) || 0) : (parseFloat(c.amount) || 0)), 0);
                const recPending = currentMonthItems.filter(i => i.type === 'recurring' && !i.paid).reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                const daily = currentMonthItems.filter(i => i.type === 'daily').reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                
                // Filtramos gastos sin importe asignado para "Próximos Vencimientos"
                const upcoming = currentMonthItems
                    .filter(i => i.type === 'recurring' && !i.paid && (parseFloat(i.amount) > 0))
                    .map(i => ({
                        ...i,
                        isOverdue: (isCurrentMonth && currentDay > i.dueDay) || isPastMonth
                    }))
                    .sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99))
                    .slice(0, 5);

                return { income, recPaid, recPending, daily, balance: income - recPaid - daily, totalSpent: recPaid + daily, currentMonthItems, upcoming };
            }, [items, navDate]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(loginData.email, loginData.password);
                } catch (e) {
                    setAuthError("Email o contraseña incorrectos");
                    setLoading(false);
                }
            };

            const addItem = async (data) => {
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                await db.collection(path).add({
                    ...data,
                    date: data.date || navDate.toISOString(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const updateItem = async (id, data) => {
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                await db.collection(path).doc(id).update(data);
            };

            const toggleItem = async (item, pType = 'total', pAmount = 0) => {
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const docRef = db.collection(path).doc(item.id);
                if (item.paid) {
                    await docRef.update({ paid: false, paymentType: null, paidAmount: 0 });
                } else {
                    const isPartial = pType === 'partial';
                    await docRef.update({ 
                        paid: true, 
                        paymentType: pType, 
                        paidAmount: isPartial ? pAmount : item.amount 
                    });
                    
                    if (isPartial && (item.name.toLowerCase().includes('visa') || item.name.toLowerCase().includes('master'))) {
                        const remainder = item.amount - pAmount;
                        if (remainder > 0) {
                            const nextMonth = new Date(navDate);
                            nextMonth.setMonth(nextMonth.getMonth() + 1);
                            await db.collection(path).add({
                                name: `Saldo Pendiente ${item.name}`,
                                amount: remainder,
                                type: 'recurring',
                                category: 'Tarjetas',
                                paid: false,
                                dueDay: item.dueDay || 1,
                                date: nextMonth.toISOString()
                            });
                        }
                    }
                }
            };

            const copyPreviousMonth = async () => {
                const prevDate = new Date(navDate);
                prevDate.setMonth(prevDate.getMonth() - 1);
                const prevMonth = prevDate.getMonth();
                const prevYear = prevDate.getFullYear();

                const prevItems = items.filter(item => {
                    const d = new Date(item.date);
                    return d.getMonth() === prevMonth && d.getFullYear() === prevYear && (item.type === 'income' || item.type === 'recurring');
                });

                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const batch = db.batch();
                prevItems.forEach(item => {
                    const newDoc = db.collection(path).doc();
                    batch.set(newDoc, {
                        ...item,
                        id: undefined,
                        amount: 0,
                        paid: item.type === 'income',
                        paymentType: null,
                        paidAmount: 0,
                        date: navDate.toISOString(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                await batch.commit();
            };

            const addCategory = async (cat) => {
                if (!cat || categories.includes(cat)) return;
                const newCats = [...categories, cat];
                setCategories(newCats);
                const custom = newCats.filter(c => !DEFAULT_CATEGORIES.includes(c));
                await db.collection(`artifacts/${appId}/users/${user.uid}/settings`).doc('categories').set({ custom });
            };

            const removeCategory = async (cat) => {
                if (DEFAULT_CATEGORIES.includes(cat)) return;
                const newCats = categories.filter(c => c !== cat);
                setCategories(newCats);
                const custom = newCats.filter(c => !DEFAULT_CATEGORIES.includes(c));
                await db.collection(`artifacts/${appId}/users/${user.uid}/settings`).doc('categories').set({ custom });
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-white"><div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 animate-fade-in">
                    <div className="bg-slate-900 text-white p-5 rounded-[2.5rem] mb-6 shadow-2xl"><Icons.Wallet /></div>
                    <h1 className="text-4xl font-black text-slate-900 mb-2 text-center tracking-tighter leading-none">Platita</h1>
                    <p className="text-slate-500 mb-10 text-center text-sm font-medium">Gestión inteligente de tus gastos.</p>
                    <form onSubmit={handleLogin} className="w-full max-w-xs space-y-4">
                        <input type="email" required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="Email" value={loginData.email} onChange={e=>setLoginData({...loginData, email: e.target.value})} />
                        <input type="password" required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="Contraseña" value={loginData.password} onChange={e=>setLoginData({...loginData, password: e.target.value})} />
                        {authError && <p className="text-rose-500 text-xs font-bold text-center">{authError}</p>}
                        <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-xl active:scale-95 transition-transform">Ingresar</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 bg-slate-50 animate-fade-in relative">
                    <header className="bg-white border-b border-slate-100 md:rounded-b-[3rem] shadow-sm mb-6">
                        <div className="main-container p-5">
                            <div className="flex items-center justify-between mb-6">
                                <h1 className="text-2xl md:text-3xl font-black text-slate-900 flex items-center gap-2"><span className="bg-slate-900 text-white px-2 py-1 rounded-xl">P</span> Platita</h1>
                                <button onClick={() => auth.signOut()} className="text-slate-300 hover:text-rose-500 transition-colors flex items-center gap-2 text-sm font-bold">
                                    <span className="hidden md:inline">Cerrar Sesión</span> <Icons.Logout />
                                </button>
                            </div>
                            
                            <div className="md:grid md:grid-cols-2 md:gap-8 items-center">
                                <div className="mb-6 md:mb-0">
                                    <div className="flex items-center justify-between bg-slate-100 p-1 rounded-full mb-5">
                                        <button onClick={() => setNavDate(new Date(navDate.setMonth(navDate.getMonth()-1)))} className="p-2 hover:bg-white rounded-full transition-all"><Icons.ChevronLeft /></button>
                                        <span className="text-[12px] md:text-sm font-black text-slate-700 uppercase tracking-widest">{navDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' })}</span>
                                        <button onClick={() => setNavDate(new Date(navDate.setMonth(navDate.getMonth()+1)))} className="p-2 hover:bg-white rounded-full transition-all"><Icons.ChevronRight /></button>
                                    </div>

                                    <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden flex flex-col items-center">
                                        <button onClick={() => setHideBalance(!hideBalance)} className="absolute top-4 right-6 text-slate-500 hover:text-white p-2 text-[10px] font-bold uppercase tracking-widest transition-all">
                                            {hideBalance ? "Mostrar" : "Ocultar"}
                                        </button>
                                        <p className="text-slate-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-1">Saldo Disponible</p>
                                        <h2 className="text-4xl md:text-5xl font-black mb-6 tracking-tight">{hideBalance ? "$ ••••••" : formatCurrency(stats.balance)}</h2>
                                        <div className="grid grid-cols-2 gap-8 border-t border-white/10 pt-6 w-full text-center">
                                            <div><p className="text-slate-500 text-[10px] uppercase font-black mb-1">Ingresos</p><p className="text-emerald-400 font-black text-lg">{hideBalance ? "---" : formatCurrency(stats.income)}</p></div>
                                            <div><p className="text-slate-500 text-[10px] uppercase font-black mb-1">Egresos</p><p className="text-rose-400 font-black text-lg">{hideBalance ? "---" : formatCurrency(stats.totalSpent)}</p></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="hidden md:block">
                                    <AnalysisView currentMonthItems={stats.currentMonthItems} stats={stats} isSmall />
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="main-container px-5 space-y-8">
                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-center">
                                    <button onClick={copyPreviousMonth} className="bg-slate-900 text-white px-6 py-2 rounded-xl font-black text-[9px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                                        <Icons.Copy /> Copiar conceptos anteriores
                                    </button>
                                </div>

                                <div className="bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center shrink-0 shadow-sm"><Icons.Calendar /></div>
                                        <div className="flex-1">
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Pendientes Próximos</p>
                                            <p className="text-3xl font-black text-slate-800">{formatCurrency(stats.recPending)}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {stats.upcoming?.length > 0 ? stats.upcoming.map(item => (
                                            <div key={item.id} className={`flex justify-between items-center p-4 rounded-2xl border ${item.isOverdue ? 'bg-rose-50 border-rose-200' : 'bg-slate-50 border-slate-100'}`}>
                                                <div className="min-w-0">
                                                    <span className="text-xs font-black text-slate-600 uppercase truncate block mr-2">{item.name}</span>
                                                    {item.isOverdue && <span className="text-[8px] font-black text-rose-500 uppercase tracking-tighter">Vencido</span>}
                                                </div>
                                                <span className={`${item.isOverdue ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700'} px-3 py-1 rounded-lg text-[10px] font-black whitespace-nowrap ml-2`}>Día {item.dueDay}</span>
                                            </div>
                                        )) : <p className="text-slate-400 text-xs font-medium italic">No hay pagos pendientes con importe asignado.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'analysis' && <AnalysisView currentMonthItems={stats.currentMonthItems} stats={stats} />}
                        
                        {(view === 'income' || view === 'recurring' || view === 'daily') && (
                            <ListView 
                                title={view === 'income' ? 'Ingresos / Cobros' : view === 'recurring' ? 'Gastos Fijos' : 'Gastos Diarios'}
                                type={view}
                                items={stats.currentMonthItems.filter(i => i.type === view)}
                                categories={categories}
                                onAdd={addItem}
                                onUpdate={updateItem}
                                onToggle={toggleItem}
                                onDelete={id => db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).doc(id).delete()}
                                accent={view === 'income' ? 'emerald' : view === 'recurring' ? 'amber' : 'rose'}
                                stats={stats}
                                navDate={navDate}
                            />
                        )}

                        {view === 'settings' && (
                            <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-slate-100 space-y-8 animate-fade-in">
                                <h2 className="text-2xl font-black text-slate-900 tracking-tight">Configuración</h2>
                                <div className="space-y-4">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tus Etiquetas</p>
                                    <div className="flex flex-wrap gap-2">
                                        {categories.map(c => (
                                            <span key={c} className="group relative bg-slate-50 border border-slate-100 px-4 py-2 rounded-full text-xs font-bold text-slate-600 shadow-sm flex items-center gap-2">
                                                {c}
                                                {!DEFAULT_CATEGORIES.includes(c) && (
                                                    <button onClick={() => removeCategory(c)} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                        <Icons.Close />
                                                    </button>
                                                )}
                                            </span>
                                        ))}
                                    </div>
                                    <form onSubmit={e => { e.preventDefault(); addCategory(e.target.cat.value); e.target.reset(); }} className="flex gap-2 max-w-sm pt-2">
                                        <input name="cat" className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm" placeholder="Nueva etiqueta..." />
                                        <button className="bg-slate-900 text-white px-6 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all">+</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-50">
                        <div className="main-container flex justify-around p-4 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Inicio" />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Cobros" />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="Fijos" />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="Diarios" />
                            <NavTab active={view === 'analysis'} onClick={() => setView('analysis')} icon={<Icons.Analysis />} label="Análisis" />
                            <NavTab active={view === 'settings'} onClick={() => setView('settings')} icon={<Icons.Settings />} label="Config" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl flex flex-col items-center gap-1 transition-all md:px-6 md:hover:bg-slate-50 ${active ? 'bg-slate-900 text-white shadow-lg scale-105' : 'text-slate-400'}`}>
                {icon} <span className="text-[8px] md:text-[10px] font-black uppercase tracking-widest">{label}</span>
            </button>
        );

        const ListView = ({ title, type, items, categories, onAdd, onUpdate, onToggle, onDelete, accent, stats, navDate }) => {
            const [newName, setNewName] = useState('');
            const [newAmount, setNewAmount] = useState('');
            const [newCat, setNewCat] = useState('General');
            const [newDueDay, setNewDueDay] = useState('1');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName) return;
                
                const data = { 
                    name: newName, 
                    amount: parseLocaleNumber(newAmount), 
                    category: newCat, 
                    type, 
                    paid: type === 'income' 
                };

                if (type === 'recurring') {
                    data.dueDay = parseInt(newDueDay) || 1;
                    const d = new Date(navDate);
                    d.setDate(data.dueDay);
                    data.date = d.toISOString();
                } else if (type === 'daily') {
                    data.date = new Date(newDate).toISOString();
                }

                onAdd(data);
                setNewName(''); setNewAmount('');
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    {type === 'daily' && (
                        <div className="bg-rose-50 border border-rose-100 p-6 md:p-8 rounded-[2.5rem] flex items-center gap-6 shadow-sm mb-2">
                            <div className="w-14 h-14 bg-rose-500 text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg"><Icons.Shopping /></div>
                            <div>
                                <p className="text-rose-400 text-[10px] font-black uppercase tracking-widest mb-1">Gasto Diario del Mes</p>
                                <p className="text-3xl md:text-4xl font-black text-rose-700 tracking-tight">{formatCurrency(stats.daily)}</p>
                            </div>
                        </div>
                    )}
                    <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">{title}</h2>
                    <form onSubmit={handleAdd} className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                        <div className="flex flex-col md:flex-row gap-4">
                            <input className="flex-[2] p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-medium" placeholder="Descripción" value={newName} onChange={e=>setNewName(e.target.value)} />
                            <div className="flex-1 flex gap-2">
                                <input className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black" placeholder="$ 0,00" value={newAmount} onChange={e=>setNewAmount(e.target.value)} />
                                {type === 'recurring' && (
                                    <input type="number" min="1" max="31" className="w-20 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black text-center" placeholder="Día" value={newDueDay} onChange={e=>setNewDueDay(e.target.value)} title="Día de vencimiento" />
                                )}
                                <button className="bg-slate-900 text-white px-8 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all"><Icons.Plus /></button>
                            </div>
                        </div>
                        {type === 'daily' && (
                            <div className="flex flex-col gap-2">
                                <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Fecha del Gasto</label>
                                <input type="date" className="w-full md:w-auto p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-medium" value={newDate} onChange={e=>setNewDate(e.target.value)} />
                            </div>
                        )}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-2">
                            {categories.map(cat => (
                                <button key={cat} type="button" onClick={() => setNewCat(cat)} className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest border transition-all ${newCat === cat ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-slate-50 text-slate-500 border-slate-100 hover:border-slate-300'}`}>{cat}</button>
                            ))}
                        </div>
                    </form>
                    <div className="desktop-grid">
                        {items.sort((a,b) => {
                            if (type === 'recurring') return (a.dueDay || 0) - (b.dueDay || 0);
                            return new Date(b.date) - new Date(a.date);
                        }).map(item => <ItemCard key={item.id} item={item} onUpdate={onUpdate} onToggle={onToggle} onDelete={onDelete} accent={accent} navDate={navDate} />)}
                    </div>
                </div>
            );
        };

        const ItemCard = ({ item, onUpdate, onToggle, onDelete, accent, navDate }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editName, setEditName] = useState(item.name);
            const [editAmount, setEditAmount] = useState(item.amount);
            const [editDate, setEditDate] = useState(item.date ? item.date.split('T')[0] : '');
            const [editDueDay, setEditDueDay] = useState(item.dueDay || '');
            const [showPartial, setShowPartial] = useState(false);
            const [partialVal, setPartialVal] = useState('');
            
            const isCC = item.name.toLowerCase().includes('visa') || item.name.toLowerCase().includes('master');
            const colorClass = { emerald: 'border-emerald-500', amber: 'border-amber-500', rose: 'border-rose-500' }[accent];

            // Lógica de vencimiento
            const today = new Date();
            const currentDay = today.getDate();
            const isCurrentMonth = navDate && navDate.getMonth() === today.getMonth() && navDate.getFullYear() === today.getFullYear();
            const isPastMonth = navDate && navDate < new Date(today.getFullYear(), today.getMonth(), 1);
            const isOverdue = item.type === 'recurring' && !item.paid && ((isCurrentMonth && currentDay > item.dueDay) || isPastMonth);

            const saveEdit = () => {
                const updates = { name: editName, amount: parseLocaleNumber(editAmount) };
                if (item.type === 'daily') updates.date = new Date(editDate).toISOString();
                if (item.type === 'recurring') updates.dueDay = parseInt(editDueDay) || 1;
                onUpdate(item.id, updates);
                setIsEditing(false);
            };

            return (
                <div className={`bg-white p-6 rounded-[2.2rem] border-l-[10px] transition-all animate-fade-in hover:shadow-md ${item.paid && item.type !== 'income' ? 'border-emerald-500 opacity-60' : isOverdue ? 'border-rose-500 ring-2 ring-rose-100 shadow-rose-100' : colorClass} shadow-sm space-y-4`}>
                    <div className="flex justify-between items-start gap-4">
                        <div className="flex-1 min-w-0">
                            {isEditing ? (
                                <div className="space-y-3">
                                    <input className="w-full text-[11px] font-black uppercase p-2 border-b border-slate-200 outline-none focus:border-slate-900" value={editName} onChange={e=>setEditName(e.target.value)} autoFocus />
                                    <div className="flex gap-2">
                                        <input className="flex-1 text-2xl font-black p-2 border-b border-slate-200 outline-none focus:border-slate-900" value={editAmount} onChange={e=>setEditAmount(e.target.value)} />
                                        {item.type === 'recurring' && <input type="number" className="w-16 text-lg font-black p-2 border-b border-slate-200 outline-none focus:border-slate-900" value={editDueDay} onChange={e=>setEditDueDay(e.target.value)} title="Día de vto" />}
                                    </div>
                                    {item.type === 'daily' && <input type="date" className="w-full text-xs font-black p-2 border border-slate-100 rounded-xl" value={editDate} onChange={e=>setEditDate(e.target.value)} />}
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={saveEdit} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Guardar</button>
                                        <button onClick={()=>setIsEditing(false)} className="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Cancelar</button>
                                    </div>
                                </div>
                            ) : (
                                <div onClick={() => setIsEditing(true)} className="cursor-text">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="text-[10px] font-black text-slate-500 uppercase truncate">{item.name}</span>
                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded-full border uppercase ${isOverdue ? 'bg-rose-500 text-white border-rose-500 animate-pulse' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{item.category}</span>
                                    </div>
                                    <p className="text-2xl font-black text-slate-900 tracking-tighter">{formatCurrency(item.amount)}</p>
                                    <div className="flex gap-2 mt-2">
                                        {item.type === 'recurring' && (
                                            <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded border ${isOverdue ? 'bg-rose-50 text-rose-600 border-rose-200' : 'bg-amber-50 text-amber-500 border-amber-100'}`}>
                                                {isOverdue ? "¡VENCIDO!" : `Vence Día ${item.dueDay || '---'}`}
                                            </span>
                                        )}
                                        {item.type === 'daily' && <span className="text-[9px] font-black text-slate-400 uppercase bg-slate-50 px-2 py-0.5 rounded border border-slate-100">{new Date(item.date).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })}</span>}
                                    </div>
                                </div>
                            )}
                            {item.paid && item.paymentType === 'partial' && <p className="text-[10px] font-black text-amber-500 uppercase mt-3 italic flex items-center gap-1"><span className="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span> Abonado: {formatCurrency(item.paidAmount)}</p>}
                        </div>
                        <div className="flex gap-2 shrink-0">
                            {item.type !== 'income' && (
                                <div className="flex gap-1">
                                    {!item.paid ? (
                                        <>
                                            <button onClick={() => onToggle(item)} className={`p-3.5 rounded-2xl border transition-all shadow-sm ${isOverdue ? 'bg-rose-50 text-rose-500 border-rose-200 hover:bg-rose-500 hover:text-white' : 'border-slate-100 text-slate-400 hover:text-emerald-500 hover:bg-emerald-50'}`}><Icons.Check /></button>
                                            {isCC && <button onClick={() => setShowPartial(!showPartial)} className="p-3.5 rounded-2xl border border-slate-100 text-slate-400 font-black text-xs hover:bg-amber-50 transition-all shadow-sm">P</button>}
                                        </>
                                    ) : <button onClick={() => onToggle(item)} className="p-3.5 rounded-2xl bg-emerald-500 text-white shadow-lg scale-105 transition-all"><Icons.Check /></button>}
                                </div>
                            )}
                            <button onClick={() => onDelete(item.id)} className="p-3.5 rounded-2xl border border-slate-100 text-slate-300 hover:text-rose-500 hover:bg-rose-50 transition-all shadow-sm"><Icons.Trash /></button>
                        </div>
                    </div>
                    {showPartial && !item.paid && (
                        <div className="flex gap-2 items-end p-4 bg-amber-50/50 rounded-3xl border border-amber-100/50 animate-fade-in">
                            <input type="text" className="flex-1 p-3 bg-white border border-amber-200 rounded-xl text-xs font-black outline-none shadow-sm" placeholder="Monto parcial..." value={partialVal} onChange={e => setPartialVal(e.target.value)} />
                            <button onClick={() => {onToggle(item, 'partial', parseLocaleNumber(partialVal)); setShowPartial(false);}} className="bg-amber-500 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg hover:bg-amber-600 transition-all">Confirmar</button>
                        </div>
                    )}
                </div>
            );
        };

        const AnalysisView = ({ currentMonthItems, stats, isSmall }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const byCategory = useMemo(() => {
                const cats = {};
                currentMonthItems.forEach(i => {
                    if (i.type === 'income') return;
                    const val = i.paymentType === 'partial' ? (parseFloat(i.paidAmount) || 0) : (parseFloat(i.amount) || 0);
                    cats[i.category || 'General'] = (cats[i.category || 'General'] || 0) + val;
                });
                return Object.entries(cats).sort((a,b) => b[1] - a[1]);
            }, [currentMonthItems]);

            useEffect(() => {
                if (typeof Chart === 'undefined' || !chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: byCategory.map(c => c[0]),
                        datasets: [{ 
                            data: byCategory.map(c => c[1]), 
                            backgroundColor: ['#0f172a', '#1e293b', '#334155', '#475569', '#64748b', '#94a3b8', '#cbd5e1', '#e2e8f0', '#f1f5f9'], 
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: { 
                        cutout: isSmall ? '85%' : '75%', 
                        plugins: { legend: { display: false } }, 
                        responsive: true, 
                        maintainAspectRatio: false,
                        animation: { animateRotate: true, animateScale: true }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [byCategory, isSmall]);

            if (isSmall) {
                return (
                    <div className="flex items-center gap-8 bg-slate-900/5 p-6 rounded-[2.5rem] border border-slate-100">
                        <div className="relative w-32 h-32 shrink-0">
                            <canvas ref={chartRef}></canvas>
                        </div>
                        <div className="flex-1 space-y-2 max-h-32 overflow-y-auto no-scrollbar">
                            {byCategory.slice(0, 4).map(([cat, amount]) => (
                                <div key={cat} className="flex justify-between items-center text-[10px] font-black uppercase">
                                    <span className="text-slate-400">{cat}</span>
                                    <span className="text-slate-900">{formatCurrency(amount)}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-slate-100 md:grid md:grid-cols-2 md:gap-12 items-center">
                    <div className="flex flex-col items-center mb-8 md:mb-0">
                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-8">Egresos por Categoría</h3>
                        <div className="relative w-64 h-64 md:w-80 md:h-80">
                            <canvas ref={chartRef}></canvas>
                            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                <p className="text-[10px] font-black text-slate-400 uppercase">Total Mes</p>
                                <p className="text-3xl font-black text-slate-900 tracking-tight">{formatCurrency(stats.totalSpent)}</p>
                            </div>
                        </div>
                    </div>
                    <div className="w-full space-y-4">
                        {byCategory.length === 0 ? (
                            <p className="text-sm text-slate-400 italic text-center">Sin datos registrados.</p>
                        ) : byCategory.map(([cat, amount]) => (
                            <div key={cat} className="space-y-2">
                                <div className="flex justify-between items-center text-[11px] font-black uppercase">
                                    <span className="text-slate-500">{cat}</span>
                                    <span className="text-slate-900">{formatCurrency(amount)}</span>
                                </div>
                                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div className="h-full bg-slate-900 transition-all duration-1000" style={{ width: `${(amount / (stats.totalSpent || 1)) * 100}%` }}></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
