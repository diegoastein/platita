<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control de Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val || 0);

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            // Estado para el mes y año seleccionados
            const [navDate, setNavDate] = useState(new Date());

            const selectedMonth = navDate.getMonth();
            const selectedYear = navDate.getFullYear();

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    setLoading(true);
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    setError(`Error al ingresar: ${e.message}`);
                    setLoading(false);
                }
            };

            const getUserCollection = () => {
                if (!user) return null;
                return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
            };

            useEffect(() => {
                const col = getUserCollection();
                if (!col) {
                    setItems([]);
                    return;
                }
                
                const unsubscribe = col.onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(data);
                    setLoading(false);
                }, (err) => {
                    setError(`Error de base de datos: ${err.message}`);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const filtered = items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });

                const income = filtered.filter(i => i.type === 'income').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPaid = filtered.filter(i => i.type === 'recurring' && i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPending = filtered.filter(i => i.type === 'recurring' && !i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const daily = filtered.filter(i => i.type === 'daily').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const totalSpent = recPaid + daily;
                const spendRatio = income > 0 ? (totalSpent / income) * 100 : 0;

                return { income, recPaid, recPending, daily, balance: income - recPaid - daily, totalSpent, spendRatio };
            }, [items, selectedMonth, selectedYear]);

            const changeMonth = (offset) => {
                setNavDate(prev => {
                    const next = new Date(prev);
                    next.setMonth(next.getMonth() + offset);
                    return next;
                });
            };

            const add = async (data) => {
                const col = getUserCollection();
                if (!col) return;
                await col.add({
                    ...data,
                    userId: user.uid,
                    date: navDate.toISOString(), // Guardar con la fecha del mes que estamos viendo
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const toggle = async (item) => {
                const col = getUserCollection();
                if (!col) return;
                await col.doc(item.id).update({ paid: !item.paid });
            };

            const del = async (id) => {
                const col = getUserCollection();
                if (!col) return;
                if (confirm("¿Eliminar este registro?")) {
                    await col.doc(id).delete();
                }
            };

            const updateField = async (id, field, value) => {
                const col = getUserCollection();
                if (!col) return;
                const updateData = {};
                updateData[field] = field === 'amount' ? (parseFloat(value) || 0) : value;
                await col.doc(id).update(updateData);
            };

            if (loading) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-6 text-center">
                    <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-500 font-medium text-sm">Sincronizando...</p>
                </div>
            );

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 text-center animate-fade-in">
                    <div className="bg-blue-600 text-white p-4 rounded-3xl mb-6 shadow-xl shadow-blue-100">
                        <Icons.Wallet />
                    </div>
                    <h1 className="text-2xl font-bold text-slate-900 mb-2 tracking-tight">Biyuya Personal</h1>
                    <p className="text-slate-500 text-sm mb-8">Administrá tus sueldos y gastos con sincronización en tiempo real.</p>
                    <button 
                        onClick={handleGoogleLogin} 
                        className="bg-slate-900 text-white w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-transform"
                    >
                        <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Ingresar con Google
                    </button>
                    {error && <p className="text-rose-500 text-xs mt-4">{error}</p>}
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-28 animate-fade-in">
                    {/* Header con Navegación de Fecha */}
                    <header className="bg-white p-6 sticky top-0 z-20 border-b border-slate-100 shadow-sm">
                        <div className="flex justify-between items-center mb-5">
                            <h1 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                <span className="bg-blue-600 text-white p-1 rounded">BP</span>
                                Biyuya
                            </h1>
                            <div className="flex items-center gap-3 bg-slate-100 px-3 py-1.5 rounded-full">
                                <button onClick={() => changeMonth(-1)} className="text-slate-500 p-0.5 hover:bg-white rounded-full transition-colors"><Icons.ChevronLeft /></button>
                                <span className="text-xs font-bold text-slate-700 uppercase tracking-tighter min-w-[80px] text-center">
                                    {navDate.toLocaleString('es-ES', { month: 'short', year: 'numeric' })}
                                </span>
                                <button onClick={() => changeMonth(1)} className="text-slate-500 p-0.5 hover:bg-white rounded-full transition-colors"><Icons.ChevronRight /></button>
                            </div>
                            <button onClick={() => auth.signOut()} className="text-slate-300 hover:text-rose-500 transition-colors">
                                <Icons.Logout />
                            </button>
                        </div>

                        <div className="bg-slate-900 rounded-[2rem] p-6 text-white card-shadow relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 opacity-10 rounded-full -mr-16 -mt-16"></div>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Disponible</p>
                            <h2 className="text-4xl font-bold mb-5 tracking-tight">{formatCurrency(stats.balance)}</h2>
                            
                            {/* Barra de Progreso Gastado */}
                            <div className="w-full bg-slate-800 h-1.5 rounded-full mb-5 overflow-hidden">
                                <div 
                                    className={`h-full transition-all duration-700 ${stats.spendRatio > 90 ? 'bg-rose-500' : 'bg-blue-500'}`}
                                    style={{ width: `${Math.min(stats.spendRatio, 100)}%` }}
                                ></div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 border-t border-slate-800 pt-4">
                                <div>
                                    <p className="text-slate-500 text-[10px] uppercase font-bold">Ingresos</p>
                                    <p className="text-emerald-400 font-bold text-sm">{formatCurrency(stats.income)}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-500 text-[10px] uppercase font-bold">Consumido</p>
                                    <p className="text-rose-400 font-bold text-sm">{formatCurrency(stats.totalSpent)}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 space-y-6">
                        {view === 'dashboard' && <Summary stats={stats} />}
                        {view === 'income' && (
                            <ListView 
                                title="Fuentes de Ingreso" 
                                type="income" 
                                items={items.filter(i => {
                                    const d = i.date ? new Date(i.date) : new Date();
                                    return i.type === 'income' && d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                                })} 
                                onAdd={add} 
                                onDelete={del} 
                                onUpdate={updateField} 
                                placeholder="Ej: Sueldo Empresa A" 
                                accent="emerald" 
                            />
                        )}
                        {view === 'recurring' && (
                            <ListView 
                                title="Gastos Fijos (Comprometidos)" 
                                type="recurring" 
                                items={items.filter(i => {
                                    const d = i.date ? new Date(i.date) : new Date();
                                    return i.type === 'recurring' && d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                                })} 
                                onAdd={add} 
                                onDelete={del} 
                                onUpdate={updateField} 
                                onToggle={toggle} 
                                placeholder="Ej: Expensas o Internet" 
                                accent="amber" 
                                showCheck 
                            />
                        )}
                        {view === 'daily' && (
                            <ListView 
                                title="Gastos del Día" 
                                type="daily" 
                                items={items.filter(i => {
                                    const d = i.date ? new Date(i.date) : new Date();
                                    return i.type === 'daily' && d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                                })} 
                                onAdd={add} 
                                onDelete={del} 
                                onUpdate={updateField} 
                                placeholder="Ej: Super, Nafta, Café..." 
                                accent="rose" 
                                showCategories
                            />
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-30">
                        <div className="max-w-md mx-auto flex justify-between px-6 py-4 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon }) => (
            <button onClick={onClick} className={`p-3.5 rounded-2xl transition-all duration-300 ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-100 scale-110' : 'text-slate-400 hover:bg-slate-100'}`}>
                {icon}
            </button>
        );

        const Summary = ({ stats }) => (
            <div className="space-y-4 animate-fade-in">
                <div className="bg-white p-5 rounded-2xl border border-slate-100 flex items-center justify-between card-shadow">
                    <div className="w-12 h-12 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center"><Icons.Calendar /></div>
                    <div className="flex-1 ml-4">
                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">A pagar pronto</p>
                        <p className="text-lg font-bold text-slate-800">{formatCurrency(stats.recPending)}</p>
                    </div>
                </div>
                <div className="bg-white p-5 rounded-2xl border border-slate-100 flex items-center justify-between card-shadow">
                    <div className="w-12 h-12 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center"><Icons.Shopping /></div>
                    <div className="flex-1 ml-4">
                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Gastos Diarios</p>
                        <p className="text-lg font-bold text-slate-800">{formatCurrency(stats.daily)}</p>
                    </div>
                </div>
                <div className="p-8 text-center bg-indigo-50 rounded-[2.5rem] border border-indigo-100 mt-6">
                    <p className="text-indigo-800 text-sm font-medium italic">"Tus ahorros son tu libertad futura."</p>
                </div>
            </div>
        );

        const ListView = ({ title, type, items, onAdd, onDelete, onUpdate, onToggle, placeholder, accent, showCheck, showCategories }) => {
            const [newName, setNewName] = useState('');
            const [newAmount, setNewAmount] = useState('');
            const [newCategory, setNewCategory] = useState('General');

            const categories = ["General", "Comida", "Transporte", "Hogar", "Ocio", "Salud"];

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName || !newAmount) return;
                onAdd({ 
                    name: newName, 
                    amount: parseFloat(newAmount), 
                    category: newCategory,
                    type, 
                    paid: type === 'income' 
                });
                setNewName(''); setNewAmount('');
            };

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center ml-1">
                        <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{title}</h2>
                        <span className="text-[10px] font-bold text-blue-500">{items.length} regs.</span>
                    </div>

                    <form onSubmit={handleAdd} className="bg-white p-4 rounded-[1.5rem] border border-slate-200 card-shadow flex flex-col gap-3">
                        <input className="w-full p-3 bg-slate-50 border-none rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" 
                            placeholder={placeholder} value={newName} onChange={e => setNewName(e.target.value)} />
                        
                        {showCategories && (
                            <div className="flex gap-2 overflow-x-auto py-1 no-scrollbar">
                                {categories.map(cat => (
                                    <button key={cat} type="button" onClick={() => setNewCategory(cat)} 
                                        className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all whitespace-nowrap ${newCategory === cat ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        )}

                        <div className="flex gap-2">
                            <div className="relative flex-1">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 font-bold">$</span>
                                <input type="number" className="w-full p-3 pl-7 bg-slate-50 border-none rounded-xl text-sm font-bold outline-none" 
                                    placeholder="0.00" value={newAmount} onChange={e => setNewAmount(e.target.value)} />
                            </div>
                            <button type="submit" className="bg-blue-600 text-white px-6 rounded-xl font-bold hover:bg-blue-700 transition-colors">
                                <Icons.Plus />
                            </button>
                        </div>
                    </form>

                    <div className="space-y-3">
                        {items.sort((a,b) => new Date(b.createdAt?.toDate?.() || b.date) - new Date(a.createdAt?.toDate?.() || a.date)).map(item => (
                            <div key={item.id} className={`bg-white p-4 rounded-[1.25rem] border-l-4 border-${accent}-400 card-shadow flex items-center justify-between gap-4 transition-all ${item.paid && showCheck ? 'opacity-30 grayscale scale-[0.98]' : 'hover:translate-x-1'}`}>
                                <div className="flex-1 min-w-0">
                                    <input 
                                        className="text-[10px] font-bold text-slate-400 uppercase tracking-tight bg-transparent w-full outline-none focus:text-blue-500" 
                                        value={item.name} 
                                        onChange={e => onUpdate(item.id, 'name', e.target.value)}
                                    />
                                    {item.category && item.type === 'daily' && <span className="text-[8px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 font-bold">{item.category}</span>}
                                    <div className="flex items-center text-xl font-bold text-slate-900 mt-0.5">
                                        <span className="text-slate-200 mr-1">$</span>
                                        <input 
                                            type="number" 
                                            className="bg-transparent outline-none w-full" 
                                            value={item.amount} 
                                            onChange={e => onUpdate(item.id, 'amount', e.target.value)} 
                                        />
                                    </div>
                                </div>
                                <div className="flex gap-1 shrink-0">
                                    {showCheck && <button onClick={() => onToggle(item)} className={`p-2 rounded-xl transition-all ${item.paid ? 'text-emerald-600 bg-emerald-50' : 'text-slate-200 hover:text-emerald-400'}`}><Icons.Check /></button>}
                                    <button onClick={() => onDelete(item.id)} className="p-2 text-slate-100 hover:text-rose-500 transition-colors"><Icons.Trash /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
