<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platita - Mi Control de Finanzas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            color: #1e293b;
            overflow-x: hidden;
            width: 100%;
        }
        svg { width: 1.5rem; height: 1.5rem; display: inline-block; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input:focus { outline: none; border-color: #0f172a; }
        .main-container { width: 100%; max-width: 100%; padding-left: 1rem; padding-right: 1rem; }
        @media (min-width: 768px) {
            .main-container { max-width: 1024px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem; }
            .desktop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Definición de constantes
        const DEFAULT_CATEGORIES = ["Hogar", "Servicios", "Impuestos", "Salud", "Educación", "Tarjetas", "Ocio", "Comida", "General"];
        const CHART_COLORS = ['#10b981', '#f43f5e', '#f59e0b', '#6366f1', '#8b5cf6', '#06b6d4', '#f97316', '#ec4899', '#14b8a6', '#3b82f6', '#a855f7', '#84cc16'];
        const CATEGORY_SUGGESTIONS = {
            'comida': 'Comida', 'super': 'Comida', 'almuerzo': 'Comida', 'cena': 'Comida', 'carne': 'Comida', 'verdura': 'Comida', 'chino': 'Comida', 'kiosco': 'Comida', 'pan': 'Comida',
            'luz': 'Servicios', 'agua': 'Servicios', 'gas': 'Servicios', 'internet': 'Servicios', 'tel': 'Servicios', 'netflix': 'Ocio', 'spotify': 'Ocio',
            'farmacia': 'Salud', 'remedio': 'Salud', 'osde': 'Salud', 'medico': 'Salud', 'dentista': 'Salud',
            'nafta': 'General', 'uber': 'General', 'taxi': 'General', 'colectivo': 'General', 'sube': 'General',
            'colegio': 'Educación', 'cuota': 'Educación', 'facu': 'Educación', 'libros': 'Educación',
            'cine': 'Ocio', 'birra': 'Ocio', 'bar': 'Ocio', 'cerveza': 'Ocio', 'salida': 'Ocio',
            'visa': 'Tarjetas', 'master': 'Tarjetas', 'naranja': 'Tarjetas', 'banco': 'Impuestos'
        };

        const { useState, useEffect, useMemo, useRef } = React;
        const { createRoot } = ReactDOM;

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Analysis: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2v2m3 10v-3a2 2 0 012-2h2a2 2 0 012 2v3m2 0h-5m-9 0H3m9 0a9 9 0 0118 0v1H3v-1z" /></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val || 0);

        const parseLocaleNumber = (str) => {
            if (typeof str === 'number') return str;
            if (!str) return 0;
            const clean = str.toString().replace(/\./g, '').replace(',', '.');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [templates, setTemplates] = useState([]);
            const [incomeTemplates, setIncomeTemplates] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [navDate, setNavDate] = useState(new Date());
            const [hideBalance, setHideBalance] = useState(true); 
            const [toast, setToast] = useState({ show: false, msg: '' });

            // Formulario de login
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [authError, setAuthError] = useState(null);

            // Settings sections visibility
            const [minIncomeT, setMinIncomeT] = useState(true);
            const [minExpenseT, setMinExpenseT] = useState(true);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: '' }), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                auth.signInWithEmailAndPassword(loginData.email, loginData.password)
                    .catch((err) => {
                        setAuthError("Email o contraseña incorrectos");
                        setLoading(false);
                    });
            };

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const rootRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);
                
                const unsubTrans = rootRef.collection('transactions').onSnapshot(snap => {
                    setItems(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, () => showToast("Error al cargar datos"));
                
                const unsubTemp = rootRef.collection('recurringTemplates').onSnapshot(snap => {
                    setTemplates(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubIncTemp = rootRef.collection('incomeTemplates').onSnapshot(snap => {
                    setIncomeTemplates(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                rootRef.collection('settings').doc('categories').get().then(doc => {
                    if (doc.exists) setCategories([...DEFAULT_CATEGORIES, ...doc.data().custom]);
                });
                
                return () => { unsubTrans(); unsubTemp(); unsubIncTemp(); };
            }, [user]);

            const stats = useMemo(() => {
                const month = navDate.getUTCMonth();
                const year = navDate.getUTCFullYear();
                const currentMonthItems = items.filter(item => {
                    if (!item.date) return false;
                    const d = new Date(item.date);
                    return d.getUTCMonth() === month && d.getUTCFullYear() === year;
                });

                const incomeCobrado = currentMonthItems.filter(i => i.type === 'income' && i.paid).reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                const recPaid = currentMonthItems.filter(i => i.type === 'recurring' && i.paid).reduce((a, c) => a + (c.paymentType === 'partial' ? (parseFloat(c.paidAmount) || 0) : (parseFloat(c.amount) || 0)), 0);
                const recPending = currentMonthItems.filter(i => i.type === 'recurring' && !i.paid).reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                const daily = currentMonthItems.filter(i => i.type === 'daily').reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
                
                return { income: incomeCobrado, recPaid, recPending, daily, balance: incomeCobrado - recPaid - daily, totalSpent: recPaid + daily, currentMonthItems };
            }, [items, navDate]);

            const addItem = async (data) => {
                if (!user) return;
                const finalDate = data.date ? data.date.split('T')[0] + 'T12:00:00Z' : new Date().toISOString();
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions').add({
                    ...data,
                    paid: data.type === 'daily' ? true : data.paid,
                    date: finalDate,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast("Registro agregado");
            };

            const applyTemplates = async (isIncome = false) => {
                const targetList = isIncome ? incomeTemplates : templates;
                if (!user || targetList.length === 0) return;
                const batch = db.batch();
                const colRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
                const currentMonthStr = navDate.toISOString().split('T')[0].substring(0, 7); 
                
                targetList.forEach(t => {
                    const newDoc = colRef.doc();
                    const targetDateStr = `${currentMonthStr}-${String(t.dueDay || 1).padStart(2, '0')}T12:00:00Z`;
                    batch.set(newDoc, {
                        name: t.name,
                        amount: t.amount || 0,
                        category: isIncome ? "Ingreso" : t.category,
                        type: isIncome ? "income" : "recurring",
                        dueDay: t.dueDay || 1,
                        paid: false,
                        date: targetDateStr,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                await batch.commit();
                showToast(isIncome ? "Ingresos aplicados" : "Gastos fijos aplicados");
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-white"><div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 animate-fade-in text-center">
                    <div className="bg-slate-900 text-white p-5 rounded-[2.5rem] mb-6 shadow-2xl inline-block mx-auto"><Icons.Wallet /></div>
                    <h1 className="text-4xl font-black text-slate-900 mb-2 tracking-tighter leading-none">Platita</h1>
                    <p className="text-slate-500 mb-10 text-sm font-medium">Gestión inteligente de tus finanzas.</p>
                    
                    <form onSubmit={handleLogin} className="w-full max-w-xs space-y-4 mx-auto">
                        <input 
                            type="email" 
                            required 
                            className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-slate-800" 
                            placeholder="Email" 
                            value={loginData.email} 
                            onChange={e=>setLoginData({...loginData, email: e.target.value})} 
                        />
                        <input 
                            type="password" 
                            required 
                            className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-slate-800" 
                            placeholder="Contraseña" 
                            value={loginData.password} 
                            onChange={e=>setLoginData({...loginData, password: e.target.value})} 
                        />
                        {authError && <p className="text-rose-500 text-xs font-bold">{authError}</p>}
                        <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-xl active:scale-95 transition-transform">Ingresar</button>
                    </form>
                    <button onClick={() => auth.signInAnonymously()} className="mt-6 text-slate-400 text-xs font-bold underline">O entrar como invitado</button>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 bg-slate-50 animate-fade-in relative w-full overflow-x-hidden">
                    {toast.show && (
                        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-slate-900 text-white text-xs font-black uppercase rounded-full shadow-2xl animate-fade-in flex items-center gap-2 border border-white/10">
                            <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                            {toast.msg}
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-100 md:rounded-b-[3rem] shadow-sm mb-6">
                        <div className="main-container py-5">
                            <div className="flex items-center justify-between mb-6">
                                <h1 className="text-2xl md:text-3xl font-black text-slate-900 flex items-center gap-2"><span className="bg-slate-900 text-white px-2 py-1 rounded-xl">P</span> Platita</h1>
                                <button onClick={() => auth.signOut()} className="text-slate-300 hover:text-rose-500 transition-colors flex items-center gap-2 text-sm font-bold">
                                    <Icons.Logout />
                                </button>
                            </div>
                            
                            <div className="md:grid md:grid-cols-2 md:gap-8 items-center">
                                <div className="mb-6 md:mb-0">
                                    <div className="flex items-center justify-between bg-slate-100 p-1 rounded-full mb-5">
                                        <button onClick={() => setNavDate(new Date(navDate.setUTCMonth(navDate.getUTCMonth() - 1)))} className="p-2 hover:bg-white rounded-full transition-all"><Icons.ChevronLeft /></button>
                                        <span className="text-[12px] md:text-sm font-black text-slate-700 uppercase tracking-widest">{navDate.toLocaleString('es-ES', { month: 'long', year: 'numeric', timeZone: 'UTC' })}</span>
                                        <button onClick={() => setNavDate(new Date(navDate.setUTCMonth(navDate.getUTCMonth() + 1)))} className="p-2 hover:bg-white rounded-full transition-all"><Icons.ChevronRight /></button>
                                    </div>

                                    <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden flex flex-col items-center">
                                        <button onClick={() => setHideBalance(!hideBalance)} className="absolute top-4 right-6 text-amber-400 hover:text-amber-300 p-2 transition-all">
                                            {hideBalance ? <Icons.EyeOff /> : <Icons.Eye />}
                                        </button>
                                        <p className="text-amber-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-1">Saldo Cobrado Disponible</p>
                                        <h2 className="text-4xl md:text-5xl font-black mb-6 tracking-tight leading-none text-white">{hideBalance ? "$ ••••••" : formatCurrency(stats.balance)}</h2>
                                        <div className="grid grid-cols-2 gap-8 border-t border-white/20 pt-6 w-full text-center">
                                            <div><p className="text-amber-400 text-[10px] uppercase font-black mb-1">Ingresos</p><p className="text-amber-400 font-black text-lg">{hideBalance ? "---" : formatCurrency(stats.income)}</p></div>
                                            <div><p className="text-amber-400 text-[10px] uppercase font-black mb-1">Gastos</p><p className="text-amber-400 font-black text-lg">{hideBalance ? "---" : formatCurrency(stats.totalSpent)}</p></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="hidden md:block">
                                    <AnalysisView currentMonthItems={stats.currentMonthItems} stats={stats} isSmall />
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="main-container space-y-8">
                        {view === 'dashboard' && <DashboardView stats={stats} />}
                        
                        {(view === 'income' || view === 'recurring' || view === 'daily') && (
                            <ListView 
                                title={view === 'income' ? 'Ingresos' : view === 'recurring' ? 'Gastos Fijos' : 'Gastos Diarios'}
                                type={view}
                                items={stats.currentMonthItems.filter(i => i.type === view)}
                                categories={categories}
                                onAdd={addItem}
                                onApplyTemplates={() => applyTemplates(view === 'income')}
                                userId={user.uid}
                                accent={view === 'income' ? 'emerald' : view === 'recurring' ? 'amber' : 'rose'}
                                stats={stats}
                                navDate={navDate}
                            />
                        )}

                        {view === 'settings' && (
                            <div className="space-y-8 animate-fade-in pb-10">
                                <SettingsSection title="Plantillas de Ingresos" minimized={minIncomeT} setMinimized={setMinIncomeT}>
                                    <TemplateForm categories={categories} onAdd={(d) => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('incomeTemplates').add(d)} isIncome />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                        {incomeTemplates.map(t => <TemplateCard key={t.id} template={t} onDelete={(id) => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('incomeTemplates').doc(id).delete()} isIncome />)}
                                    </div>
                                </SettingsSection>

                                <SettingsSection title="Plantillas de Gastos Fijos" minimized={minExpenseT} setMinimized={setMinExpenseT}>
                                    <TemplateForm categories={categories} onAdd={(d) => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('recurringTemplates').add(d)} />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                        {templates.map(t => <TemplateCard key={t.id} template={t} onDelete={(id) => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('recurringTemplates').doc(id).delete()} />)}
                                    </div>
                                </SettingsSection>

                                <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 space-y-6">
                                    <h2 className="text-xl font-black text-slate-900 tracking-tight">Etiquetas</h2>
                                    <p className="text-xs text-slate-500 font-medium leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <strong className="text-slate-900 block mb-1 text-[10px] uppercase font-black tracking-widest">¿Para qué sirven las etiquetas?</strong>
                                        Permiten clasificar tus registros para generar los reportes de Análisis. Además, el sistema sugiere categorías automáticamente mientras escribes (ej: "Luz" sugiere "Servicios").
                                    </p>
                                    <div className="flex flex-wrap gap-2">
                                        {categories.map(c => (
                                            <span key={c} className="bg-slate-50 border border-slate-100 px-4 py-2 rounded-full text-xs font-bold text-slate-600 shadow-sm flex items-center gap-2">
                                                {c}
                                                {!DEFAULT_CATEGORIES.includes(c) && <button onClick={() => {
                                                    const nc = categories.filter(cat => cat !== c);
                                                    db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categories').set({ custom: nc.filter(x => !DEFAULT_CATEGORIES.includes(x)) });
                                                }} className="text-slate-300 hover:text-rose-500"><Icons.Close /></button>}
                                            </span>
                                        ))}
                                    </div>
                                    <form onSubmit={e => { e.preventDefault(); const val = e.target.cat.value; if(val){ 
                                        const nc = [...categories, val];
                                        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categories').set({ custom: nc.filter(x => !DEFAULT_CATEGORIES.includes(x)) });
                                    } e.target.reset(); }} className="flex gap-2 max-w-sm pt-2">
                                        <input name="cat" className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none" placeholder="Nueva etiqueta..." />
                                        <button className="bg-slate-900 text-white px-6 rounded-2xl font-black shadow-lg">+</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-50">
                        <div className="main-container flex justify-around p-4 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Inicio" />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Ingresos" />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="G. Fijos" />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="G. Diarios" />
                            <NavTab active={view === 'analysis'} onClick={() => setView('analysis')} icon={<Icons.Analysis />} label="Análisis" />
                            <NavTab active={view === 'settings'} onClick={() => setView('settings')} icon={<Icons.Settings />} label="Config" />
                        </div>
                    </nav>
                </div>
            );
        };

        const DashboardView = ({ stats }) => {
            const upcoming = stats.currentMonthItems
                .filter(i => i.type === 'recurring' && !i.paid && (parseFloat(i.amount) > 0))
                .sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99))
                .slice(0, 5);

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center shrink-0 shadow-sm"><Icons.Calendar /></div>
                            <div className="flex-1">
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Pendientes Próximos</p>
                                <p className="text-3xl font-black text-slate-900 tracking-tight leading-none">{formatCurrency(stats.recPending)}</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {upcoming.length > 0 ? upcoming.map(item => (
                                <div key={item.id} className="flex justify-between items-center p-4 rounded-2xl border bg-slate-50 border-slate-100">
                                    <span className="text-xs font-black text-slate-600 uppercase truncate block mr-2">{item.name}</span>
                                    <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-[10px] font-black whitespace-nowrap">Día {item.dueDay}</span>
                                </div>
                            )) : <p className="text-slate-400 text-xs font-medium italic text-center w-full">Sin pagos pendientes.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const ListView = ({ title, type, items, categories, onAdd, onApplyTemplates, userId, accent, stats, navDate }) => {
            const [newName, setNewName] = useState('');
            const [newAmount, setNewAmount] = useState('');
            const [newCat, setNewCat] = useState('General');
            const [newDueDay, setNewDueDay] = useState('1');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);
            const [searchTerm, setSearchTerm] = useState('');

            const filteredItems = useMemo(() => {
                let res = items.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
                if (type === 'daily') res.sort((a,b) => new Date(b.date) - new Date(a.date));
                else if (type === 'recurring') {
                    res.sort((a, b) => {
                        const priorityA = (!a.paid && parseFloat(a.amount) > 0) ? 0 : 1;
                        const priorityB = (!b.paid && parseFloat(b.amount) > 0) ? 0 : 1;
                        if (priorityA !== priorityB) return priorityA - priorityB;
                        return (a.dueDay || 0) - (b.dueDay || 0);
                    });
                }
                return res;
            }, [items, searchTerm, type]);

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className={`p-6 md:p-8 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm border ${type === 'income' ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : type === 'recurring' ? 'bg-amber-50 border-amber-100 text-amber-700' : 'bg-rose-50 border-rose-100 text-rose-700'}`}>
                        <div className="flex items-center gap-4 w-full md:w-auto">
                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg ${type === 'income' ? 'bg-emerald-500' : type === 'recurring' ? 'bg-amber-500' : 'bg-rose-500'} text-white`}>
                                {type === 'income' ? <Icons.Plus /> : type === 'recurring' ? <Icons.Calendar /> : <Icons.Shopping />}
                            </div>
                            <div>
                                <p className="text-[10px] font-black uppercase tracking-widest opacity-60">Total {title}</p>
                                <p className="text-3xl font-black leading-none">{formatCurrency(type === 'income' ? stats.income : type === 'recurring' ? stats.recPaid + stats.recPending : stats.daily)}</p>
                            </div>
                        </div>
                        {(type === 'income' || type === 'recurring') && (
                            <button onClick={onApplyTemplates} className="w-full md:w-auto bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all">
                                <Icons.Plus /> Aplicar {type === 'income' ? 'Ingresos' : 'Gastos Fijos'}
                            </button>
                        )}
                    </div>

                    <div className="flex flex-col gap-4">
                        <div className="flex justify-between items-center px-1">
                            <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-widest">{title}</h2>
                            <div className="relative">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></span>
                                <input className="p-2 pl-9 bg-white border border-slate-100 rounded-xl text-[10px] font-bold outline-none w-40 focus:w-52 transition-all shadow-sm" placeholder="Buscar..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                        </div>
                        
                        <form onSubmit={e => { e.preventDefault(); if (!newName) return; onAdd({ name: newName, amount: parseLocaleNumber(newAmount), type, category: type === 'income' ? 'Ingreso' : newCat, dueDay: parseInt(newDueDay) || 1, date: type === 'daily' ? newDate : navDate.toISOString(), paid: false }); setNewName(''); setNewAmount(''); }} className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                            <div className="flex flex-col md:flex-row gap-4">
                                <input className="flex-[2] p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none" placeholder="Descripción" value={newName} onChange={e=>{
                                    const val = e.target.value;
                                    setNewName(val);
                                    const lower = val.toLowerCase();
                                    for (let k in CATEGORY_SUGGESTIONS) if (lower.includes(k)) { setNewCat(CATEGORY_SUGGESTIONS[k]); break; }
                                }} />
                                <div className="flex-1 flex gap-2">
                                    <input inputmode="decimal" className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black outline-none" placeholder="$ 0,00" value={newAmount} onChange={e=>setNewAmount(e.target.value)} />
                                    {type === 'recurring' && <input type="number" min="1" max="31" className="w-20 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black text-center outline-none" value={newDueDay} onChange={e=>setNewDueDay(e.target.value)} />}
                                    <button className="bg-slate-900 text-white px-8 rounded-2xl font-black shadow-lg"><Icons.Plus /></button>
                                </div>
                            </div>
                            {type === 'daily' && <input type="date" className="p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm w-full md:w-auto outline-none" value={newDate} onChange={e=>setNewDate(e.target.value)} />}
                            {type !== 'income' && (
                                <div className="flex flex-wrap gap-2 pt-2">
                                    {categories.map(cat => (
                                        <button key={cat} type="button" onClick={() => setNewCat(cat)} className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest border transition-all ${newCat === cat ? 'bg-slate-900 text-white border-slate-900 shadow-md scale-105' : 'bg-slate-50 text-slate-500 border-slate-100 hover:border-slate-300'}`}>{cat}</button>
                                    ))}
                                </div>
                            )}
                        </form>
                    </div>

                    <div className="desktop-grid space-y-4 md:space-y-0">
                        {filteredItems.map(item => (
                            <ItemCard key={item.id} item={item} accent={accent} uid={userId} />
                        ))}
                    </div>
                </div>
            );
        };

        const ItemCard = ({ item, accent, uid }) => {
            const [partialVal, setPartialVal] = useState('');
            const [showPartial, setShowPartial] = useState(false);
            const isCC = item.name.toLowerCase().includes('visa') || item.name.toLowerCase().includes('master');
            
            const handleUpdate = (d) => db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('transactions').doc(item.id).update(d);
            const handleDelete = () => db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('transactions').doc(item.id).delete();

            return (
                <div className={`bg-white p-5 rounded-[2.2rem] border-l-[10px] shadow-sm flex flex-col gap-4 border-${accent}-500 ${item.paid && item.type !== 'income' ? 'opacity-50' : ''}`}>
                    <div className="flex justify-between items-start">
                        <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1">
                                <span className="text-[10px] font-black text-slate-500 uppercase">{item.name}</span>
                                <span className="text-[8px] bg-slate-100 px-2 py-0.5 rounded-full border border-slate-200 text-slate-400 font-bold uppercase">{item.category}</span>
                            </div>
                            <p className="text-xl font-black text-slate-900">{formatCurrency(item.amount)}</p>
                            {item.type === 'recurring' && <p className="text-[9px] font-black text-amber-500 uppercase mt-1">Día {item.dueDay}</p>}
                        </div>
                        <div className="flex gap-2">
                            {item.type !== 'daily' && !item.paid && (
                                <>
                                    <button onClick={() => handleUpdate({ paid: true, paidAmount: item.amount })} className="p-3 rounded-2xl border border-slate-100 text-slate-400 hover:text-emerald-500"><Icons.Check /></button>
                                    {isCC && <button onClick={() => setShowPartial(!showPartial)} className="p-3 rounded-2xl border border-slate-100 text-slate-400 font-black text-xs">P</button>}
                                </>
                            )}
                            {item.paid && item.type !== 'daily' && <button onClick={() => handleUpdate({ paid: false, paymentType: null })} className="p-3 rounded-2xl bg-emerald-500 text-white shadow-lg"><Icons.Check /></button>}
                            <button onClick={handleDelete} className="p-3 rounded-2xl border border-slate-100 text-slate-300 hover:text-rose-500"><Icons.Trash /></button>
                        </div>
                    </div>
                    {showPartial && (
                        <div className="flex gap-2 p-3 bg-amber-50 rounded-2xl animate-fade-in">
                            <input inputmode="decimal" className="flex-1 p-3 bg-white border border-amber-200 rounded-xl text-xs font-black outline-none" placeholder="Pago parcial..." value={partialVal} onChange={e=>setPartialVal(e.target.value)} />
                            <button onClick={() => { handleUpdate({ paid: true, paymentType: 'partial', paidAmount: parseLocaleNumber(partialVal) }); setShowPartial(false); }} className="bg-amber-500 text-white px-4 rounded-xl text-[10px] font-black uppercase">Ok</button>
                        </div>
                    )}
                </div>
            );
        };

        const SettingsSection = ({ title, minimized, setMinimized, children }) => (
            <div className="bg-white p-6 md:p-8 rounded-[3rem] shadow-sm border border-slate-100 space-y-4">
                <button onClick={() => setMinimized(!minimized)} className="w-full flex justify-between items-center py-2 group">
                    <h2 className="text-xl font-black text-slate-900 tracking-tight">{title}</h2>
                    <div className={`transition-transform duration-300 ${minimized ? '' : 'rotate-180'}`}><Icons.ChevronDown /></div>
                </button>
                {!minimized && <div className="animate-fade-in">{children}</div>}
            </div>
        );

        const TemplateForm = ({ categories, onAdd, isIncome = false }) => {
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            const [cat, setCat] = useState(isIncome ? 'Ingreso' : 'General');
            const [dueDay, setDueDay] = useState('1');

            return (
                <form onSubmit={e => { e.preventDefault(); if (!name) return; onAdd({ name, amount: parseLocaleNumber(amount), category: cat, dueDay: parseInt(dueDay) || 1 }); setName(''); setAmount(''); }} className="p-6 bg-slate-900 rounded-[2.5rem] shadow-xl space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="flex flex-col gap-1">
                            <label className="text-amber-300 text-[9px] font-black uppercase ml-1 tracking-widest">Nombre</label>
                            <input className="p-4 bg-white/10 text-white placeholder-white/30 rounded-2xl text-sm outline-none border border-white/5" placeholder="Ej. Sueldo" value={name} onChange={e=>setName(e.target.value)} />
                        </div>
                        <div className="flex gap-2">
                            <div className="flex-1 flex flex-col gap-1">
                                <label className="text-amber-300 text-[9px] font-black uppercase ml-1 tracking-widest">Monto</label>
                                <input inputmode="decimal" className="p-4 bg-white/10 text-white placeholder-white/30 rounded-2xl text-sm outline-none border border-white/5" placeholder="$ 0,00" value={amount} onChange={e=>setAmount(e.target.value)} />
                            </div>
                            <div className="w-20 flex flex-col gap-1">
                                <label className="text-amber-300 text-[9px] font-black uppercase ml-1 text-center tracking-widest">Día</label>
                                <input type="number" min="1" max="31" className="p-4 bg-white/10 text-white rounded-2xl text-sm text-center outline-none border border-white/5" value={dueDay} onChange={e=>setDueDay(e.target.value)} />
                            </div>
                        </div>
                    </div>
                    {!isIncome && (
                        <div className="flex flex-wrap gap-2 py-2">
                            {categories.map(c => <button key={c} type="button" onClick={() => setCat(c)} className={`px-4 py-2 rounded-full text-[8px] font-black uppercase tracking-widest border transition-all ${cat === c ? 'bg-amber-400 text-slate-900 border-amber-400' : 'bg-white/5 text-white/60 border-white/10'}`}>{c}</button>)}
                        </div>
                    )}
                    <button className="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-amber-400 transition-all">Guardar Plantilla</button>
                </form>
            );
        };

        const TemplateCard = ({ template, onDelete, isIncome }) => (
            <div className="p-5 bg-slate-50 border border-slate-100 rounded-[2rem] flex justify-between items-center group shadow-sm">
                <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1">
                        <span className="text-[10px] font-black text-slate-400 uppercase">{template.name}</span>
                        {!isIncome && <span className="text-[8px] bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-400 font-bold uppercase">{template.category}</span>}
                    </div>
                    <p className="text-lg font-black text-slate-900">{formatCurrency(template.amount)}</p>
                </div>
                <button onClick={() => onDelete(template.id)} className="p-3 text-slate-300 hover:text-rose-500"><Icons.Trash /></button>
            </div>
        );

        const AnalysisView = ({ currentMonthItems, stats, isSmall }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            
            const byCategory = useMemo(() => {
                const cats = {};
                currentMonthItems.forEach(i => { if (i.type === 'income') return; cats[i.category || 'General'] = (cats[i.category || 'General'] || 0) + (parseFloat(i.amount) || 0); });
                return Object.entries(cats).sort((a,b) => b[1] - a[1]);
            }, [currentMonthItems]);

            useEffect(() => {
                if (chartRef.current && typeof Chart !== 'undefined') {
                    if (chartInstance.current) chartInstance.current.destroy();
                    chartInstance.current = new Chart(chartRef.current.getContext('2d'), {
                        type: 'doughnut',
                        data: {
                            labels: byCategory.map(c => c[0]),
                            datasets: [{ data: byCategory.map(c => c[1]), backgroundColor: CHART_COLORS, borderWidth: 0 }]
                        },
                        options: { cutout: isSmall ? '85%' : '75%', plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
                    });
                }
                return () => chartInstance.current?.destroy();
            }, [byCategory, isSmall]);

            return (
                <div className={isSmall ? "flex items-center gap-8 bg-slate-900/5 p-6 rounded-[2.5rem]" : "bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100"}>
                    <div className="relative w-32 h-32 md:w-64 md:h-64 mx-auto"><canvas ref={chartRef}></canvas></div>
                    {!isSmall && (
                        <div className="mt-8 space-y-3">
                            {byCategory.length === 0 ? <p className="text-sm text-slate-400 italic">Sin datos este mes.</p> : byCategory.map(([cat, amount], idx) => (
                                <div key={cat} className="flex justify-between items-center text-[11px] font-black uppercase">
                                    <span style={{ color: CHART_COLORS[idx % CHART_COLORS.length] }}>{cat}</span>
                                    <span className="text-slate-900 font-bold">{formatCurrency(amount)}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl flex flex-col items-center gap-1 transition-all ${active ? 'bg-slate-900 text-white shadow-lg scale-105 font-bold' : 'text-slate-400'}`}>
                {icon} <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
            </button>
        );

        // Bootstrap App
        window.addEventListener('load', () => {
            const container = document.getElementById('root');
            if(container) {
                const root = createRoot(container);
                root.render(<App />);
            }
        });
    </script>
</body>
</html>
