<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platita - Mi Control de Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input::-webkit-inner-spin-button, 
        input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            main { padding-top: 1rem; }
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        // --- CONSTANTES ---
        const CATEGORIES_RECURRING = ["Hogar", "Servicios", "Impuestos", "Salud", "Educación", "Tarjetas", "General"];
        const CATEGORIES_DAILY = ["Comida", "Transporte", "Ocio", "Super", "Shopping", "General"];

        // --- UTILIDADES ---
        const formatCurrency = (val, mask = false) => {
            if (mask) return "$ ••••••";
            return new Intl.NumberFormat('es-AR', { 
                style: 'currency', 
                currency: 'ARS',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(val || 0);
        };

        const parseLocaleNumber = (stringNumber) => {
            if (!stringNumber) return 0;
            const clean = stringNumber.toString().replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const Icons = {
            Wallet: () => <span className="text-xl">💳</span>,
            Calendar: () => <span className="text-xl">📅</span>,
            Shopping: () => <span className="text-xl">🛍️</span>,
            Trash: () => <span className="text-xl">🗑️</span>,
            Plus: () => <span className="text-xl">➕</span>,
            Check: () => <span className="text-xl">✅</span>,
            Logout: () => <span className="text-xl">🚪</span>,
            ChevronLeft: () => <span className="text-lg">◀</span>,
            ChevronRight: () => <span className="text-lg">▶</span>,
            Copy: () => <span className="text-xl">📋</span>,
            Analysis: () => <span className="text-xl">📊</span>,
            Eye: () => <span className="text-lg">👁️</span>,
            EyeOff: () => <span className="text-lg">🙈</span>,
            Chart: () => <span className="text-xl">📈</span>,
            Refresh: () => <span className="text-lg">🔄</span>,
            Star: () => <span className="text-xl">⭐</span>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [navDate, setNavDate] = useState(new Date());
            const [hideBalance, setHideBalance] = useState(true);

            const selectedMonth = navDate.getMonth();
            const selectedYear = navDate.getFullYear();

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const getUserCollection = () => {
                if (!user) return null;
                return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
            };

            useEffect(() => {
                const col = getUserCollection();
                if (!col) {
                    setItems([]);
                    return;
                }
                
                const unsubscribe = col.onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(data);
                    setLoading(false);
                }, (err) => {
                    console.error("Error BD:", err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const currentMonthItems = useMemo(() => {
                return items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });
            }, [items, selectedMonth, selectedYear]);

            const stats = useMemo(() => {
                const income = currentMonthItems.filter(i => i.type === 'income').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPaid = currentMonthItems.filter(i => i.type === 'recurring' && i.paid).reduce((acc, c) => {
                    const actualPaid = c.paymentType === 'partial' ? (parseFloat(c.paidAmount) || 0) : (parseFloat(c.amount) || 0);
                    return acc + actualPaid;
                }, 0);
                const recPending = currentMonthItems.filter(i => i.type === 'recurring' && !i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const daily = currentMonthItems.filter(i => i.type === 'daily').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const totalSpent = recPaid + daily;
                const spendRatio = income > 0 ? (totalSpent / income) * 100 : 0;

                const upcomingExpenses = currentMonthItems
                    .filter(i => i.type === 'recurring' && !i.paid)
                    .sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99))
                    .slice(0, 3);

                return { income, recPaid, recPending, daily, balance: income - recPaid - daily, totalSpent, spendRatio, upcomingExpenses };
            }, [currentMonthItems]);

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error(e);
                }
            };

            const changeMonth = (offset) => {
                setNavDate(prev => {
                    const next = new Date(prev);
                    next.setMonth(next.getMonth() + offset);
                    return next;
                });
            };

            const add = async (data) => {
                const col = getUserCollection();
                if (!col) return;
                await col.add({
                    ...data,
                    userId: user.uid,
                    date: data.date || navDate.toISOString(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const importPreviousMonth = async (overwrite = false) => {
                const col = getUserCollection();
                if (!col) return;
                const prevDate = new Date(navDate);
                prevDate.setMonth(prevDate.getMonth() - 1);
                const pm = prevDate.getMonth();
                const py = prevDate.getFullYear();

                const prevItems = items.filter(i => {
                    const d = new Date(i.date);
                    return d.getMonth() === pm && d.getFullYear() === py && (i.type === 'income' || i.type === 'recurring');
                });

                if (prevItems.length === 0) {
                    alert("No hay registros fijos para copiar del mes anterior.");
                    return;
                }

                if (confirm(overwrite ? "¿Reemplazar registros actuales con los del mes pasado ($0)?" : "¿Importar registros fijos?")) {
                    if (overwrite) {
                        const toDelete = currentMonthItems.filter(i => i.type === 'income' || i.type === 'recurring');
                        for (const item of toDelete) await col.doc(item.id).delete();
                    }
                    for (const item of prevItems) {
                        await add({
                            name: item.name,
                            amount: 0, 
                            dueDay: item.dueDay || '',
                            type: item.type,
                            category: item.category || 'General',
                            paid: item.type === 'income', 
                            date: navDate.toISOString()
                        });

                        if (item.type === 'recurring' && item.paid && item.paymentType === 'partial') {
                            const debt = (parseFloat(item.amount) || 0) - (parseFloat(item.paidAmount) || 0);
                            if (debt > 0) {
                                await add({
                                    name: `Saldo pendiente: ${item.name}`,
                                    amount: debt,
                                    dueDay: item.dueDay || '',
                                    type: 'recurring',
                                    category: 'Tarjetas',
                                    paid: false,
                                    date: navDate.toISOString()
                                });
                            }
                        }
                    }
                }
            };

            const toggle = async (item, pType = 'total', pAmount = null) => {
                const col = getUserCollection();
                if (!col) return;
                const isPaying = !item.paid;
                await col.doc(item.id).update({ 
                    paid: isPaying,
                    paymentType: isPaying ? pType : null,
                    paidAmount: isPaying ? (pType === 'partial' ? pAmount : item.amount) : null
                });
            };

            const del = async (id) => {
                const col = getUserCollection();
                if (!col) return;
                if (confirm("¿Eliminar registro?")) await col.doc(id).delete();
            };

            const updateField = async (id, field, value) => {
                const col = getUserCollection();
                if (!col) return;
                const finalVal = (field === 'amount' || field === 'dueDay' || field === 'paidAmount') ? (parseFloat(value.toString().replace(',','.')) || 0) : value;
                await col.doc(id).update({ [field]: finalVal });
            };

            if (loading) return <div className="flex h-screen items-center justify-center bg-white"><div className="w-10 h-10 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 text-center animate-fade-in">
                    <div className="bg-slate-900 text-white p-5 rounded-[2rem] mb-6 shadow-2xl shadow-slate-200"><Icons.Wallet /></div>
                    <h1 className="text-3xl font-black text-slate-900 mb-2 tracking-tight">Platita</h1>
                    <button onClick={handleGoogleLogin} className="bg-slate-900 text-white w-full max-w-sm py-5 rounded-[1.5rem] font-black text-lg flex items-center justify-center gap-3 active:scale-95 transition-all card-shadow">
                        Ingresar con Google
                    </button>
                </div>
            );

            return (
                <div className="max-w-md md:max-w-5xl mx-auto min-h-screen bg-slate-50 pb-32 md:pb-12 animate-fade-in relative">
                    <header className="bg-white p-4 md:p-6 border-b border-slate-100 shadow-sm md:rounded-b-[2.5rem]">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 md:mb-6">
                            <div className="flex items-center justify-between md:justify-start gap-4">
                                <h1 className="text-xl md:text-2xl font-black text-slate-900 flex items-center gap-1">
                                    <span className="bg-slate-900 text-white px-2.5 py-0.5 rounded-lg">P</span> Platita
                                </h1>
                                <button onClick={() => auth.signOut()} className="text-slate-500 hover:text-rose-600 transition-colors md:ml-4"><Icons.Logout /></button>
                            </div>
                            <div className="flex items-center justify-between bg-slate-100 p-1 rounded-full md:min-w-[200px]">
                                <button onClick={() => changeMonth(-1)} className="text-slate-500 p-1.5 hover:bg-white rounded-full transition-all"><Icons.ChevronLeft /></button>
                                <span className="text-[10px] font-black text-slate-700 uppercase tracking-widest px-4 text-center">{navDate.toLocaleString('es-ES', { month: 'short', year: 'numeric' })}</span>
                                <button onClick={() => changeMonth(1)} className="text-slate-500 p-1.5 hover:bg-white rounded-full transition-all"><Icons.ChevronRight /></button>
                            </div>
                        </div>

                        <div className="bg-slate-900 rounded-[2rem] p-5 md:p-6 text-white card-shadow relative overflow-hidden flex flex-col items-center">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16"></div>
                            <button onClick={() => setHideBalance(!hideBalance)} className="absolute top-4 right-6 text-slate-400 hover:text-white transition-colors p-2 z-10">
                                {hideBalance ? <Icons.Eye /> : <Icons.EyeOff />}
                            </button>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Saldo Disponible</p>
                            <h2 className="text-3xl md:text-4xl font-black mb-4 tracking-tight">{formatCurrency(stats.balance, hideBalance)}</h2>
                            <div className="w-full bg-white/10 h-1.5 rounded-full mb-4 overflow-hidden max-w-xs">
                                <div className={`h-full transition-all duration-1000 ${stats.spendRatio > 90 ? 'bg-rose-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(stats.spendRatio, 100)}%` }}></div>
                            </div>
                            <div className="grid grid-cols-2 gap-8 border-t border-white/10 pt-4 w-full max-w-sm text-center">
                                <div><p className="text-slate-500 text-[9px] uppercase font-black tracking-tighter">Cobros</p><p className="text-emerald-400 font-black text-sm">{formatCurrency(stats.income, hideBalance)}</p></div>
                                <div><p className="text-slate-500 text-[9px] uppercase font-black tracking-tighter">Salidas</p><p className="text-rose-400 font-black text-sm">{formatCurrency(stats.totalSpent, hideBalance)}</p></div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 md:p-6 space-y-6">
                        {currentMonthItems.length === 0 && (
                            <div className="bg-slate-900 p-8 rounded-[2rem] text-white flex flex-col items-center text-center shadow-xl md:max-w-2xl mx-auto">
                                <div className="bg-white/10 p-3 rounded-full mb-3"><Icons.Copy /></div>
                                <h3 className="text-lg font-black mb-1">Iniciá el mes</h3>
                                <button onClick={() => importPreviousMonth(false)} className="bg-white text-slate-900 px-8 py-3 rounded-xl font-black text-xs active:scale-95 transition-all">Importar plantilla</button>
                            </div>
                        )}

                        <div className="max-w-3xl mx-auto space-y-6">
                            {view === 'dashboard' && <Summary stats={stats} />}
                            {view === 'analysis' && <AnalysisView items={items} currentMonthItems={currentMonthItems} stats={stats} />}
                            {view === 'income' && <ListView title="Cobros e Ingresos" type="income" items={currentMonthItems.filter(i => i.type === 'income')} onAdd={add} onDelete={del} onUpdate={updateField} onSync={() => importPreviousMonth(true)} placeholder="Descripción" accent="emerald" />}
                            {view === 'recurring' && <ListView title="Gastos Fijos" type="recurring" items={currentMonthItems.filter(i => i.type === 'recurring')} onAdd={add} onDelete={del} onUpdate={updateField} onToggle={toggle} onSync={() => importPreviousMonth(true)} placeholder="Descripción" accent="amber" showCheck showDueDay showCategories />}
                            {view === 'daily' && <ListView title="Gastos Diarios" type="daily" items={currentMonthItems.filter(i => i.type === 'daily')} onAdd={add} onDelete={del} onUpdate={updateField} placeholder="Detalle" accent="rose" showCategories showDatePicker showMonthlyTotal stats={stats} />}
                        </div>
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-30 md:bottom-8 md:left-1/2 md:-translate-x-1/2 md:w-fit md:rounded-full md:shadow-2xl md:border md:border-slate-200">
                        <div className="max-w-md md:max-w-none mx-auto flex justify-around md:justify-center md:gap-2 px-2 md:px-4 py-3 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Inicio" />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Cobros" />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="Fijos" />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="Diarios" />
                            <NavTab active={view === 'analysis'} onClick={() => setView('analysis')} icon={<Icons.Analysis />} label="Análisis" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl md:rounded-full transition-all duration-300 flex flex-col md:flex-row items-center gap-1 md:gap-2 group ${active ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100'}`}>
                {icon} <span className={`text-[8px] md:text-[10px] font-black uppercase tracking-widest ${active ? 'block' : 'hidden md:group-hover:block'}`}>{label}</span>
            </button>
        );

        const Summary = ({ stats }) => (
            <div className="grid grid-cols-1 gap-4 animate-fade-in">
                <div className="bg-white p-5 rounded-[2rem] border border-stone-100 card-shadow flex flex-col gap-4">
                    <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center shrink-0 border border-amber-100"><Icons.Calendar /></div>
                        <div className="flex-1 min-w-0">
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest truncate">Vencimientos Próximos</p>
                            <p className="text-xl font-black text-slate-800 tracking-tight">{formatCurrency(stats.recPending)}</p>
                        </div>
                    </div>
                    {stats.upcomingExpenses.length > 0 && (
                        <div className="bg-amber-50/50 rounded-2xl p-3 border border-dashed border-amber-200">
                            <ul className="space-y-2">
                                {stats.upcomingExpenses.map(item => (
                                    <li key={item.id} className="flex justify-between items-center text-[10px] font-bold text-slate-600">
                                        <span className="truncate mr-2 uppercase tracking-tighter max-w-[120px]">{item.name}</span>
                                        <span className="shrink-0 bg-amber-100 px-1.5 py-0.5 rounded text-amber-700">Día {item.dueDay}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            </div>
        );

        const AnalysisView = ({ items, currentMonthItems, stats }) => {
            const [mode, setMode] = useState('month'); // 'month', 'trend', 'annual'
            const [annualYear, setAnnualYear] = useState(new Date().getFullYear());
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Cálculos para Análisis del Mes
            const byCategory = useMemo(() => {
                const cats = {};
                currentMonthItems.forEach(i => {
                    if (i.type === 'income') return;
                    const value = i.paymentType === 'partial' ? (parseFloat(i.paidAmount) || 0) : (parseFloat(i.amount) || 0);
                    cats[i.category || 'General'] = (cats[i.category || 'General'] || 0) + value;
                });
                return Object.entries(cats).sort((a,b) => b[1] - a[1]);
            }, [currentMonthItems]);

            // Cálculos para Resumen Anual (Solo cuando se activa la pestaña)
            const annualStats = useMemo(() => {
                if (mode !== 'annual') return null;
                const yearItems = items.filter(i => new Date(i.date).getFullYear() === annualYear);
                
                const monthsData = Array(12).fill(0).map(() => ({ inc: 0, exp: 0 }));
                const catTotals = {};

                yearItems.forEach(i => {
                    const month = new Date(i.date).getMonth();
                    const val = i.paymentType === 'partial' ? (parseFloat(i.paidAmount) || 0) : (parseFloat(i.amount) || 0);
                    
                    if (i.type === 'income') {
                        monthsData[month].inc += parseFloat(i.amount) || 0;
                    } else {
                        monthsData[month].exp += val;
                        catTotals[i.category || 'General'] = (catTotals[i.category || 'General'] || 0) + val;
                    }
                });

                const totalInc = monthsData.reduce((a, b) => a + b.inc, 0);
                const totalExp = monthsData.reduce((a, b) => a + b.exp, 0);
                const savings = totalInc - totalExp;
                const savingsPerc = totalInc > 0 ? (savings / totalInc) * 100 : 0;

                return { 
                    monthsData, 
                    totalInc, 
                    totalExp, 
                    savings, 
                    savingsPerc,
                    topCategories: Object.entries(catTotals).sort((a,b) => b[1] - a[1]).slice(0, 5)
                };
            }, [items, mode, annualYear]);

            // Efecto para inicializar Chart.js en la vista anual
            useEffect(() => {
                if (mode === 'annual' && annualStats && chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
                            datasets: [
                                { label: 'Ingresos', data: annualStats.monthsData.map(d => d.inc), backgroundColor: '#10b981', borderRadius: 4 },
                                { label: 'Salidas', data: annualStats.monthsData.map(d => d.exp), backgroundColor: '#f43f5e', borderRadius: 4 }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false }, tooltip: { cornerRadius: 8 } },
                            scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [annualStats, mode]);

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                        {['month', 'trend', 'annual'].map(m => (
                            <button key={m} onClick={() => setMode(m)} className={`flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${mode === m ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                {m === 'month' ? 'Mes' : m === 'trend' ? 'Tendencia' : 'Anual'}
                            </button>
                        ))}
                    </div>

                    {mode === 'month' && (
                        <div className="space-y-4">
                            <div className="bg-white p-6 rounded-[2.5rem] card-shadow space-y-4">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icons.Shopping /> Gastos por Categoría</h3>
                                {byCategory.map(([cat, amount]) => (
                                    <div key={cat} className="space-y-2">
                                        <div className="flex justify-between items-center text-[10px] font-black uppercase tracking-tighter">
                                            <span className={cat === 'General' ? 'text-rose-400' : 'text-slate-600'}>{cat}</span>
                                            <span className="text-slate-400">{formatCurrency(amount)}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                            <div className="h-full bg-slate-800 transition-all" style={{ width: `${(amount / (stats.totalSpent || 1)) * 100}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {mode === 'annual' && annualStats && (
                        <div className="space-y-6">
                            {/* Score Anual */}
                            <div className="bg-white p-6 rounded-[2.5rem] card-shadow border-t-4 border-emerald-500 text-center">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Ahorro Anual Proyectado</p>
                                <h2 className={`text-4xl font-black tracking-tight ${annualStats.savings >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                    {formatCurrency(annualStats.savings)}
                                </h2>
                                <p className="text-xs font-bold text-slate-500 mt-1">Has retenido el {annualStats.savingsPerc.toFixed(1)}% de tus ingresos.</p>
                            </div>

                            {/* Gráfico 12 meses */}
                            <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Evolución Anual</h3>
                                    <select value={annualYear} onChange={e => setAnnualYear(parseInt(e.target.value))} className="bg-slate-100 border-none rounded-lg text-[10px] font-black px-2 py-1 outline-none">
                                        {[2024, 2025, 2026].map(y => <option key={y} value={y}>{y}</option>)}
                                    </select>
                                </div>
                                <div className="chart-container">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>

                            {/* Top Categorías Anuales */}
                            <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white card-shadow">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Concentración de Gasto Anual</h3>
                                <div className="space-y-4">
                                    {annualStats.topCategories.map(([cat, amount], idx) => (
                                        <div key={cat} className="flex items-center gap-4">
                                            <span className="w-4 text-[10px] font-black text-slate-600">0{idx+1}</span>
                                            <div className="flex-1">
                                                <div className="flex justify-between mb-1">
                                                    <span className="text-xs font-bold uppercase">{cat}</span>
                                                    <span className="text-[10px] font-black text-slate-400">{formatCurrency(amount)}</span>
                                                </div>
                                                <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                                    <div className="h-full bg-emerald-500" style={{ width: `${(amount / annualStats.totalExp) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ListView = ({ title, type, items, onAdd, onDelete, onUpdate, onToggle, onSync, placeholder, accent, showCheck, showDueDay, showCategories, showDatePicker, showMonthlyTotal, stats }) => {
            const [newName, setNewName] = useState('');
            const [newAmountStr, setNewAmountStr] = useState('');
            const [newDueDay, setNewDueDay] = useState('');
            const [newCategory, setNewCategory] = useState('General');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);

            const categories = type === 'recurring' ? CATEGORIES_RECURRING : CATEGORIES_DAILY;

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName) return; 
                onAdd({ 
                    name: newName, 
                    amount: parseLocaleNumber(newAmountStr), 
                    dueDay: showDueDay ? (parseInt(newDueDay) || '') : '',
                    category: newCategory,
                    type, 
                    paid: type === 'income',
                    date: showDatePicker ? new Date(newDate).toISOString() : null
                });
                setNewName(''); setNewAmountStr(''); setNewDueDay('');
            };

            const sortedItems = useMemo(() => {
                if (type === 'recurring') return [...items].sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99));
                return items.sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [items, type]);

            return (
                <div className="space-y-5 animate-fade-in pb-10">
                    {showMonthlyTotal && stats && (
                        <div className="bg-rose-50 border border-rose-100 p-5 rounded-[2rem] flex items-center gap-4 card-shadow">
                            <div className="w-10 h-10 bg-rose-500 text-white rounded-2xl flex items-center justify-center shrink-0 border border-rose-600 shadow-sm"><Icons.Shopping /></div>
                            <div>
                                <p className="text-rose-400 text-[10px] font-black uppercase tracking-widest">Gastos Diarios del Mes</p>
                                <p className="text-2xl font-black text-rose-700 tracking-tight">{formatCurrency(stats.daily)}</p>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center ml-1">
                        <div className="flex items-center gap-2">
                            <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{title}</h2>
                            {onSync && <button onClick={onSync} className="p-1 text-slate-400 hover:text-slate-900"><Icons.Refresh /></button>}
                        </div>
                        <span className="text-[9px] font-black text-slate-400 bg-white px-2 py-0.5 rounded-full border border-slate-100 uppercase">{items.length} regs.</span>
                    </div>

                    <form onSubmit={handleAdd} className="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 card-shadow flex flex-col gap-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-medium outline-none" placeholder={placeholder} value={newName} onChange={e => setNewName(e.target.value)} />
                            {showDatePicker && <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-medium outline-none" />}
                        </div>
                        <div className="grid grid-cols-12 gap-3 items-end">
                            <div className={`${showDueDay ? 'col-span-8' : 'col-span-10'} relative`}>
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                <input type="text" className="w-full p-3 pl-7 bg-slate-50 border border-slate-100 rounded-xl text-sm font-black outline-none" placeholder="0,00" value={newAmountStr} onChange={e => setNewAmountStr(e.target.value.replace(/[^0-9,]/g, ''))} />
                            </div>
                            {showDueDay && <input type="number" min="1" max="31" className="col-span-2 w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-black text-center outline-none" placeholder="Vto" value={newDueDay} onChange={e => setNewDueDay(e.target.value)} />}
                            <button type="submit" className="col-span-2 bg-slate-900 text-white h-[46px] rounded-xl font-black flex items-center justify-center"><Icons.Plus /></button>
                        </div>
                        {showCategories && (
                            <div className="flex gap-2 overflow-x-auto py-1 no-scrollbar">
                                {categories.map(cat => <button key={cat} type="button" onClick={() => setNewCategory(cat)} className={`px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest whitespace-nowrap ${newCategory === cat ? 'bg-slate-900 text-white shadow-md' : 'bg-slate-100 text-slate-500 border border-stone-100'}`}>{cat}</button>)}
                            </div>
                        )}
                    </form>

                    <div className="grid grid-cols-1 gap-3">
                        {sortedItems.map(item => <ItemCard key={item.id} item={item} accent={accent} onDel={() => onDelete(item.id)} onEdit={(field, val) => onUpdate(item.id, field, val)} onToggle={onToggle} showCheck={showCheck} showDueDay={showDueDay} />)}
                    </div>
                </div>
            );
        };

        const ItemCard = ({ item, accent, onDel, onEdit, onToggle, showCheck, showDueDay }) => {
            const [showPartialInput, setShowPartialInput] = useState(false);
            const [partialVal, setPartialVal] = useState('');
            const isCC = useMemo(() => {
                const n = (item.name || "").toLowerCase();
                return n.includes("visa") || n.includes("master") || item.category === "Tarjetas";
            }, [item.name, item.category]);

            const borderColors = { emerald: "border-emerald-500", rose: "border-rose-500", amber: "border-amber-500", slate: "border-slate-500" };
            const categories = item.type === 'recurring' ? CATEGORIES_RECURRING : CATEGORIES_DAILY;
            const dynamicBorder = item.type === 'recurring' ? (item.paid ? "border-emerald-500" : "border-amber-500") : borderColors[accent];

            return (
                <div className={`bg-white p-5 rounded-[1.5rem] border-l-[10px] ${dynamicBorder} card-shadow flex flex-col gap-4 transition-all ${item.paid && item.type !== 'income' ? 'opacity-50' : ''}`}>
                    <div className="flex items-center justify-between gap-4">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center flex-wrap gap-2 mb-1">
                                <input className="text-[10px] font-black text-slate-500 uppercase tracking-widest bg-transparent outline-none w-full md:w-auto" value={item.name} onChange={e => onEdit('name', e.target.value)} />
                                <div className="flex gap-2 shrink-0">
                                    {showDueDay ? <input type="number" min="1" max="31" className="bg-slate-100 text-[10px] font-black text-slate-700 outline-none w-8 text-center rounded" value={item.dueDay || ''} onChange={e => onEdit('dueDay', e.target.value)} /> : <div className="text-[8px] font-black text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded border">{new Date(item.date).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })}</div>}
                                    {item.type !== 'income' && (
                                        <select value={item.category || 'General'} onChange={(e) => onEdit('category', e.target.value)} className={`text-[8px] px-2 py-0.5 rounded-full font-black uppercase tracking-widest border transition-all appearance-none outline-none ${item.category === 'General' ? 'bg-rose-50 text-rose-400 border-rose-200' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                            {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                        </select>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center text-2xl font-black text-slate-900 tracking-tighter">
                                <span className="text-slate-400 mr-1.5">$</span>
                                <CurrencyInput value={item.amount} onChange={(val) => onEdit('amount', val)} />
                            </div>
                            {item.paid && item.paymentType === 'partial' && <div className="text-[9px] font-black text-amber-500 uppercase mt-1">Abonado: {formatCurrency(item.paidAmount)} (Resta: {formatCurrency(item.amount - item.paidAmount)})</div>}
                        </div>
                        <div className="flex gap-2 shrink-0">
                            {showCheck && (
                                <div className="flex gap-1">
                                    {!item.paid ? (
                                        <>
                                            <button onClick={() => onToggle(item, 'total')} className="p-3 rounded-2xl transition-all border-2 text-slate-800 hover:text-emerald-600 border-stone-100"><Icons.Check /></button>
                                            {isCC && <button onClick={() => setShowPartialInput(!showPartialInput)} className={`p-3 rounded-2xl transition-all border-2 ${showPartialInput ? 'bg-amber-50 text-amber-600 border-amber-300' : 'text-slate-800 border-stone-100'}`}>P</button>}
                                        </>
                                    ) : <button onClick={() => onToggle(item)} className="p-3 rounded-2xl transition-all border-2 text-emerald-700 bg-emerald-50 border-emerald-300"><Icons.Check /></button>}
                                </div>
                            )}
                            <button onClick={() => onDel(item.id)} className="p-3 text-slate-800 hover:text-rose-600 hover:bg-rose-50 border-2 border-stone-100 rounded-2xl transition-all"><Icons.Trash /></button>
                        </div>
                    </div>
                    {showPartialInput && !item.paid && (
                        <div className="flex gap-2 items-end p-3 bg-amber-50 rounded-2xl animate-fade-in border border-amber-100">
                            <input type="text" className="flex-1 p-2 bg-white border border-amber-200 rounded-xl text-xs font-black outline-none" placeholder="Pago parcial $..." value={partialVal} onChange={e => setPartialVal(e.target.value.replace(/[^0-9,]/g, ''))} />
                            <button onClick={() => {onToggle(item, 'partial', parseLocaleNumber(partialVal)); setShowPartialInput(false);}} className="bg-amber-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Confirmar</button>
                        </div>
                    )}
                </div>
            );
        };

        const CurrencyInput = ({ value, onChange }) => {
            const [display, setDisplay] = useState('');
            useEffect(() => { setDisplay(new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2 }).format(value || 0)); }, [value]);
            return <input type="text" className="bg-transparent outline-none w-full" value={display} onChange={e => setDisplay(e.target.value.replace(/[^0-9,]/g, ''))} onBlur={() => { const n = parseLocaleNumber(display); onChange(n); setDisplay(new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2 }).format(n)); }} placeholder="0,00" />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    
</html>
