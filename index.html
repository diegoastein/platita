<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platita - Mi Control de Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input::-webkit-inner-spin-button, 
        input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Ajuste para que en PC el contenido no se pegue arriba */
        @media (min-width: 768px) {
            main { padding-top: 2rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        // --- UTILIDADES ---
        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-AR', { 
                style: 'currency', 
                currency: 'ARS',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(val || 0);
        };

        const parseLocaleNumber = (stringNumber) => {
            const clean = stringNumber.replace(/[^0-9]/g, '');
            return parseFloat(clean) || 0;
        };

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7v8a2 2 0 002 2h6M8 7a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>,
            Analysis: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2v2m3 10v-3a2 2 0 012-2h2a2 2 0 012 2v3m2 0h-5m-9 0H3m9 0a9 9 0 0118 0v1H3v-1z" /></svg>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [navDate, setNavDate] = useState(new Date());

            const selectedMonth = navDate.getMonth();
            const selectedYear = navDate.getFullYear();

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    setLoading(true);
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    setError(`Error al ingresar: ${e.message}`);
                    setLoading(false);
                }
            };

            const getUserCollection = () => {
                if (!user) return null;
                return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
            };

            useEffect(() => {
                const col = getUserCollection();
                if (!col) {
                    setItems([]);
                    return;
                }
                
                const unsubscribe = col.onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(data);
                    setLoading(false);
                }, (err) => {
                    setError(`Error de base de datos: ${err.message}`);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const currentMonthItems = useMemo(() => {
                return items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });
            }, [items, selectedMonth, selectedYear]);

            const stats = useMemo(() => {
                const income = currentMonthItems.filter(i => i.type === 'income').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPaid = currentMonthItems.filter(i => i.type === 'recurring' && i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPending = currentMonthItems.filter(i => i.type === 'recurring' && !i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const daily = currentMonthItems.filter(i => i.type === 'daily').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const totalSpent = recPaid + daily;
                const spendRatio = income > 0 ? (totalSpent / income) * 100 : 0;

                return { income, recPaid, recPending, daily, balance: income - recPaid - daily, totalSpent, spendRatio };
            }, [currentMonthItems]);

            const changeMonth = (offset) => {
                setNavDate(prev => {
                    const next = new Date(prev);
                    next.setMonth(next.getMonth() + offset);
                    return next;
                });
            };

            const add = async (data) => {
                const col = getUserCollection();
                if (!col) return;
                await col.add({
                    ...data,
                    userId: user.uid,
                    date: data.date || navDate.toISOString(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const importPreviousMonth = async () => {
                const col = getUserCollection();
                if (!col) return;

                const prevDate = new Date(navDate);
                prevDate.setMonth(prevDate.getMonth() - 1);
                const pm = prevDate.getMonth();
                const py = prevDate.getFullYear();

                const prevItems = items.filter(i => {
                    const d = new Date(i.date);
                    return d.getMonth() === pm && d.getFullYear() === py && (i.type === 'income' || i.type === 'recurring');
                });

                if (prevItems.length === 0) {
                    alert("No se encontraron ingresos o gastos recurrentes en el mes anterior.");
                    return;
                }

                if (confirm(`¿Importar ${prevItems.length} registros (con montos en cero) del mes anterior?`)) {
                    for (const item of prevItems) {
                        await add({
                            name: item.name,
                            amount: 0, 
                            dueDay: item.dueDay || '',
                            type: item.type,
                            category: item.category || 'General',
                            paid: item.type === 'income', 
                            date: navDate.toISOString()
                        });
                    }
                }
            };

            const toggle = async (item) => {
                const col = getUserCollection();
                if (!col) return;
                await col.doc(item.id).update({ paid: !item.paid });
            };

            const del = async (id) => {
                const col = getUserCollection();
                if (!col) return;
                if (confirm("¿Eliminar este registro?")) {
                    await col.doc(id).delete();
                }
            };

            const updateField = async (id, field, value) => {
                const col = getUserCollection();
                if (!col) return;
                const updateData = {};
                updateData[field] = (field === 'amount' || field === 'dueDay') ? (parseFloat(value) || 0) : value;
                await col.doc(id).update(updateData);
            };

            if (loading) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-6 text-center">
                    <div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-500 font-medium text-sm">Sincronizando con la nube...</p>
                </div>
            );

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 text-center animate-fade-in">
                    <div className="bg-slate-900 text-white p-5 rounded-[2rem] mb-6 shadow-2xl shadow-slate-200">
                        <Icons.Wallet />
                    </div>
                    <h1 className="text-3xl font-black text-slate-900 mb-2 tracking-tight">Platita</h1>
                    <p className="text-slate-500 text-sm mb-10 max-w-[280px]">Tus ingresos y gastos bajo control, siempre sincronizados.</p>
                    <button onClick={handleGoogleLogin} className="bg-slate-900 text-white w-full max-w-sm py-5 rounded-[1.5rem] font-black text-lg flex items-center justify-center gap-3 active:scale-95 transition-all card-shadow">
                        <svg className="w-6 h-6" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Ingresar con Google
                    </button>
                    {error && <p className="text-rose-500 text-xs mt-6 font-bold">{error}</p>}
                </div>
            );

            return (
                <div className="max-w-md md:max-w-5xl mx-auto min-h-screen bg-slate-50 pb-28 md:pb-12 animate-fade-in relative">
                    <header className="bg-white p-6 sticky top-0 z-20 border-b border-slate-100 shadow-sm md:rounded-b-[2rem]">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                            <div className="flex items-center justify-between md:justify-start gap-4">
                                <h1 className="text-2xl font-black text-slate-900 flex items-center gap-1">
                                    <span className="bg-slate-900 text-white px-3 py-1 rounded-xl">P</span>
                                    Platita
                                </h1>
                                <button onClick={() => auth.signOut()} className="text-slate-300 hover:text-rose-500 transition-colors md:ml-4">
                                    <Icons.Logout />
                                </button>
                            </div>
                            
                            <div className="flex items-center justify-between bg-slate-100 p-1.5 rounded-full md:min-w-[200px]">
                                <button onClick={() => changeMonth(-1)} className="text-slate-500 p-2 hover:bg-white rounded-full transition-all hover:shadow-sm"><Icons.ChevronLeft /></button>
                                <span className="text-xs font-black text-slate-700 uppercase tracking-widest px-4">
                                    {navDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' })}
                                </span>
                                <button onClick={() => changeMonth(1)} className="text-slate-500 p-2 hover:bg-white rounded-full transition-all hover:shadow-sm"><Icons.ChevronRight /></button>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-3 gap-6">
                            <div className="md:col-span-2 bg-slate-900 rounded-[2.5rem] p-8 text-white card-shadow relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute top-0 right-0 w-48 h-48 bg-emerald-500 opacity-10 rounded-full -mr-24 -mt-24"></div>
                                <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-2">Disponible</p>
                                <h2 className="text-5xl font-black mb-6 tracking-tighter">{formatCurrency(stats.balance)}</h2>
                                
                                <div className="w-full bg-slate-800 h-2 rounded-full mb-6 overflow-hidden">
                                    <div className={`h-full transition-all duration-1000 ${stats.spendRatio > 90 ? 'bg-rose-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(stats.spendRatio, 100)}%` }}></div>
                                </div>

                                <div className="flex justify-between items-end">
                                    <div>
                                        <p className="text-slate-500 text-[10px] uppercase font-black mb-1">Ingresos totales</p>
                                        <p className="text-emerald-400 font-black text-lg">{formatCurrency(stats.income)}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-slate-500 text-[10px] uppercase font-black mb-1">Consumido</p>
                                        <p className="text-rose-400 font-black text-lg">{formatCurrency(stats.totalSpent)}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex flex-col gap-4">
                                <SummaryCard title="A pagar pronto" amount={stats.recPending} icon={<Icons.Calendar />} color="amber" />
                                <SummaryCard title="Gastos Diarios" amount={stats.daily} icon={<Icons.Shopping />} color="rose" />
                            </div>
                        </div>
                    </header>

                    <main className="p-4 md:p-8 space-y-8">
                        {currentMonthItems.length === 0 && (
                            <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white flex flex-col items-center text-center animate-fade-in shadow-2xl shadow-slate-200 md:max-w-2xl mx-auto">
                                <div className="bg-white/10 p-4 rounded-full mb-4"><Icons.Copy /></div>
                                <h3 className="text-xl font-black mb-2">Comenzá el mes</h3>
                                <p className="text-slate-400 text-sm mb-8 max-w-[300px]">Copia automáticamente tus sueldos y gastos fijos del mes anterior para ahorrar tiempo.</p>
                                <button onClick={importPreviousMonth} className="bg-white text-slate-900 px-10 py-4 rounded-2xl font-black text-sm active:scale-95 transition-all card-shadow">
                                    Importar plantilla fija
                                </button>
                            </div>
                        )}

                        <div className="md:grid md:grid-cols-2 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-8 space-y-8">
                                {view === 'dashboard' && (
                                    <div className="md:hidden space-y-4">
                                        <Summary stats={stats} />
                                    </div>
                                )}
                                {view === 'dashboard' && (
                                    <div className="hidden md:block bg-white p-12 rounded-[3rem] border border-slate-100 card-shadow text-center">
                                        <h2 className="text-3xl font-black text-slate-900 mb-4">Bienvenido a Platita</h2>
                                        <p className="text-slate-500 mb-8 max-w-md mx-auto">Seleccioná una categoría en el menú para gestionar tus movimientos o revisá el análisis detallado.</p>
                                        <div className="flex justify-center gap-4">
                                            <button onClick={() => setView('income')} className="bg-emerald-500 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-emerald-600 transition-colors">Ingresos</button>
                                            <button onClick={() => setView('recurring')} className="bg-amber-500 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-amber-600 transition-colors">Fijos</button>
                                            <button onClick={() => setView('daily')} className="bg-rose-500 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-rose-600 transition-colors">Diarios</button>
                                        </div>
                                    </div>
                                )}
                                {view === 'analysis' && <AnalysisView stats={stats} currentMonthItems={currentMonthItems} />}
                                {view === 'income' && <ListView title="Sueldos e Ingresos" type="income" items={currentMonthItems.filter(i => i.type === 'income')} onAdd={add} onDelete={del} onUpdate={updateField} placeholder="Nombre del ingreso" accent="emerald" />}
                                {view === 'recurring' && <ListView title="Gastos Fijos" type="recurring" items={currentMonthItems.filter(i => i.type === 'recurring')} onAdd={add} onDelete={del} onUpdate={updateField} onToggle={toggle} placeholder="Ej: Expensas, Alquiler" accent="amber" showCheck showDueDay />}
                                {view === 'daily' && <ListView title="Gastos Diarios" type="daily" items={currentMonthItems.filter(i => i.type === 'daily')} onAdd={add} onDelete={del} onUpdate={updateField} placeholder="Ej: Super, Farmacia" accent="rose" showCategories />}
                            </div>
                            
                            <div className="hidden lg:block lg:col-span-4 space-y-6">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Estado de Salud</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 card-shadow">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="text-sm font-bold text-slate-800">Ratio de Consumo</span>
                                        <span className={`text-lg font-black ${stats.spendRatio > 90 ? 'text-rose-500' : 'text-emerald-500'}`}>{stats.spendRatio.toFixed(0)}%</span>
                                    </div>
                                    <div className="space-y-4 text-xs font-medium text-slate-500">
                                        <p>Has consumido {formatCurrency(stats.totalSpent)} de tus {formatCurrency(stats.income)} mensuales.</p>
                                        {stats.balance > 0 ? (
                                            <p className="text-emerald-600 font-bold bg-emerald-50 p-3 rounded-xl border border-emerald-100">Te queda un margen de {formatCurrency(stats.balance)} para ahorrar o invertir.</p>
                                        ) : (
                                            <p className="text-rose-600 font-bold bg-rose-50 p-3 rounded-xl border border-rose-100">Estás gastando más de lo que ingresas. ¡Cuidado!</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Navegación Adaptada */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-30 md:bottom-8 md:left-1/2 md:-translate-x-1/2 md:w-fit md:rounded-full md:shadow-2xl md:border md:border-slate-200">
                        <div className="max-w-md md:max-w-none mx-auto flex justify-between md:justify-center md:gap-4 px-6 md:px-4 py-4 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Inicio" />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Ingresos" />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="Fijos" />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="Diarios" />
                            <NavTab active={view === 'analysis'} onClick={() => setView('analysis')} icon={<Icons.Analysis />} label="Análisis" />
                        </div>
                    </nav>
                </div>
            );
        };

        const SummaryCard = ({ title, amount, icon, color }) => {
            const colors = {
                amber: "bg-amber-50 text-amber-500",
                rose: "bg-rose-50 text-rose-500",
                emerald: "bg-emerald-50 text-emerald-500"
            };
            return (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 flex items-center gap-4 card-shadow flex-1">
                    <div className={`w-12 h-12 ${colors[color]} rounded-2xl flex items-center justify-center shrink-0`}>{icon}</div>
                    <div>
                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{title}</p>
                        <p className="text-xl font-black text-slate-800 tracking-tight">{formatCurrency(amount)}</p>
                    </div>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`p-4 rounded-2xl md:rounded-full transition-all duration-300 flex flex-col md:flex-row items-center gap-1 md:gap-3 group ${active ? 'bg-slate-900 text-white shadow-xl scale-110 md:scale-100 md:px-6' : 'text-slate-400 hover:bg-slate-100'}`}>
                {icon}
                <span className={`text-[10px] md:text-xs font-black uppercase tracking-widest md:block ${active ? 'block' : 'hidden md:group-hover:block'}`}>{label}</span>
            </button>
        );

        const Summary = ({ stats }) => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                <SummaryCard title="A pagar pronto" amount={stats.recPending} icon={<Icons.Calendar />} color="amber" />
                <SummaryCard title="Gastos Diarios" amount={stats.daily} icon={<Icons.Shopping />} color="rose" />
            </div>
        );

        const AnalysisView = ({ stats, currentMonthItems }) => {
            const dailyByCategory = useMemo(() => {
                const cats = {};
                currentMonthItems.filter(i => i.type === 'daily').forEach(i => {
                    const c = i.category || 'General';
                    cats[c] = (cats[c] || 0) + (parseFloat(i.amount) || 0);
                });
                return Object.entries(cats).sort((a,b) => b[1] - a[1]);
            }, [currentMonthItems]);

            return (
                <div className="grid md:grid-cols-2 gap-8 animate-fade-in">
                    <div className="space-y-6">
                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Distribución Mensual</h2>
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 card-shadow space-y-8">
                            <ProgressBar label="Gastos Fijos" amount={stats.recPaid} total={stats.totalSpent} color="amber" />
                            <ProgressBar label="Gastos Diarios" amount={stats.daily} total={stats.totalSpent} color="rose" />
                        </div>
                    </div>

                    <div className="space-y-6">
                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Por Categoría</h2>
                        <div className="grid gap-3">
                            {dailyByCategory.map(([cat, amount]) => (
                                <div key={cat} className="bg-white p-5 rounded-[1.5rem] border border-slate-100 card-shadow flex items-center justify-between hover:translate-x-1 transition-transform">
                                    <div className="flex-1">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{cat}</p>
                                        <p className="text-xl font-black text-slate-800 tracking-tight">{formatCurrency(amount)}</p>
                                    </div>
                                    <div className="bg-slate-50 px-3 py-1 rounded-full text-xs font-black text-slate-400">
                                        {((amount / (stats.daily || 1)) * 100).toFixed(0)}%
                                    </div>
                                </div>
                            ))}
                            {dailyByCategory.length === 0 && <p className="text-center text-slate-400 text-xs italic py-10 bg-white rounded-[2.5rem] border border-dashed border-slate-200">No hay datos registrados.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const ProgressBar = ({ label, amount, total, color }) => {
            const percentage = ((amount / (total || 1)) * 100).toFixed(0);
            const colors = {
                amber: "bg-amber-400",
                rose: "bg-rose-400"
            };
            return (
                <div className="space-y-2">
                    <div className="flex justify-between items-center text-sm font-black text-slate-700">
                        <span>{label}</span>
                        <span className="text-slate-400">{percentage}%</span>
                    </div>
                    <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                        <div className={`h-full ${colors[color]} transition-all duration-1000`} style={{ width: `${percentage}%` }}></div>
                    </div>
                </div>
            );
        };

        const ListView = ({ title, type, items, onAdd, onDelete, onUpdate, onToggle, placeholder, accent, showCheck, showCategories, showDueDay }) => {
            const [newName, setNewName] = useState('');
            const [newAmountString, setNewAmountString] = useState('');
            const [newDueDay, setNewDueDay] = useState('');
            const [newCategory, setNewCategory] = useState('General');

            const handleAmountChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                if (val === '') {
                    setNewAmountString('');
                    return;
                }
                const formatted = new Intl.NumberFormat('es-AR').format(parseInt(val));
                setNewAmountString(formatted);
            };

            const handleAdd = (e) => {
                e.preventDefault();
                const amount = parseLocaleNumber(newAmountString);
                if (!newName || amount === 0) return;
                onAdd({ 
                    name: newName, 
                    amount: amount, 
                    dueDay: showDueDay ? (parseInt(newDueDay) || '') : '',
                    category: newCategory,
                    type, 
                    paid: type === 'income' 
                });
                setNewName(''); setNewAmountString(''); setNewDueDay('');
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-end ml-1">
                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{title}</h2>
                        <span className="text-[10px] font-black text-slate-300 bg-white px-3 py-1 rounded-full border border-slate-100">{items.length} movimientos</span>
                    </div>

                    <form onSubmit={handleAdd} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 card-shadow flex flex-col gap-6 md:grid md:grid-cols-12 md:items-end">
                        <div className="md:col-span-12 lg:col-span-5 space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Descripción</label>
                            <input className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-medium outline-none focus:ring-4 focus:ring-slate-900/5 transition-all" placeholder={placeholder} value={newName} onChange={e => setNewName(e.target.value)} />
                        </div>
                        
                        <div className="md:col-span-6 lg:col-span-3 space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Monto ($)</label>
                            <div className="relative">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 font-bold">$</span>
                                <input type="text" className="w-full p-4 pl-8 bg-slate-50 border-none rounded-2xl text-sm font-black outline-none focus:ring-4 focus:ring-slate-900/5" placeholder="0" value={newAmountString} onChange={handleAmountChange} />
                            </div>
                        </div>

                        {showDueDay && (
                            <div className="md:col-span-3 lg:col-span-2 space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Día</label>
                                <input type="number" min="1" max="31" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-black text-center outline-none focus:ring-4 focus:ring-slate-900/5" placeholder="31" value={newDueDay} onChange={e => setNewDueDay(e.target.value)} />
                            </div>
                        )}

                        <div className="md:col-span-3 lg:col-span-2">
                            <button type="submit" className="bg-slate-900 text-white w-full h-[56px] rounded-2xl font-black shadow-xl shadow-slate-200 hover:bg-black transition-all active:scale-95 flex items-center justify-center">
                                <Icons.Plus />
                            </button>
                        </div>

                        {showCategories && (
                            <div className="md:col-span-12 flex gap-2 overflow-x-auto py-2 no-scrollbar">
                                {["General", "Comida", "Transporte", "Hogar", "Ocio", "Salud"].map(cat => (
                                    <button key={cat} type="button" onClick={() => setNewCategory(cat)} className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${newCategory === cat ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{cat}</button>
                                ))}
                            </div>
                        )}
                    </form>

                    <div className="grid md:grid-cols-1 lg:grid-cols-1 gap-4">
                        {items.sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99)).map(item => (
                            <ItemCard 
                                key={item.id} 
                                item={item} 
                                accent={accent} 
                                onDel={() => onDelete(item.id)} 
                                onEdit={(field, val) => onUpdate(item.id, field, val)}
                                onToggle={() => onToggle && onToggle(item)}
                                showCheck={showCheck}
                                showDueDay={showDueDay}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const ItemCard = ({ item, accent, onDel, onEdit, onToggle, showCheck, showDueDay }) => {
            const borderColors = {
                emerald: "border-emerald-400",
                rose: "border-rose-400",
                amber: "border-amber-400",
                slate: "border-slate-400"
            };

            return (
                <div className={`bg-white p-6 rounded-[2rem] border-l-[10px] ${borderColors[accent]} card-shadow flex items-center justify-between gap-6 transition-all ${item.paid && showCheck ? 'opacity-30 grayscale scale-[0.98]' : 'hover:-translate-y-1'}`}>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-3 mb-2">
                            <input 
                                className="text-xs font-black text-slate-400 uppercase tracking-widest bg-transparent outline-none focus:text-slate-900 w-full" 
                                value={item.name} 
                                onChange={e => onEdit('name', e.target.value)} 
                            />
                            {showDueDay && (
                                <div className="flex items-center bg-slate-100 rounded-lg px-2 py-1 shrink-0">
                                    <span className="text-[8px] font-black text-slate-400 mr-2 uppercase tracking-tighter">Vencimiento:</span>
                                    <input 
                                        type="number" 
                                        min="1" max="31"
                                        className="bg-transparent text-[10px] font-black text-slate-600 outline-none w-6 text-center"
                                        value={item.dueDay || ''}
                                        onChange={e => onEdit('dueDay', e.target.value)}
                                    />
                                </div>
                            )}
                            {item.category && !showDueDay && <span className="text-[8px] bg-slate-100 px-3 py-1 rounded-full text-slate-400 font-black uppercase tracking-widest">{item.category}</span>}
                        </div>
                        <div className="flex items-center text-3xl font-black text-slate-900 tracking-tighter">
                            <span className="text-slate-200 mr-2">$</span>
                            <CurrencyInput value={item.amount} onChange={(val) => onEdit('amount', val)} />
                        </div>
                    </div>
                    <div className="flex gap-2">
                        {showCheck && (
                            <button onClick={onToggle} className={`p-4 rounded-2xl transition-all ${item.paid ? 'text-emerald-600 bg-emerald-50 shadow-inner' : 'text-slate-200 hover:text-emerald-500 hover:bg-emerald-50'}`}>
                                <Icons.Check />
                            </button>
                        )}
                        <button onClick={onDel} className="p-4 text-slate-100 hover:text-rose-500 hover:bg-rose-50 rounded-2xl transition-all">
                            <Icons.Trash />
                        </button>
                    </div>
                </div>
            );
        };

        const CurrencyInput = ({ value, onChange }) => {
            const [display, setDisplay] = useState('');

            useEffect(() => {
                setDisplay(new Intl.NumberFormat('es-AR').format(value || 0));
            }, [value]);

            const handleChange = (e) => {
                const raw = e.target.value.replace(/[^0-9]/g, '');
                if (raw === '') {
                    setDisplay('');
                    onChange(0);
                    return;
                }
                const num = parseInt(raw);
                setDisplay(new Intl.NumberFormat('es-AR').format(num));
                onChange(num);
            };

            return (
                <input 
                    type="text" 
                    className="bg-transparent outline-none w-full" 
                    value={display} 
                    onChange={handleChange} 
                />
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
