<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platita - Mi Control de Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input::-webkit-inner-spin-button, 
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            main { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
            authDomain: "platita-3fcc5.firebaseapp.com",
            projectId: "platita-3fcc5",
            storageBucket: "platita-3fcc5.firebasestorage.app",
            messagingSenderId: "93396692454",
            appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        // --- CONSTANTES ---
        const CATEGORIES_RECURRING = ["Hogar", "Servicios", "Impuestos", "Salud", "Educación", "Tarjetas", "General"];
        const CATEGORIES_DAILY = ["Comida", "Transporte", "Ocio", "Super", "Shopping", "General"];

        // --- UTILIDADES ---
        const formatCurrency = (val, mask = false) => {
            if (mask) return "$ ••••••";
            return new Intl.NumberFormat('es-AR', { 
                style: 'currency', 
                currency: 'ARS',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(val || 0);
        };

        const parseLocaleNumber = (stringNumber) => {
            if (!stringNumber) return 0;
            const clean = stringNumber.toString().replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>,
            Logout: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7v8a2 2 0 002 2h6M8 7a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>,
            Analysis: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2v2m3 10v-3a2 2 0 012-2h2a2 2 0 012 2v3m2 0h-5m-9 0H3m9 0a9 9 0 0118 0v1H3v-1z" /></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>,
            Chart: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h5M20 20v-5h-5M20 4.24a9 9 0 101.44 10.37" /></svg>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [navDate, setNavDate] = useState(new Date());
            const [hideBalance, setHideBalance] = useState(true);

            const selectedMonth = navDate.getMonth();
            const selectedYear = navDate.getFullYear();

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    setLoading(true);
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    setError(`Error al ingresar: ${e.message}`);
                    setLoading(false);
                }
            };

            const getUserCollection = () => {
                if (!user) return null;
                return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
            };

            useEffect(() => {
                const col = getUserCollection();
                if (!col) {
                    setItems([]);
                    return;
                }
                
                const unsubscribe = col.onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(data);
                    setLoading(false);
                }, (err) => {
                    setError(`Error de base de datos: ${err.message}`);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const currentMonthItems = useMemo(() => {
                return items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });
            }, [items, selectedMonth, selectedYear]);

            const stats = useMemo(() => {
                const income = currentMonthItems.filter(i => i.type === 'income').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                
                const recPaid = currentMonthItems.filter(i => i.type === 'recurring' && i.paid).reduce((acc, c) => {
                    const actualPaid = c.paymentType === 'partial' ? (parseFloat(c.paidAmount) || 0) : (parseFloat(c.amount) || 0);
                    return acc + actualPaid;
                }, 0);
                
                const recPending = currentMonthItems.filter(i => i.type === 'recurring' && !i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const daily = currentMonthItems.filter(i => i.type === 'daily').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                
                const totalSpent = recPaid + daily;
                const spendRatio = income > 0 ? (totalSpent / income) * 100 : 0;

                const upcomingExpenses = currentMonthItems
                    .filter(i => i.type === 'recurring' && !i.paid)
                    .sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99))
                    .slice(0, 3);

                return { income, recPaid, recPending, daily, balance: income - recPaid - daily, totalSpent, spendRatio, upcomingExpenses };
            }, [currentMonthItems]);

            const changeMonth = (offset) => {
                setNavDate(prev => {
                    const next = new Date(prev);
                    next.setMonth(next.getMonth() + offset);
                    return next;
                });
            };

            const add = async (data) => {
                const col = getUserCollection();
                if (!col) return;
                await col.add({
                    ...data,
                    userId: user.uid,
                    date: data.date || navDate.toISOString(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const importPreviousMonth = async (overwrite = false) => {
                const col = getUserCollection();
                if (!col) return;

                const prevDate = new Date(navDate);
                prevDate.setMonth(prevDate.getMonth() - 1);
                const pm = prevDate.getMonth();
                const py = prevDate.getFullYear();

                const prevItems = items.filter(i => {
                    const d = new Date(i.date);
                    return d.getMonth() === pm && d.getFullYear() === py && (i.type === 'income' || i.type === 'recurring');
                });

                if (prevItems.length === 0) {
                    alert("No hay registros fijos para copiar del mes anterior.");
                    return;
                }

                const confirmMsg = overwrite 
                    ? `Esto reemplazará los cobros y gastos fijos de este mes por los del mes pasado ($0). ¿Continuar?`
                    : `¿Importar registros del mes pasado? También se arrastrarán saldos pendientes de tarjetas.`;

                if (confirm(confirmMsg)) {
                    if (overwrite) {
                        const toDelete = currentMonthItems.filter(i => i.type === 'income' || i.type === 'recurring');
                        for (const item of toDelete) {
                            await col.doc(item.id).delete();
                        }
                    }

                    for (const item of prevItems) {
                        await add({
                            name: item.name,
                            amount: 0, 
                            dueDay: item.dueDay || '',
                            type: item.type,
                            category: item.category || 'General',
                            paid: item.type === 'income', 
                            date: navDate.toISOString()
                        });

                        if (item.type === 'recurring' && item.paid && item.paymentType === 'partial') {
                            const debt = (parseFloat(item.amount) || 0) - (parseFloat(item.paidAmount) || 0);
                            if (debt > 0) {
                                await add({
                                    name: `Saldo pendiente: ${item.name}`,
                                    amount: debt,
                                    dueDay: item.dueDay || '',
                                    type: 'recurring',
                                    category: 'Tarjetas',
                                    paid: false,
                                    date: navDate.toISOString()
                                });
                            }
                        }
                    }
                }
            };

            const toggle = async (item, pType = 'total', pAmount = null) => {
                const col = getUserCollection();
                if (!col) return;
                const isPaying = !item.paid;
                
                await col.doc(item.id).update({ 
                    paid: isPaying,
                    paymentType: isPaying ? pType : null,
                    paidAmount: isPaying ? (pType === 'partial' ? pAmount : item.amount) : null
                });
            };

            const del = async (id) => {
                const col = getUserCollection();
                if (!col) return;
                if (confirm("¿Eliminar este registro?")) {
                    await col.doc(id).delete();
                }
            };

            const updateField = async (id, field, value) => {
                const col = getUserCollection();
                if (!col) return;
                const updateData = {};
                let finalVal = value;
                if (field === 'amount' || field === 'dueDay' || field === 'paidAmount') {
                    finalVal = parseFloat(value.toString().replace(',','.')) || 0;
                }
                updateData[field] = finalVal;
                await col.doc(id).update(updateData);
            };

            if (loading) return <div className="flex h-screen items-center justify-center bg-white"><div className="w-10 h-10 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white p-8 text-center animate-fade-in">
                    <div className="bg-slate-900 text-white p-5 rounded-[2rem] mb-6 shadow-2xl shadow-slate-200"><Icons.Wallet /></div>
                    <h1 className="text-3xl font-black text-slate-900 mb-2 tracking-tight">Platita</h1>
                    <p className="text-slate-500 text-sm mb-10 max-w-[280px]">Ingresá para gestionar tus finanzas con sincronización total.</p>
                    <button onClick={handleGoogleLogin} className="bg-slate-900 text-white w-full max-w-sm py-5 rounded-[1.5rem] font-black text-lg flex items-center justify-center gap-3 active:scale-95 transition-all card-shadow">
                        Ingresar con Google
                    </button>
                </div>
            );

            return (
                <div className="max-w-md md:max-w-5xl mx-auto min-h-screen bg-slate-50 pb-32 md:pb-12 animate-fade-in relative">
                    <header className="bg-white p-4 md:p-6 border-b border-slate-100 shadow-sm md:rounded-b-[2.5rem]">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 md:mb-6">
                            <div className="flex items-center justify-between md:justify-start gap-4">
                                <h1 className="text-xl md:text-2xl font-black text-slate-900 flex items-center gap-1">
                                    <span className="bg-slate-900 text-white px-2.5 py-0.5 rounded-lg">P</span> Platita
                                </h1>
                                <button onClick={() => auth.signOut()} className="text-slate-500 hover:text-rose-600 transition-colors md:ml-4"><Icons.Logout /></button>
                            </div>
                            <div className="flex items-center justify-between bg-slate-100 p-1 rounded-full md:min-w-[200px]">
                                <button onClick={() => changeMonth(-1)} className="text-slate-500 p-1.5 hover:bg-white rounded-full transition-all"><Icons.ChevronLeft /></button>
                                <span className="text-[10px] font-black text-slate-700 uppercase tracking-widest px-4 text-center">{navDate.toLocaleString('es-ES', { month: 'short', year: 'numeric' })}</span>
                                <button onClick={() => changeMonth(1)} className="text-slate-500 p-1.5 hover:bg-white rounded-full transition-all"><Icons.ChevronRight /></button>
                            </div>
                        </div>

                        <div className="bg-slate-900 rounded-[2rem] p-5 md:p-6 text-white card-shadow relative overflow-hidden flex flex-col items-center">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16"></div>
                            <button onClick={() => setHideBalance(!hideBalance)} className="absolute top-4 right-6 text-slate-400 hover:text-white transition-colors p-2 z-10">
                                {hideBalance ? <Icons.Eye /> : <Icons.EyeOff />}
                            </button>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Saldo Disponible</p>
                            <h2 className="text-3xl md:text-4xl font-black mb-4 tracking-tight">{formatCurrency(stats.balance, hideBalance)}</h2>
                            <div className="w-full bg-white/10 h-1.5 rounded-full mb-4 overflow-hidden max-w-xs">
                                <div className={`h-full transition-all duration-1000 ${stats.spendRatio > 90 ? 'bg-rose-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(stats.spendRatio, 100)}%` }}></div>
                            </div>
                            <div className="grid grid-cols-2 gap-8 border-t border-white/10 pt-4 w-full max-w-sm">
                                <div className="text-center">
                                    <p className="text-slate-500 text-[9px] uppercase font-black mb-1 tracking-tighter">Cobros</p>
                                    <p className="text-emerald-400 font-black text-sm">{formatCurrency(stats.income, hideBalance)}</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-slate-500 text-[9px] uppercase font-black mb-1 tracking-tighter">Salidas</p>
                                    <p className="text-rose-400 font-black text-sm">{formatCurrency(stats.totalSpent, hideBalance)}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 md:p-6 space-y-6">
                        {currentMonthItems.length === 0 && (
                            <div className="bg-slate-900 p-8 rounded-[2rem] text-white flex flex-col items-center text-center animate-fade-in shadow-xl md:max-w-2xl mx-auto">
                                <div className="bg-white/10 p-3 rounded-full mb-3"><Icons.Copy /></div>
                                <h3 className="text-lg font-black mb-1">Iniciá el mes</h3>
                                <p className="text-slate-400 text-xs mb-6 text-balance px-4">Importá tus registros fijos del mes anterior para empezar.</p>
                                <button onClick={() => importPreviousMonth(false)} className="bg-white text-slate-900 px-8 py-3 rounded-xl font-black text-xs active:scale-95 transition-all">Importar plantilla</button>
                            </div>
                        )}

                        <div className="max-w-3xl mx-auto space-y-6">
                            {view === 'dashboard' && <Summary stats={stats} />}
                            {view === 'analysis' && <AnalysisView stats={stats} allItems={items} currentMonthItems={currentMonthItems} navDate={navDate} />}
                            {view === 'income' && <ListView title="Cobros e Ingresos" type="income" items={currentMonthItems.filter(i => i.type === 'income')} onAdd={add} onDelete={del} onUpdate={updateField} onSync={() => importPreviousMonth(true)} placeholder="Descripción" accent="emerald" />}
                            {view === 'recurring' && <ListView title="Gastos Fijos" type="recurring" items={currentMonthItems.filter(i => i.type === 'recurring')} onAdd={add} onDelete={del} onUpdate={updateField} onToggle={toggle} onSync={() => importPreviousMonth(true)} placeholder="Descripción" accent="amber" showCheck showDueDay showCategories />}
                            {view === 'daily' && <ListView title="Gastos Diarios" type="daily" items={currentMonthItems.filter(i => i.type === 'daily')} onAdd={add} onDelete={del} onUpdate={updateField} placeholder="Detalle" accent="rose" showCategories showDatePicker showMonthlyTotal stats={stats} />}
                        </div>
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-30 md:bottom-8 md:left-1/2 md:-translate-x-1/2 md:w-fit md:rounded-full md:shadow-2xl md:border md:border-slate-200">
                        <div className="max-w-md md:max-w-none mx-auto flex justify-around md:justify-center md:gap-2 px-2 md:px-4 py-3 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Inicio" />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Cobros" />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="Fijos" />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="Diarios" />
                            <NavTab active={view === 'analysis'} onClick={() => setView('analysis')} icon={<Icons.Analysis />} label="Análisis" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl md:rounded-full transition-all duration-300 flex flex-col md:flex-row items-center gap-1 md:gap-2 group ${active ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100'}`}>
                {icon} <span className={`text-[8px] md:text-[10px] font-black uppercase tracking-widest ${active ? 'block' : 'hidden md:group-hover:block'}`}>{label}</span>
            </button>
        );

        const Summary = ({ stats }) => (
            <div className="grid grid-cols-1 gap-4 animate-fade-in">
                <SummaryCard 
                    title="Vencimientos Próximos" 
                    amount={stats.recPending} 
                    icon={<Icons.Calendar />} 
                    color="amber" 
                    upcomingList={stats.upcomingExpenses} 
                />
            </div>
        );

        const SummaryCard = ({ title, amount, icon, color, upcomingList = [] }) => {
            const colors = { amber: "bg-amber-50 text-amber-600 border-amber-100", rose: "bg-rose-50 text-rose-600 border-rose-100", emerald: "bg-emerald-50 text-emerald-600 border-emerald-100" };
            return (
                <div className={`bg-white p-5 rounded-[2rem] border ${colors[color]} card-shadow flex flex-col gap-4 h-full`}>
                    <div className="flex items-center gap-4">
                        <div className={`w-10 h-10 ${colors[color]} rounded-2xl flex items-center justify-center shrink-0 border`}>{icon}</div>
                        <div className="flex-1 min-w-0">
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest truncate">{title}</p>
                            <p className="text-xl font-black text-slate-800 tracking-tight">{formatCurrency(amount)}</p>
                        </div>
                    </div>
                    {upcomingList.length > 0 && (
                        <div className="bg-white/50 rounded-2xl p-3 border border-dashed border-amber-200">
                            <ul className="space-y-2">
                                {upcomingList.map(item => (
                                    <li key={item.id} className="flex justify-between items-center text-[10px] font-bold text-slate-600">
                                        <span className="truncate mr-2 uppercase tracking-tighter max-w-[120px]">{item.name}</span>
                                        <span className="shrink-0 bg-amber-100 px-1.5 py-0.5 rounded text-amber-700">Día {item.dueDay}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            );
        };

        const AnalysisView = ({ stats, allItems, currentMonthItems, navDate }) => {
            const [mode, setMode] = useState('month');
            const [selectedRecurringName, setSelectedRecurringName] = useState('');
            const [activeBarIdx, setActiveBarIdx] = useState(null);

            const recurringNames = useMemo(() => {
                const names = new Set();
                allItems.filter(i => i.type === 'recurring').forEach(i => names.add(i.name));
                return Array.from(names).sort();
            }, [allItems]);

            const byCategory = useMemo(() => {
                const cats = {};
                currentMonthItems.forEach(i => {
                    if (i.type === 'income') return;
                    const c = i.category || 'General';
                    const value = i.paymentType === 'partial' ? (parseFloat(i.paidAmount) || 0) : (parseFloat(i.amount) || 0);
                    cats[c] = (cats[c] || 0) + value;
                });
                return Object.entries(cats).sort((a,b) => b[1] - a[1]);
            }, [currentMonthItems]);

            const timeline = useMemo(() => {
                return currentMonthItems
                    .filter(i => i.type === 'recurring')
                    .sort((a,b) => (parseFloat(b.amount) || 0) - (parseFloat(a.amount) || 0));
            }, [currentMonthItems]);

            const trendData = useMemo(() => {
                const months = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date();
                    d.setMonth(d.getMonth() - i);
                    const m = d.getMonth();
                    const y = d.getFullYear();
                    const filtered = allItems.filter(item => {
                        const itemDate = new Date(item.date);
                        return itemDate.getMonth() === m && itemDate.getFullYear() === y;
                    });
                    const income = filtered.filter(f => f.type === 'income').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                    const expenses = filtered.filter(f => f.type !== 'income' && (f.type !== 'recurring' || f.paid)).reduce((acc, c) => {
                        const val = (c.type === 'recurring' && c.paymentType === 'partial') ? (parseFloat(c.paidAmount) || 0) : (parseFloat(c.amount) || 0);
                        return acc + val;
                    }, 0);
                    months.push({ label: d.toLocaleString('es-ES', { month: 'short' }), income, expenses });
                }
                return months;
            }, [allItems]);

            const specificExpenseTrend = useMemo(() => {
                if (!selectedRecurringName) return [];
                const months = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date();
                    d.setMonth(d.getMonth() - i);
                    const m = d.getMonth();
                    const y = d.getFullYear();
                    const record = allItems.find(item => {
                        const itemDate = new Date(item.date);
                        return itemDate.getMonth() === m && itemDate.getFullYear() === y && item.name === selectedRecurringName;
                    });
                    months.push({ label: d.toLocaleString('es-ES', { month: 'short' }), amount: record ? record.amount : 0 });
                }
                return months;
            }, [allItems, selectedRecurringName]);

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex bg-slate-100 p-1 rounded-2xl md:max-w-xs mx-auto">
                        <button onClick={() => setMode('month')} className={`flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${mode === 'month' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Este Mes</button>
                        <button onClick={() => setMode('trend')} className={`flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${mode === 'trend' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>Tendencia</button>
                    </div>

                    {mode === 'month' ? (
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 card-shadow">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><Icons.Calendar /> Gastos de este mes</h3>
                                <div className="space-y-4">
                                    {timeline.map(item => (
                                        <div key={item.id} className="flex items-center gap-4">
                                            <div className="w-8 h-8 rounded-full bg-slate-50 border flex items-center justify-center shrink-0">
                                                <span className="text-[10px] font-black text-slate-600">{item.dueDay || '–'}</span>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-xs font-bold text-slate-800 truncate uppercase">{item.name}</p>
                                                <div className="w-full bg-slate-100 h-1 rounded-full mt-1 overflow-hidden">
                                                    <div className={`h-full transition-all duration-1000 ${item.paid ? 'bg-emerald-400' : 'bg-amber-400'}`} style={{ width: `${(item.amount / (Math.max(stats.totalSpent, stats.income) || 1)) * 100}%` }}></div>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className={`text-[10px] font-black block ${item.paid ? 'text-emerald-500' : 'text-slate-400'}`}>{formatCurrency(item.amount)}</span>
                                                {item.paymentType === 'partial' && <span className="text-[8px] font-black text-amber-500 uppercase tracking-tighter">Parcial</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 card-shadow">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><Icons.Shopping /> Análisis por Categoría</h3>
                                <div className="space-y-4">
                                    {byCategory.map(([cat, amount]) => (
                                        <div key={cat} className="space-y-2">
                                            <div className="flex justify-between items-center text-[10px] font-black uppercase tracking-tighter">
                                                <span className={`${cat === 'General' ? 'text-rose-400' : 'text-slate-600'}`}>{cat} {cat === 'General' && '⚠️'}</span>
                                                <span className="text-slate-400">{formatCurrency(amount)}</span>
                                            </div>
                                            <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                                <div className="h-full bg-slate-800 transition-all duration-1000" style={{ width: `${(amount / (stats.totalSpent || 1)) * 100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 card-shadow overflow-hidden">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8 flex items-center gap-2"><Icons.Chart /> Evolución: Cobros vs Salidas</h3>
                                <div className="flex items-end justify-between h-48 px-2">
                                    {trendData.map((d, idx) => {
                                        const max = Math.max(...trendData.map(x => Math.max(x.income, x.expenses)));
                                        const hIn = (d.income / (max || 1)) * 100;
                                        const hEx = (d.expenses / (max || 1)) * 100;
                                        return (
                                            <div key={idx} className="flex flex-col items-center gap-2 w-full">
                                                <div className="flex gap-1 items-end h-32 w-full justify-center">
                                                    <div title={formatCurrency(d.income)} className="w-3 bg-emerald-400 rounded-t-sm transition-all" style={{ height: `${hIn}%` }}></div>
                                                    <div title={formatCurrency(d.expenses)} className="w-3 bg-rose-400 rounded-t-sm transition-all" style={{ height: `${hEx}%` }}></div>
                                                </div>
                                                <span className="text-[8px] font-black text-slate-400 uppercase tracking-tighter">{d.label}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 card-shadow overflow-hidden">
                                <div className="flex flex-col gap-4 mb-8">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icons.Chart /> Comparativa de Gasto Fijo</h3>
                                    <select value={selectedRecurringName} onChange={(e) => {setSelectedRecurringName(e.target.value); setActiveBarIdx(null);}} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-black text-slate-600 outline-none focus:ring-2 focus:ring-slate-900/10 transition-all appearance-none">
                                        <option value="">Elegir un gasto...</option>
                                        {recurringNames.map(name => (<option key={name} value={name}>{name}</option>))}
                                    </select>
                                </div>
                                {selectedRecurringName ? (
                                    <div className="animate-fade-in">
                                        <div className="flex items-end justify-between h-40 px-2 mb-6">
                                            {specificExpenseTrend.map((d, idx) => {
                                                const max = Math.max(...specificExpenseTrend.map(x => x.amount));
                                                const h = (d.amount / (max || 1)) * 100;
                                                return (
                                                    <div key={idx} className="flex flex-col items-center gap-2 w-full cursor-pointer" onClick={() => setActiveBarIdx(activeBarIdx === idx ? null : idx)}>
                                                        <div className="flex items-end h-32 w-full justify-center relative">
                                                            {activeBarIdx === idx && (<div className="absolute -top-6 bg-slate-900 text-white text-[8px] px-1.5 py-0.5 rounded-md font-black animate-fade-in whitespace-nowrap z-20 shadow-md">{formatCurrency(d.amount)}</div>)}
                                                            <div className={`w-5 bg-amber-400 rounded-t-lg transition-all duration-300 ${activeBarIdx === idx ? 'bg-amber-600 scale-x-125 shadow-lg' : 'hover:bg-amber-500'}`} style={{ height: `${h}%` }}></div>
                                                        </div>
                                                        <span className={`text-[8px] font-black uppercase tracking-tighter ${activeBarIdx === idx ? 'text-slate-900' : 'text-slate-400'}`}>{d.label}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ) : (<div className="py-10 text-center text-slate-300 text-xs italic">Seleccioná un ítem para ver su evolución.</div>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ListView = ({ title, type, items, onAdd, onDelete, onUpdate, onToggle, onSync, placeholder, accent, showCheck, showDueDay, showCategories, showDatePicker, showMonthlyTotal, stats }) => {
            const [newName, setNewName] = useState('');
            const [newAmountStr, setNewAmountStr] = useState('');
            const [newDueDay, setNewDueDay] = useState('');
            const [newCategory, setNewCategory] = useState('General');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);

            const categories = type === 'recurring' ? CATEGORIES_RECURRING : CATEGORIES_DAILY;

            const handleAmountChange = (e) => {
                const val = e.target.value.replace(/[^0-9,]/g, '');
                setNewAmountStr(val);
            };

            const handleAdd = (e) => {
                e.preventDefault();
                const amount = parseLocaleNumber(newAmountStr);
                if (!newName) return; 
                onAdd({ 
                    name: newName, 
                    amount, 
                    dueDay: showDueDay ? (parseInt(newDueDay) || '') : '',
                    category: newCategory,
                    type, 
                    paid: type === 'income',
                    date: showDatePicker ? new Date(newDate).toISOString() : null
                });
                setNewName(''); setNewAmountStr(''); setNewDueDay('');
            };

            const sortedItems = useMemo(() => {
                if (type === 'recurring') {
                    return [...items].sort((a,b) => (a.dueDay || 99) - (b.dueDay || 99));
                }
                return items.sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [items, type]);

            return (
                <div className="space-y-5 animate-fade-in pb-10">
                    {/* Resumen de gastos diarios si aplica */}
                    {showMonthlyTotal && stats && (
                        <div className="bg-rose-50 border border-rose-100 p-5 rounded-[2rem] flex items-center gap-4 card-shadow mb-2">
                            <div className="w-10 h-10 bg-rose-500 text-white rounded-2xl flex items-center justify-center shrink-0 border border-rose-600 shadow-sm"><Icons.Shopping /></div>
                            <div>
                                <p className="text-rose-400 text-[10px] font-black uppercase tracking-widest">Gastos Diarios del Mes</p>
                                <p className="text-2xl font-black text-rose-700 tracking-tight">{formatCurrency(stats.daily)}</p>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center ml-1">
                        <div className="flex items-center gap-2">
                            <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{title}</h2>
                            {onSync && (
                                <button 
                                    onClick={onSync}
                                    title="Sincronizar con el mes pasado"
                                    className="p-1 text-slate-400 hover:text-slate-900 transition-colors"
                                >
                                    <Icons.Refresh />
                                </button>
                            )}
                        </div>
                        <span className="text-[9px] font-black text-slate-400 bg-white px-2 py-0.5 rounded-full border border-slate-100 uppercase tracking-tighter">{items.length} regs.</span>
                    </div>

                    <form onSubmit={handleAdd} className="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 card-shadow flex flex-col gap-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-1">
                                <label className="text-[9px] font-black text-slate-500 uppercase ml-1">Descripción</label>
                                <input className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-medium outline-none focus:ring-4 focus:ring-slate-900/5 focus:border-slate-200 transition-all placeholder:text-slate-300" placeholder={placeholder} value={newName} onChange={e => setNewName(e.target.value)} />
                            </div>
                            {showDatePicker && (
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-500 uppercase ml-1">Fecha de gasto</label>
                                    <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-medium outline-none" />
                                </div>
                            )}
                        </div>
                        <div className="grid grid-cols-12 gap-3 items-end">
                            <div className={`${showDueDay ? 'col-span-8' : 'col-span-10'} space-y-1`}>
                                <label className="text-[9px] font-black text-slate-500 uppercase ml-1">Importe ($)</label>
                                <div className="relative">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                    <input type="text" className="w-full p-3 pl-7 bg-slate-50 border border-slate-100 rounded-xl text-sm font-black outline-none" placeholder="0,00" value={newAmountStr} onChange={handleAmountChange} />
                                </div>
                            </div>
                            {showDueDay && (
                                <div className="col-span-2 space-y-1 text-center">
                                    <label className="text-[9px] font-black text-slate-500 uppercase">Día</label>
                                    <input type="number" min="1" max="31" className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-black text-center outline-none" placeholder="–" value={newDueDay} onChange={e => setNewDueDay(e.target.value)} />
                                </div>
                            )}
                            <div className="col-span-2"><button type="submit" className="bg-slate-900 text-white w-full h-[46px] rounded-xl font-black shadow-lg shadow-slate-200 hover:bg-black transition-all active:scale-95 flex items-center justify-center"><Icons.Plus /></button></div>
                        </div>
                        {showCategories && (
                            <div className="space-y-1">
                                <label className="text-[9px] font-black text-slate-500 uppercase ml-1">Etiqueta / Categoría</label>
                                <div className="flex gap-2 overflow-x-auto py-1 no-scrollbar">
                                    {categories.map(cat => (<button key={cat} type="button" onClick={() => setNewCategory(cat)} className={`px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${newCategory === cat ? 'bg-slate-900 text-white shadow-md' : 'bg-slate-100 text-slate-500 border border-slate-100 hover:bg-slate-200'}`}>{cat}</button>))}
                                </div>
                            </div>
                        )}
                    </form>

                    <div className="grid grid-cols-1 gap-3">
                        {sortedItems.map(item => (<ItemCard key={item.id} item={item} accent={accent} onDel={() => onDelete(item.id)} onEdit={(field, val) => onUpdate(item.id, field, val)} onToggle={onToggle} showCheck={showCheck} showDueDay={showDueDay} />))}
                    </div>
                </div>
            );
        };

        const ItemCard = ({ item, accent, onDel, onEdit, onToggle, showCheck, showDueDay }) => {
            const [showPartialInput, setShowPartialInput] = useState(false);
            const [partialVal, setPartialVal] = useState('');
            
            const borderColors = { 
                emerald: "border-emerald-500", 
                rose: "border-rose-500", 
                amber: "border-amber-500", 
                slate: "border-slate-500" 
            };

            const categories = item.type === 'recurring' ? CATEGORIES_RECURRING : CATEGORIES_DAILY;

            // Determinar color de borde basado en el estado de pago para Gastos Fijos
            const getDynamicBorder = () => {
                if (item.type === 'recurring') {
                    return item.paid ? "border-emerald-500" : "border-amber-500";
                }
                return borderColors[accent];
            };

            const isCreditCard = useMemo(() => {
                const name = (item.name || "").toLowerCase();
                return (
                    name.includes("visa") || 
                    name.includes("mastercard") || 
                    name.includes("master") || 
                    item.category === "Tarjetas"
                );
            }, [item.name, item.category]);

            const handleToggle = (mode) => {
                if (mode === 'partial' && !showPartialInput) {
                    setShowPartialInput(true);
                    return;
                }
                const amount = mode === 'partial' ? parseLocaleNumber(partialVal) : item.amount;
                onToggle(item, mode, amount);
                setShowPartialInput(false);
            };

            return (
                <div className={`bg-white p-5 rounded-[1.5rem] border-l-[10px] ${getDynamicBorder()} card-shadow flex flex-col gap-4 transition-all ${item.type !== 'income' ? 'hover:-translate-y-0.5' : ''}`}>
                    <div className="flex items-center justify-between gap-4">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center flex-wrap gap-2 mb-1">
                                <input className="text-[10px] font-black text-slate-500 uppercase tracking-widest bg-transparent outline-none focus:text-slate-900 w-full md:w-auto md:min-w-[150px]" value={item.name} onChange={e => onEdit('name', e.target.value)} />
                                <div className="flex gap-2 shrink-0">
                                    {showDueDay ? (
                                        <div className="flex items-center bg-slate-50 rounded-md px-1.5 py-0.5 border border-slate-200">
                                            <span className="text-[8px] font-black text-slate-500 mr-1.5 uppercase tracking-tighter">Vto:</span>
                                            <input type="number" min="1" max="31" className="bg-transparent text-[10px] font-black text-slate-700 outline-none w-5 text-center" value={item.dueDay || ''} onChange={e => onEdit('dueDay', e.target.value)} />
                                        </div>
                                    ) : (
                                        <div className="text-[8px] font-black text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded border">{new Date(item.date).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })}</div>
                                    )}
                                    {item.type !== 'income' && (
                                        <select value={item.category || 'General'} onChange={(e) => onEdit('category', e.target.value)} className={`text-[8px] px-2 py-0.5 rounded-full font-black uppercase tracking-widest border transition-all appearance-none cursor-pointer outline-none ${item.category === 'General' ? 'bg-rose-50 text-rose-400 border-rose-200' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                            {categories.map(cat => (<option key={cat} value={cat}>{cat}</option>))}
                                        </select>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center text-2xl font-black text-slate-900 tracking-tighter">
                                <span className="text-slate-400 mr-1.5">$</span>
                                <CurrencyInput value={item.amount} onChange={(val) => onEdit('amount', val)} />
                            </div>
                            {item.paid && item.paymentType === 'partial' && (
                                <div className="text-[9px] font-black text-amber-500 uppercase mt-1">Abonado: {formatCurrency(item.paidAmount)} (Resta: {formatCurrency(item.amount - item.paidAmount)})</div>
                            )}
                        </div>
                        <div className="flex gap-2 shrink-0">
                            {showCheck && (
                                <div className="relative flex items-center">
                                    {!item.paid ? (
                                        <div className="flex gap-1">
                                            <button onClick={() => handleToggle('total')} className="p-3 rounded-2xl transition-all border-2 text-slate-800 hover:text-emerald-600 border-slate-100 hover:bg-emerald-50" title="Pago Total"><Icons.Check /></button>
                                            {isCreditCard && (
                                                <button onClick={() => setShowPartialInput(!showPartialInput)} className={`p-3 rounded-2xl transition-all border-2 ${showPartialInput ? 'bg-amber-50 text-amber-600 border-amber-300' : 'text-slate-800 hover:text-amber-600 border-slate-100 hover:bg-amber-50'}`} title="Pago Parcial">P</button>
                                            )}
                                        </div>
                                    ) : (
                                        <button onClick={() => onToggle(item)} className="p-3 rounded-2xl transition-all border-2 text-emerald-700 bg-emerald-50 border-emerald-300"><Icons.Check /></button>
                                    )}
                                </div>
                            )}
                            <button onClick={() => onDel(item.id)} className="p-3 text-slate-800 hover:text-rose-600 hover:bg-rose-50 border-2 border-slate-100 rounded-2xl transition-all shadow-sm"><Icons.Trash /></button>
                        </div>
                    </div>
                    
                    {showPartialInput && !item.paid && (
                        <div className="flex gap-2 items-end p-3 bg-amber-50 rounded-2xl animate-fade-in border border-amber-100">
                            <div className="flex-1 space-y-1">
                                <label className="text-[8px] font-black text-amber-600 uppercase ml-1">Monto a pagar hoy ($)</label>
                                <div className="relative">
                                    <span className="absolute left-2 top-1/2 -translate-y-1/2 text-amber-400 font-black">$</span>
                                    <input type="text" className="w-full p-2 pl-5 bg-white border border-amber-200 rounded-xl text-xs font-black outline-none focus:ring-2 focus:ring-amber-300" placeholder="0,00" value={partialVal} onChange={e => setPartialVal(e.target.value.replace(/[^0-9,]/g, ''))} />
                                </div>
                            </div>
                            <button onClick={() => handleToggle('partial')} className="bg-amber-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm">Confirmar</button>
                        </div>
                    )}
                </div>
            );
        };

        const CurrencyInput = ({ value, onChange }) => {
            const [display, setDisplay] = useState('');
            useEffect(() => { setDisplay(new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2 }).format(value || 0)); }, [value]);
            const handleChange = (e) => { const raw = e.target.value.replace(/[^0-9,]/g, ''); setDisplay(raw); };
            const handleBlur = () => { const num = parseLocaleNumber(display); onChange(num); setDisplay(new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2 }).format(num)); };
            return ( <input type="text" className="bg-transparent outline-none w-full" value={display} onChange={handleChange} onBlur={handleBlur} placeholder="0,00" /> );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
