          <div key={card.id} className="p-4 bg-white border border-slate-200 rounded-2xl space-y-3 animate-fade-in shadow-sm">
            <input className="w-full p-3 bg-slate-50 text-slate-900 rounded-xl text-xs outline-none border border-slate-200 focus:border-indigo-300 transition-all" value={editData.name || ''} onChange={e => setEditData({...editData, name: e.target.value})} placeholder="Nombre" />
            <div className="flex gap-2">
              <div className="flex-1 flex flex-col gap-1">
                <label className="text-slate-500 text-[8px] font-black uppercase tracking-widest">Cierre</label>
                <input type="number" min="1" max="31" className="p-3 bg-slate-50 text-slate-900 rounded-xl text-xs text-center outline-none border border-slate-200 focus:border-indigo-300 transition-all" value={editData.closingDay || ''} onChange={e => setEditData({...editData, closingDay: e.target.value})} />
              </div>
              <div className="flex-1 flex flex-col gap-1">
                <label className="text-slate-500 text-[8px] font-black uppercase tracking-widest">Vencimiento</label>
                <input type="number" min="1" max="31" className="p-3 bg-slate-50 text-slate-900 rounded-xl text-xs text-center outline-none border border-slate-200 focus:border-indigo-300 transition-all" value={editData.dueDay || ''} onChange={e => setEditData({...editData, dueDay: e.target.value})} />
              </div>
            </div>
            <button type="button" onClick={() => setEditData({...editData, isDefault: !editData.isDefault})} className={`w-full py-2 rounded-xl text-[9px] font-black uppercase border transition-all ${editData.isDefault ? 'bg-amber-400 text-slate-900 border-amber-400' : 'bg-slate-50 text-slate-400 border-slate-200 hover:border-slate-300'}`}>
              {editData.isDefault ? '★ Predeterminada' : 'Marcar como predeterminada'}
            </button>
            <div className="flex gap-2">
              <button onClick={() => saveEdit(card.id)} className="flex-1 bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase hover:bg-indigo-600 transition-all">Guardar</button>
              <button onClick={() => setEditingId(null)} className="px-4 border border-slate-200 text-slate-400 py-2.5 rounded-xl text-[9px] font-black uppercase hover:bg-slate-50 transition-all">X</button>
            </div>
          </div>
        ) : (
          <div key={card.id} className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
            <div className="flex-1">
              <div className="flex items-center gap-2">
                <p className="text-[11px] font-black text-slate-700 uppercase tracking-widest">{card.name}</p>
                {card.isDefault && <span className="text-[8px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-black uppercase">predeterminada</span>}
              </div>
              <p className="text-[9px] text-slate-400 font-medium mt-0.5">Cierre día {card.closingDay} · Vence día {card.dueDay}</p>
            </div>
            <button onClick={() => { setEditingId(card.id); setEditData({...card}); }} className="p-2 text-slate-300 hover:text-indigo-500 transition-all"><Icons.Edit /></button>
            <button onClick={() => deleteCard(card.id)} className="p-2 text-slate-300 hover:text-rose-500 transition-all"><Icons.Trash /></button>
          </div>
        ))}
      </div>
      <form onSubmit={addCard} className="p-5 bg-white border border-slate-200 rounded-2xl space-y-3 shadow-sm">

            <input type="number" min="1" max="31" className="p-3 bg-slate-50 text-slate-900 rounded-xl text-xs text-center outline-none border border-slate-200 focus:border-indigo-300 transition-all" value={newDueDay} onChange={e => setNewDueDay(e.target.value)} />
          </div>
        </div>
        <button type="submit" className="w-full bg-slate-900 text-white py-3 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-indigo-600 transition-all">Agregar Tarjeta</button>
      </form>
    </div>
  );
};

const AnalysisView = ({ currentMonthItems, stats, items, navDate, isSmall, budgets = {}, cards = [] }) => {
  const chartRef = useRef(null);
  const trendRef = useRef(null);
  const chartInstance = useRef(null);
  const trendInstance = useRef(null);
  const [selectedRecurringName, setSelectedRecurringName] = useState("");

  const recurringNames = useMemo(() => {
    return [...new Set(items.filter(i => i.type === 'recurring').map(i => i.name))].sort();
  }, [items]);

  useEffect(() => {
    if (recurringNames.length > 0 && !selectedRecurringName) setSelectedRecurringName(recurringNames[0]);
  }, [recurringNames, selectedRecurringName]);

  const byCategory = useMemo(() => {
    const cats = {};
    currentMonthItems.forEach(i => {
      if (i.type === 'income') return;
      const val = i.paymentType === 'partial' ? (parseFloat(i.paidAmount) || 0) : (parseFloat(i.amount) || 0);
      cats[i.category || 'General'] = (cats[i.category || 'General'] || 0) + val;
    });
    return Object.entries(cats).sort((a,b) => b[1] - a[1]);
  }, [currentMonthItems]);

  const fullYearData = useMemo(() => {
    const year = navDate.getUTCFullYear();
    const result = Array.from({length: 12}, (_, i) => ({ label: ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"][i], amount: 0 }));
    if (!selectedRecurringName) return result;
    items.forEach(item => {
      if (item.type === 'recurring' && item.name === selectedRecurringName && item.date) {
        const d = new Date(item.date);
        if (d.getUTCFullYear() === year) {
          const val = item.paymentType === 'partial' ? (parseFloat(item.paidAmount) || 0) : (parseFloat(item.amount) || 0);
          result[d.getUTCMonth()].amount += val;
        }
      }
    });
    return result;
  }, [items, selectedRecurringName, navDate]);

  useEffect(() => {
    if (chartRef.current && typeof Chart !== 'undefined') {
      if (chartInstance.current) chartInstance.current.destroy();
      chartInstance.current = new Chart(chartRef.current.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: byCategory.map(c => c[0]),
          datasets: [{ data: byCategory.map(c => c[1]), backgroundColor: CHART_COLORS, borderWidth: 0 }]
        },
        options: { cutout: isSmall ? '85%' : '75%', plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
      });
    }
    if (trendRef.current && !isSmall && typeof Chart !== 'undefined') {
      if (trendInstance.current) trendInstance.current.destroy();
      trendInstance.current = new Chart(trendRef.current.getContext('2d'), {
        type: 'bar',
        data: {
          labels: fullYearData.map(d => d.label),
          datasets: [{ label: 'Monto', data: fullYearData.map(d => d.amount), backgroundColor: '#6366f1', borderRadius: 8 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }, responsive: true, maintainAspectRatio: false }
      });
    }
    return () => { chartInstance.current?.destroy(); trendInstance.current?.destroy(); };
  }, [byCategory, fullYearData, isSmall]);

  if (isSmall) {
    return (
      <div className="flex items-center gap-8 bg-slate-900/5 p-6 rounded-[2.5rem] border border-slate-100">
        <div className="relative w-32 h-32 shrink-0"><canvas ref={chartRef}></canvas></div>
        <div className="flex-1 space-y-2 max-h-32 overflow-y-auto no-scrollbar">
          {byCategory.slice(0, 4).map(([cat, amount], idx) => (
            <div key={cat} className="flex justify-between items-center text-[10px] font-black uppercase">
              <span style={{ color: CHART_COLORS[idx % CHART_COLORS.length] }} className="truncate mr-2 font-black tracking-tighter">{cat}</span>
              <span className="text-slate-900 whitespace-nowrap">{formatCurrency(amount)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-8 animate-fade-in pb-10">
      <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-slate-100 md:grid md:grid-cols-2 md:gap-12 items-center">
        <div className="flex flex-col items-center mb-8 md:mb-0">
          <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-8 text-center">Gastos por Categoría</h3>
          <div className="relative w-64 h-64 md:w-80 md:h-80 mx-auto text-center">
            <canvas ref={chartRef}></canvas>
            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
              <p className="text-[10px] font-black text-slate-400 uppercase">Mes Actual</p>
              <p className="text-2xl font-black text-slate-900 tracking-tight leading-none">{formatCurrency(stats.totalSpent)}</p>
            </div>
          </div>
        </div>
        <div className="w-full space-y-4">
          {byCategory.length === 0 ? <p className="text-sm text-slate-400 italic text-center">Sin gastos registrados.</p> : byCategory.map(([cat, amount], idx) => {
            const budget = budgets[cat];
            const overBudget = budget > 0 && amount > budget;
            const pct = budget > 0 ? Math.min((amount / budget) * 100, 100) : (amount / (stats.totalSpent || 1)) * 100;
            return (
              <div key={cat} className="space-y-1.5">
                <div className="flex justify-between items-center text-[11px] font-black uppercase">
                  <span style={{ color: CHART_COLORS[idx % CHART_COLORS.length] }}>{cat}</span>
                  <div className="text-right">
                    <span className="text-slate-900 font-bold">{formatCurrency(amount)}</span>
                    {budget > 0 && <span className={`ml-2 text-[9px] ${overBudget ? 'text-rose-500 font-black' : 'text-slate-400'}`}>/ {formatCurrency(budget)}</span>}
                  </div>
                </div>
                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                  <div className="h-full transition-all duration-1000" style={{ width: `${pct}%`, backgroundColor: overBudget ? '#f43f5e' : CHART_COLORS[idx % CHART_COLORS.length] }}></div>
                </div>
                {overBudget && <p className="text-[9px] text-rose-500 font-black uppercase tracking-widest">⚠ Excede en {formatCurrency(amount - budget)}</p>}
              </div>
            );
          })}
        </div>
      </div>

      <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
          <div>
            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Evolución Anual</h3>
            <h4 className="text-xl font-black text-slate-900 tracking-tight">Historial Gastos Fijos</h4>
          </div>
          <select value={selectedRecurringName} onChange={e => setSelectedRecurringName(e.target.value)} className="w-full md:w-auto p-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-black text-slate-800 outline-none focus:ring-2 focus:ring-indigo-200 transition-all cursor-pointer">
            {recurringNames.length === 0 ? <option>Sin gastos fijos</option> : recurringNames.map(name => <option key={name} value={name}>{name}</option>)}
          </select>
        </div>
        <div className="relative h-72 w-full"><canvas ref={trendRef}></canvas></div>
        <div className="mt-6 flex justify-center"><p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Año: {navDate.getUTCFullYear()}</p></div>
      </div>

      {cards.length > 0 && (() => {
        const _m = navDate.getUTCMonth();
        const _y = navDate.getUTCFullYear();
        const _pm = _m === 0 ? 11 : _m - 1;
        const _py = _m === 0 ? _y - 1 : _y;
        const prevMonthItems = items.filter(item => {
          if (!item.date) return false;
          const d = new Date(item.date);
          return d.getUTCMonth() === _pm && d.getUTCFullYear() === _py;
        });
        const cardData = cards.map(card => {
          const autoDebits = currentMonthItems.filter(i => i.isAutoDebit && i.cardId === card.id);
          const dailyCredits = currentMonthItems.filter(i => i.type === 'daily' && i.paymentMethod === 'credit' && i.cardId === card.id);
          const prevBalItems = prevMonthItems.filter(i => i.type === 'recurring' && !i.isAutoDebit && i.cardId === card.id && i.paid && i.paymentType === 'partial');
          const autoDebitTotal = autoDebits.reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
          const dailyCreditTotal = dailyCredits.reduce((a, c) => a + (parseFloat(c.amount) || 0) / (c.cuotas || 1), 0);
          const prevBal = prevBalItems.reduce((a, c) => a + Math.max(0, (parseFloat(c.amount) || 0) - (parseFloat(c.paidAmount) || 0)), 0);
          return { card, autoDebits, dailyCredits, prevBalItems, autoDebitTotal, dailyCreditTotal, prevBal, total: prevBal + autoDebitTotal + dailyCreditTotal };
        }).filter(d => d.autoDebits.length > 0 || d.dailyCredits.length > 0 || d.prevBal > 0);

        if (cardData.length === 0) return null;

        return (
          <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
            <div className="flex flex-col md:flex-row md:items-end justify-between gap-2 mb-6">
              <div>
                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Proyección</h3>
                <h4 className="text-xl font-black text-slate-900 tracking-tight">Próximo Resumen por Tarjeta</h4>
              </div>
              <p className="text-[9px] text-slate-400 font-medium leading-relaxed max-w-xs text-right">Estimado · No incluye intereses</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              {cardData.map(({ card, autoDebits, dailyCredits, prevBalItems, autoDebitTotal, dailyCreditTotal, prevBal, total }) => (
                <div key={card.id} className="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
                  <div className="flex justify-between items-start">
                    <div>
                      <p className="text-sm font-black text-slate-900 uppercase tracking-wide">{card.name}</p>
                      <p className="text-[9px] text-slate-400 font-medium mt-0.5">Cierre día {card.closingDay} · Vence día {card.dueDay}</p>
                    </div>
                    <p className="text-xl font-black text-indigo-600">{formatCurrency(total)}</p>
                  </div>

                  {prevBal > 0 && (
                    <div>
                      <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Saldo Anterior · {formatCurrency(prevBal)}</p>
                      <div className="space-y-1.5">
                        {prevBalItems.map(item => {
                          const carried = (parseFloat(item.amount) || 0) - (parseFloat(item.paidAmount) || 0);
                          return (
                            <div key={item.id} className="flex justify-between items-center text-[10px] bg-white px-3 py-1.5 rounded-xl border border-rose-100">
                              <span className="text-slate-600 truncate mr-2">{item.name}</span>
                              <span className="font-black text-rose-600 whitespace-nowrap">{formatCurrency(carried)}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {autoDebits.length > 0 && (
                    <div>
                      <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Débitos Automáticos · {formatCurrency(autoDebitTotal)}</p>
                      <div className="space-y-1.5">
                        {autoDebits.map(item => (
                          <div key={item.id} className="flex justify-between items-center text-[10px] bg-white px-3 py-1.5 rounded-xl border border-slate-100">
                            <span className="text-slate-600 truncate mr-2">{item.name}</span>
                            <span className="font-black text-slate-900 whitespace-nowrap">{formatCurrency(item.amount)}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {dailyCredits.length > 0 && (
                    <div>
                      <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Gastos con Tarjeta · {formatCurrency(dailyCreditTotal)}</p>
                      <div className="space-y-1.5">
                        {dailyCredits.map(item => {
                          const installment = (parseFloat(item.amount) || 0) / (item.cuotas || 1);
                          return (
                            <div key={item.id} className="flex justify-between items-center text-[10px] bg-white px-3 py-1.5 rounded-xl border border-slate-100">
                              <span className="text-slate-600 truncate mr-2">{item.name}{item.cuotas > 1 ? ` · ${item.cuotas}c` : ''}</span>
                              <span className="font-black text-slate-900 whitespace-nowrap">{formatCurrency(installment)}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
};

const NavTab = ({ active, onClick, icon, label }) => (
  <button onClick={onClick} className={`p-3 rounded-2xl flex flex-col items-center gap-1 transition-all ${active ? 'bg-slate-900 text-white shadow-lg scale-105 font-bold' : 'text-slate-400'}`}>
    {icon} <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
  </button>
);

// --- REGISTRO SERVICE WORKER ---
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(reg => console.log("SW registrado:", reg.scope))
      .catch(err => console.warn("SW error:", err));
  });
}

// Bootstrap App
window.addEventListener('load', () => {
  const container = document.getElementById('root');
  if(container) {
    const root = createRoot(container);
    root.render(<App />);
  }
});

</script>
</body>
</html>
