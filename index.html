<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control de Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Configuración Firebase ---
        const firebaseConfig = JSON.parse(__firebase_config);
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-personales-v1';

        // --- Iconos (SVG inline para portabilidad) ---
        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val || 0);

        // --- Componente Principal ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

            // Auth
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error(e); }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user) return;
                const publicCollection = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions');
                
                const unsubscribe = publicCollection.onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(data);
                    setLoading(false);
                }, (error) => console.error("Firestore Error:", error));

                return () => unsubscribe();
            }, [user]);

            // Cálculos
            const monthlyData = useMemo(() => {
                const filtered = items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });

                const income = filtered.filter(i => i.type === 'income').reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
                const recurring = filtered.filter(i => i.type === 'recurring' && i.paid).reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
                const recurringPending = filtered.filter(i => i.type === 'recurring' && !i.paid).reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
                const daily = filtered.filter(i => i.type === 'daily').reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);

                return { income, recurring, recurringPending, daily, balance: income - recurring - daily, totalSpent: recurring + daily };
            }, [items, selectedMonth, selectedYear]);

            // Handlers
            const addTransaction = async (data) => {
                if (!user) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').add({
                    ...data,
                    userId: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const togglePaid = async (item) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').doc(item.id).update({
                    paid: !item.paid
                });
            };

            const deleteItem = async (id) => {
                if (window.confirm("¿Estás seguro de eliminar este registro?")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').doc(id).delete();
                }
            };

            const updateAmount = async (id, newAmount) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').doc(id).update({
                    amount: parseFloat(newAmount) || 0
                });
            };

            if (loading) return <div className="flex h-screen items-center justify-center text-slate-500">Iniciando aplicación...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-24">
                    {/* Header: Resumen de Balance */}
                    <header className="bg-white p-6 sticky top-0 z-20 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-xl font-bold text-slate-800">Control Financiero</h1>
                            <div className="text-sm font-medium text-slate-500 capitalize">
                                {new Date(selectedYear, selectedMonth).toLocaleString('es-ES', { month: 'long', year: 'numeric' })}
                            </div>
                        </div>
                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-6 text-white card-shadow">
                            <p className="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Saldo Disponible</p>
                            <h2 className="text-3xl font-bold mb-4">{formatCurrency(monthlyData.balance)}</h2>
                            <div className="flex justify-between text-xs border-t border-slate-700 pt-3">
                                <div>
                                    <p className="text-slate-400">Ingresos</p>
                                    <p className="text-emerald-400 font-bold">{formatCurrency(monthlyData.income)}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-400">Gastos Totales</p>
                                    <p className="text-rose-400 font-bold">{formatCurrency(monthlyData.totalSpent)}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Vistas Dinámicas */}
                    <main className="p-4 space-y-4">
                        {view === 'dashboard' && <DashboardView monthlyData={monthlyData} />}
                        {view === 'income' && <IncomeView items={items.filter(i => i.type === 'income')} add={addTransaction} del={deleteItem} update={updateAmount} />}
                        {view === 'recurring' && <RecurringView items={items.filter(i => i.type === 'recurring')} add={addTransaction} del={deleteItem} toggle={togglePaid} update={updateAmount} />}
                        {view === 'daily' && <DailyView items={items.filter(i => i.type === 'daily')} add={addTransaction} del={deleteItem} update={updateAmount} />}
                    </main>

                    {/* Navegación Inferior */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-30">
                        <div className="max-w-md mx-auto flex justify-around p-3 safe-area-bottom">
                            <NavButton active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} label="Resumen" />
                            <NavButton active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} label="Ingresos" />
                            <NavButton active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} label="Pagos" />
                            <NavButton active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} label="Diarios" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavButton = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-colors ${active ? 'text-blue-600' : 'text-slate-400'}`}>
                {icon}
                <span className="text-[10px] font-bold uppercase">{label}</span>
            </button>
        );

        // --- Componentes de Vista ---

        const DashboardView = ({ monthlyData }) => (
            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2 duration-300">
                <div className="bg-white p-4 rounded-xl border flex justify-between items-center">
                    <div>
                        <h3 className="text-sm font-semibold text-slate-500">Gastos Recurrentes Pendientes</h3>
                        <p className="text-xl font-bold text-slate-800">{formatCurrency(monthlyData.recurringPending)}</p>
                    </div>
                    <div className="w-10 h-10 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center">
                        <Icons.Calendar />
                    </div>
                </div>
                <div className="bg-white p-4 rounded-xl border flex justify-between items-center">
                    <div>
                        <h3 className="text-sm font-semibold text-slate-500">Gastos Diarios Hoy</h3>
                        <p className="text-xl font-bold text-slate-800">{formatCurrency(monthlyData.daily)}</p>
                    </div>
                    <div className="w-10 h-10 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center">
                        <Icons.Shopping />
                    </div>
                </div>
                <div className="p-4 text-center">
                    <p className="text-xs text-slate-400 italic">"Simplifica tus finanzas para vivir más tranquilo."</p>
                </div>
            </div>
        );

        const IncomeView = ({ items, add, del, update }) => (
            <div className="space-y-4">
                <AddItemForm type="income" title="Agregar Ingreso" onSubmit={add} placeholder="Nombre (ej: Sueldo A)" />
                <div className="space-y-2">
                    {items.map(item => (
                        <TransactionItem key={item.id} item={item} del={del} update={update} color="emerald" />
                    ))}
                    {items.length === 0 && <EmptyState text="No hay ingresos cargados aún." />}
                </div>
            </div>
        );

        const RecurringView = ({ items, add, del, toggle, update }) => (
            <div className="space-y-4">
                <AddItemForm type="recurring" title="Nuevo Gasto Fijo" onSubmit={add} placeholder="Nombre (ej: Expensas)" />
                <div className="space-y-2">
                    {items.map(item => (
                        <TransactionItem 
                            key={item.id} 
                            item={item} 
                            del={del} 
                            update={update} 
                            color={item.paid ? "blue" : "amber"} 
                            onCheck={() => toggle(item)}
                            showCheck
                        />
                    ))}
                    {items.length === 0 && <EmptyState text="No hay gastos recurrentes." />}
                </div>
            </div>
        );

        const DailyView = ({ items, add, del, update }) => (
            <div className="space-y-4">
                <AddItemForm type="daily" title="Gasto del Día" onSubmit={add} placeholder="Detalle (ej: Almuerzo)" />
                <div className="space-y-2">
                    {items.map(item => (
                        <TransactionItem key={item.id} item={item} del={del} update={update} color="rose" />
                    ))}
                    {items.length === 0 && <EmptyState text="Cargá tus compras diarias aquí." />}
                </div>
            </div>
        );

        // --- Sub-componentes Atómicos ---

        const AddItemForm = ({ type, title, onSubmit, placeholder }) => {
            const [name, setName] = useState('');
            const [amount, setAmount] = useState('');
            
            const handleAdd = () => {
                if (!name || !amount) return;
                onSubmit({ 
                    name, 
                    amount: parseFloat(amount), 
                    type, 
                    date: new Date().toISOString(),
                    paid: type === 'income' // Ingresos están "pagados" por defecto
                });
                setName(''); setAmount('');
            };

            return (
                <div className="bg-white p-4 rounded-xl border border-slate-200 card-shadow">
                    <h3 className="text-xs font-bold text-slate-400 uppercase mb-3">{title}</h3>
                    <div className="flex flex-col gap-2">
                        <input className="p-2 bg-slate-50 border rounded-lg text-sm" placeholder={placeholder} value={name} onChange={e => setName(e.target.value)} />
                        <div className="flex gap-2">
                            <input type="number" className="p-2 bg-slate-50 border rounded-lg text-sm flex-1 font-bold" placeholder="Monto" value={amount} onChange={e => setAmount(e.target.value)} />
                            <button onClick={handleAdd} className="bg-slate-800 text-white px-4 rounded-lg font-bold text-sm">Añadir</button>
                        </div>
                    </div>
                </div>
            );
        };

        const TransactionItem = ({ item, del, update, color, onCheck, showCheck }) => {
            const [localAmount, setLocalAmount] = useState(item.amount);

            const handleBlur = () => {
                if (parseFloat(localAmount) !== item.amount) {
                    update(item.id, localAmount);
                }
            };

            const colors = {
                emerald: "border-emerald-500",
                rose: "border-rose-500",
                blue: "border-blue-500",
                amber: "border-amber-400"
            };

            return (
                <div className={`bg-white p-3 rounded-xl border-l-4 ${colors[color]} card-shadow flex items-center justify-between gap-3 animate-in fade-in slide-in-from-right-2`}>
                    <div className="flex-1">
                        <p className={`text-sm font-semibold text-slate-700 ${item.paid && showCheck ? 'line-through opacity-50' : ''}`}>{item.name}</p>
                        <div className="flex items-center text-lg font-bold text-slate-900">
                            <span className="text-slate-400 mr-1">$</span>
                            <input 
                                type="number" 
                                className="bg-transparent outline-none w-24" 
                                value={localAmount} 
                                onChange={e => setLocalAmount(e.target.value)}
                                onBlur={handleBlur}
                            />
                        </div>
                    </div>
                    <div className="flex items-center gap-1">
                        {showCheck && (
                            <button onClick={onCheck} className={`p-2 rounded-lg transition-colors ${item.paid ? 'text-emerald-500' : 'text-slate-200 hover:text-emerald-400'}`}>
                                <Icons.Check />
                            </button>
                        )}
                        <button onClick={() => del(item.id)} className="p-2 text-slate-300 hover:text-rose-500 transition-colors">
                            <Icons.Trash />
                        </button>
                    </div>
                </div>
            );
        };

        const EmptyState = ({ text }) => (
            <div className="py-8 text-center text-slate-400">
                <p className="text-sm italic">{text}</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
