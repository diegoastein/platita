<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control de Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
           apiKey: "AIzaSyB_iAkA30kQKiavpJnB0zTpRXUr7aCzA7k",
  authDomain: "platita-3fcc5.firebaseapp.com",
  projectId: "platita-3fcc5",
  storageBucket: "platita-3fcc5.firebasestorage.app",
  messagingSenderId: "93396692454",
  appId: "1:93396692454:web:acc81d633c3dd3ae27fa27"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-finanzas-v1';

        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Shopping: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val || 0);

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMonth] = useState(new Date().getMonth());
            const [selectedYear] = useState(new Date().getFullYear());

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Auth error", e); }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            // Referencia dinámica a la colección privada del usuario
            const getUserCollection = () => {
                if (!user) return null;
                return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions');
            };

            useEffect(() => {
                const col = getUserCollection();
                if (!col) return;
                
                const unsubscribe = col.onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItems(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const filtered = items.filter(item => {
                    const d = item.date ? new Date(item.date) : new Date();
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });

                const income = filtered.filter(i => i.type === 'income').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPaid = filtered.filter(i => i.type === 'recurring' && i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const recPending = filtered.filter(i => i.type === 'recurring' && !i.paid).reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);
                const daily = filtered.filter(i => i.type === 'daily').reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);

                return { income, recPaid, recPending, daily, balance: income - recPaid - daily, totalSpent: recPaid + daily };
            }, [items, selectedMonth, selectedYear]);

            const add = async (data) => {
                const col = getUserCollection();
                if (!col) return;
                await col.add({
                    ...data,
                    userId: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const toggle = async (item) => {
                const col = getUserCollection();
                if (!col) return;
                await col.doc(item.id).update({ paid: !item.paid });
            };

            const del = async (id) => {
                const col = getUserCollection();
                if (!col) return;
                if (confirm("¿Eliminar este registro?")) {
                    await col.doc(id).delete();
                }
            };

            const update = async (id, amount) => {
                const col = getUserCollection();
                if (!col) return;
                await col.doc(id).update({ amount: parseFloat(amount) || 0 });
            };

            if (loading) return (
                <div className="flex flex-col h-screen items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-500 font-medium text-sm">Sincronizando con Firebase...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-28">
                    <header className="bg-white p-6 sticky top-0 z-20 border-b border-slate-100 shadow-sm">
                        <div className="flex justify-between items-center mb-5">
                            <h1 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                <span className="bg-blue-600 text-white p-1 rounded">BP</span>
                                Biyuya Personal
                            </h1>
                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-2 py-1 rounded">
                                {new Date().toLocaleString('es-ES', { month: 'short' })} {selectedYear}
                            </div>
                        </div>

                        <div className="bg-slate-900 rounded-3xl p-6 text-white card-shadow relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 opacity-10 rounded-full -mr-16 -mt-16"></div>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Disponible</p>
                            <h2 className="text-4xl font-bold mb-6 tracking-tight">{formatCurrency(stats.balance)}</h2>
                            
                            <div className="grid grid-cols-2 gap-4 border-t border-slate-800 pt-4">
                                <div>
                                    <p className="text-slate-500 text-[10px] uppercase font-bold">Ingresos</p>
                                    <p className="text-emerald-400 font-bold text-sm">{formatCurrency(stats.income)}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-500 text-[10px] uppercase font-bold">Egresos</p>
                                    <p className="text-rose-400 font-bold text-sm">{formatCurrency(stats.totalSpent)}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 space-y-4">
                        {view === 'dashboard' && <Summary stats={stats} />}
                        {view === 'income' && <ListView title="Ingresos" type="income" items={items.filter(i => i.type === 'income')} onAdd={add} onDelete={del} onUpdate={update} placeholder="Sueldo o Extra" accent="emerald" />}
                        {view === 'recurring' && <ListView title="Pagos Fijos" type="recurring" items={items.filter(i => i.type === 'recurring')} onAdd={add} onDelete={del} onUpdate={update} onToggle={toggle} placeholder="Expensas, Alquiler..." accent="amber" showCheck />}
                        {view === 'daily' && <ListView title="Gastos Diarios" type="daily" items={items.filter(i => i.type === 'daily')} onAdd={add} onDelete={del} onUpdate={update} placeholder="Super, Café, etc." accent="rose" />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-nav z-30">
                        <div className="max-w-md mx-auto flex justify-between px-6 py-4 safe-area-bottom">
                            <NavTab active={view === 'dashboard'} onClick={() => setView('dashboard')} icon={<Icons.Wallet />} />
                            <NavTab active={view === 'income'} onClick={() => setView('income')} icon={<Icons.Plus />} />
                            <NavTab active={view === 'recurring'} onClick={() => setView('recurring')} icon={<Icons.Calendar />} />
                            <NavTab active={view === 'daily'} onClick={() => setView('daily')} icon={<Icons.Shopping />} />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavTab = ({ active, onClick, icon }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl transition-all duration-300 ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 scale-110' : 'text-slate-400 hover:bg-slate-100'}`}>
                {icon}
            </button>
        );

        const Summary = ({ stats }) => (
            <div className="space-y-4 animate-fade-in">
                <div className="bg-white p-5 rounded-2xl border border-slate-100 flex items-center justify-between card-shadow">
                    <div className="w-12 h-12 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center"><Icons.Calendar /></div>
                    <div className="flex-1 ml-4">
                        <p className="text-slate-400 text-[10px] font-bold uppercase">Pendiente de Pago</p>
                        <p className="text-lg font-bold text-slate-800">{formatCurrency(stats.recPending)}</p>
                    </div>
                </div>
                <div className="bg-white p-5 rounded-2xl border border-slate-100 flex items-center justify-between card-shadow">
                    <div className="w-12 h-12 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center"><Icons.Shopping /></div>
                    <div className="flex-1 ml-4">
                        <p className="text-slate-400 text-[10px] font-bold uppercase">Gastos Diarios</p>
                        <p className="text-lg font-bold text-slate-800">{formatCurrency(stats.daily)}</p>
                    </div>
                </div>
            </div>
        );

        const ListView = ({ title, type, items, onAdd, onDelete, onUpdate, onToggle, placeholder, accent, showCheck }) => {
            const [newName, setNewName] = useState('');
            const [newAmount, setNewAmount] = useState('');

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName || !newAmount) return;
                onAdd({ name: newName, amount: parseFloat(newAmount), type, date: new Date().toISOString(), paid: type === 'income' });
                setNewName(''); setNewAmount('');
            };

            return (
                <div className="space-y-4 animate-fade-in">
                    <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">{title}</h2>
                    <form onSubmit={handleAdd} className="bg-white p-4 rounded-2xl border border-slate-200 card-shadow flex flex-col gap-3">
                        <input className="w-full p-3 bg-slate-50 border-none rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder={placeholder} value={newName} onChange={e => setNewName(e.target.value)} />
                        <div className="flex gap-2">
                            <input type="number" className="w-full p-3 bg-slate-50 border-none rounded-xl text-sm font-bold outline-none flex-1" placeholder="Monto" value={newAmount} onChange={e => setNewAmount(e.target.value)} />
                            <button type="submit" className="bg-blue-600 text-white px-6 rounded-xl font-bold"><Icons.Plus /></button>
                        </div>
                    </form>
                    <div className="space-y-3">
                        {items.sort((a,b) => new Date(b.date) - new Date(a.date)).map(item => (
                            <div key={item.id} className={`bg-white p-4 rounded-2xl border-l-4 border-${accent}-400 card-shadow flex items-center justify-between gap-4 transition-all ${item.paid && showCheck ? 'opacity-30 grayscale' : ''}`}>
                                <div className="flex-1">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">{item.name}</p>
                                    <div className="flex items-center text-xl font-bold text-slate-900">
                                        <span className="text-slate-300 mr-1">$</span>
                                        <input type="number" className="bg-transparent outline-none w-full" value={item.amount} onChange={e => onUpdate(item.id, e.target.value)} />
                                    </div>
                                </div>
                                <div className="flex gap-1">
                                    {showCheck && <button onClick={onToggle} className={`p-2 rounded-xl ${item.paid ? 'text-blue-600 bg-blue-50' : 'text-slate-300'}`}><Icons.Check /></button>}
                                    <button onClick={() => onDelete(item.id)} className="p-2 text-slate-200 hover:text-rose-500"><Icons.Trash /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
